id: legal-hold-retention-conflict-check
version: 1
name: Legal Hold vs Retention Purge Conflict Check
description: >
  Checks records flagged for scheduled purge against the active legal
  hold list and flags any overlap before the purge runs. Use this if a
  record has ever been destroyed on schedule while under an active
  litigation or public-records legal hold, because the retention
  schedule and the legal hold list were maintained separately with
  nobody cross-checking them before purge day.
category: government
tags: [government, legal-hold, records, retention, compliance]
schedule: "0 7 1 * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' '
    BEGIN {
      hold_row = 0;
      while ((getline line < "{{legal_holds_csv_path}}") > 0) {
        hold_row++;
        if (hold_row == 1) { continue }
        split(line, f, ",");
        holds[f[1]] = 1;
      }
    }
    NR==1 {next}
    {
      if ($1 in holds) {
        printf "PURGE BLOCKED BY LEGAL HOLD: record %s (%s) — scheduled for purge but under active legal hold, do not destroy\n", $1, $2;
      }
    }
  ' "{{purge_schedule_csv_path}}"
variables:
  purge_schedule_csv_path:
    default: "./records-scheduled-for-purge.csv"
    description: "Path to a CSV with columns: record_id,record_description — records eligible for purge this cycle per the retention schedule."
  legal_holds_csv_path:
    default: "./active-legal-holds.csv"
    description: "Path to a CSV with columns: record_id,hold_reason — records currently under an active legal or public-records hold."
compatible_agents: [generic, claude, codex]
notes: This is a pre-purge safety gate, not a replacement for `public-records-retention-purge-check` — run this against the purge-eligible list it produces, before actually destroying anything.
