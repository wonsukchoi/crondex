id: pro-hac-vice-admission-renewal-tracker
version: 1
name: Pro Hac Vice Admission Renewal Tracker
description: >
  Checks each attorney's per-case pro hac vice admission in an out-of-state
  or foreign court and flags any approaching its annual renewal/fee
  deadline, or missing a required local counsel of record. Use this if
  your firm has ever litigated a case on a pro hac vice admission and
  nearly missed the court's annual renewal filing or let the local
  counsel affiliation lapse mid-case.
category: law-firm
tags: [law-firm, pro-hac-vice, admissions, litigation, compliance]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_days}}" '
    NR==1 {next}
    tolower($7)=="active" {
      cmd = "date -d \"" $6 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $6 "\" +%s 2>/dev/null";
      cmd | getline due_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      days_left = (due_epoch - now_epoch) / 86400;
      if ($5 == "") {
        printf "MISSING LOCAL COUNSEL: %s admitted pro hac vice in %s for case %s has no local counsel of record on file\n", $1, $3, $2;
        count++;
      }
      if (days_left <= days) {
        status = (days_left < 0) ? "EXPIRED" : "RENEWAL DUE SOON";
        printf "%s: %s pro hac vice admission in %s for case %s — renewal/fee due %s (%d days)\n", status, $1, $3, $2, $6, days_left;
        count++;
      }
    }
    END {
      if (count+0 == 0) print "OK: no pro hac vice admissions due for renewal or missing local counsel within " days " days.";
    }
  ' "{{pro_hac_vice_csv_path}}"
variables:
  pro_hac_vice_csv_path:
    default: "./pro_hac_vice_admissions.csv"
    description: "Path to a CSV with columns: attorney_name,case_name,jurisdiction,admission_date (YYYY-MM-DD),local_counsel_name,renewal_or_fee_due_date (YYYY-MM-DD),status (active/withdrawn/expired)."
  warn_days:
    default: 21
    description: Days-out threshold for flagging an approaching pro hac vice renewal or annual fee deadline.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only check against a pro hac vice tracking list you maintain — it
  does not file the renewal motion, pay the fee, or verify local counsel's
  own bar status. Distinct from `bar-license-renewal-tracker`, which covers
  an attorney's own home-state bar license renewal rather than a per-case
  temporary admission in a foreign jurisdiction.
