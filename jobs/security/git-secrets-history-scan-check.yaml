id: git-secrets-history-scan-check
version: 1
name: Git Secrets History Scan Check
description: >
  Scans the full git commit history of a repo (not just the current
  working tree) for secrets that were committed and later removed or
  overwritten but are still reachable in old commits. Use this if a key
  was ever accidentally committed and then "fixed" with a follow-up commit,
  leaving it permanently exposed to anyone who can clone the repo.
category: security
tags: [security, secrets, git-history, scanning]
schedule: "0 4 * * 0"
timezone: "UTC"
runner: shell
command: >
  cd {{repo_path}} &&
  if command -v gitleaks >/dev/null 2>&1; then
    gitleaks detect --source . --log-opts="--all" -v;
  elif command -v trufflehog >/dev/null 2>&1; then
    trufflehog git file://. --since-commit={{since_commit}} --only-verified;
  else
    echo "gitleaks/trufflehog not installed; falling back to slow pattern scan of full history" &&
    git log --all --source --pretty=format: --name-only --diff-filter=A | sort -u | while read -r f; do
      [ -z "$f" ] && continue;
      git log --all -p -- "$f" 2>/dev/null | grep -nE "(AKIA[0-9A-Z]{16}|-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----|api[_-]?key['\"]?[[:space:]]*[:=][[:space:]]*['\"][A-Za-z0-9_-]{16,})" && echo "  ^ possible match in history of $f";
    done;
  fi
variables:
  repo_path:
    default: "."
    description: Path to the repo to scan.
  since_commit:
    default: ""
    description: Optional commit SHA to scan history from, when using trufflehog, to limit scan time on large repos.
compatible_agents: [generic, claude, codex]
notes: >
  Distinct from secrets-scan.yaml, which only checks the current working
  tree (gitleaks --no-git); this job walks the entire reachable commit
  history, which is slower and should run less frequently. Prefers
  `gitleaks` or `trufflehog` if installed; the fallback regex scan is
  best-effort, slow on large repos, and will miss many patterns. A hit
  found here means a secret was leaked and must be treated as compromised
  and rotated, since rewriting history alone does not undo exposure to
  anyone who already cloned it.
