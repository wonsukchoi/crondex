id: staff-cpr-certification-renewal-check
version: 1
name: Staff CPR/First-Aid Certification Renewal Check
description: >
  Checks every staff member's baseline CPR and first-aid certification
  expiry date, not just specialty trainer certifications, and flags
  anyone due to lapse soon. Use this if a front-desk or group-fitness
  staff member has ever kept working shifts with an expired CPR card
  because certification tracking only covered personal trainers'
  specialty credentials.
category: fitness
tags: [fitness, staff, compliance, cpr, certification, safety]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline expiry_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      diff_days = (expiry_epoch - now_epoch) / 86400;
      if (diff_days <= days) {
        status = (diff_days < 0) ? "EXPIRED" : "EXPIRING SOON";
        printf "%s: %s (%s) — CPR/first-aid cert expires %s (%d days)\n", status, $1, $3, $2, diff_days;
      }
    }
  ' "{{staff_cpr_cert_csv_path}}"
variables:
  staff_cpr_cert_csv_path:
    default: "./staff-cpr-certifications.csv"
    description: "Path to a CSV with columns: staff_name,cpr_cert_expiry_date (YYYY-MM-DD),role."
  warn_days_before:
    default: 30
    description: How many days before CPR/first-aid certification expiry to start warning.
compatible_agents: [generic, claude, codex]
notes: This covers baseline CPR/first-aid cards for all staff, distinct from trainer-specific specialty certifications tracked elsewhere — every role that can be first on scene needs a current card.
