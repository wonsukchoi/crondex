id: team-hardware-refresh-cycle-check
version: 1
name: Team Hardware Refresh Cycle Check
description: >
  Scans an equipment inventory export and flags team members whose
  laptop or primary device has passed the company's refresh age policy.
  Use this if someone has ever been quietly grinding through builds on
  a five-year-old laptop because nobody was tracking device age against
  the refresh policy until it became a support ticket.
category: team
tags: [team, equipment, hardware, budget]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  today_epoch=$(date +%s);
  awk -F',' -v today="$today_epoch" -v max_months="{{refresh_after_months}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline issued_epoch; close(cmd);
      age_months = (today - issued_epoch) / 86400 / 30;
      if (age_months >= max_months) {
        printf "OVERDUE REFRESH: %s — device \"%s\" issued %s (%.0f month(s) old, policy %s)\n", $1, $3, $2, age_months, max_months;
      }
    }
  ' "{{equipment_inventory_csv_path}}"
variables:
  equipment_inventory_csv_path:
    default: "./team-equipment-inventory.csv"
    description: "Path to a CSV with columns: person_name,issued_date (YYYY-MM-DD),device_label — one row per primary device."
  refresh_after_months:
    default: 36
    description: Flag a device once it has been in service this many months, per your hardware refresh policy.
compatible_agents: [generic, claude, codex]
notes: >
  Zero-token. Distinct from new-hire-equipment-provisioning-check (day-1
  setup for incoming hires only) — this tracks ongoing device age across
  the whole existing team against the refresh cadence, not first-day
  provisioning. You maintain the inventory export yourself.
