id: parking-garage-camera-outage-check
version: 1
name: Parking Garage Camera Outage Check
description: >
  Checks parking garage/valet-lot security cameras against their
  last-reported-online timestamp and flags any camera that's gone quiet
  past a threshold. Use this if a guest vehicle incident has ever gone
  without usable footage because a garage camera had been offline for
  days and nobody noticed until footage was actually needed.
category: hospitality
tags: [hospitality, security, parking, cameras, facilities]
schedule: "0 6 * * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v hours="{{offline_alert_hours}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f \"%Y-%m-%d %H:%M:%S\" \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_seen_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      offline_hours = (now_epoch - last_seen_epoch) / 3600;
      if (offline_hours >= hours) {
        printf "CAMERA OFFLINE: %s — last seen %s (%d hours ago)\n", $1, $2, offline_hours;
      }
    }
  ' "{{camera_status_csv_path}}"
variables:
  camera_status_csv_path:
    default: "./parking-garage-camera-status.csv"
    description: "Path to a CSV with columns: camera_id,last_online_timestamp (YYYY-MM-DD HH:MM:SS)."
  offline_alert_hours:
    default: 4
    description: How many hours a camera can go without a heartbeat before this flags it as offline.
compatible_agents: [generic, claude, codex]
notes: Assumes camera_status_csv_path is refreshed from the security system's own monitoring export or API poll. Distinct from `valet-parking-incident-log-check` (logged vehicle incidents themselves, not camera infrastructure uptime).
