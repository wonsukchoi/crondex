id: exterior-paint-condition-check-reminder
version: 1
name: Exterior Paint Condition Check Reminder
description: >
  Reminds you to walk the exterior of the house and check the paint
  and caulking for peeling, cracking, or exposed bare wood based on how
  long it's been since the last check. Use this if you've ever let
  peeling exterior paint go long enough that the bare wood underneath
  started to rot.
category: home
tags: [home, exterior, paint, maintenance, seasonal]
schedule: "0 9 1 4,10 *"
timezone: "America/Los_Angeles"
runner: shell
command: >
  last={{last_checked_date}}; interval={{interval_months}};
  last_epoch=$(date -j -f %Y-%m-%d "$last" +%s 2>/dev/null || date -d "$last" +%s);
  today_epoch=$(date +%s);
  days_since=$(( (today_epoch-last_epoch)/86400 ));
  interval_days=$(( interval * 30 ));
  if [ "$days_since" -ge "$interval_days" ]; then echo "REMINDER: exterior paint/caulking last checked $days_since day(s) ago (every ${interval} months) — walk the exterior for peeling, cracking, or bare wood.";
  else echo "OK: checked $days_since day(s) ago, due again around day $interval_days."; fi
variables:
  last_checked_date:
    default: "2026-01-01"
    description: Date (YYYY-MM-DD) you last checked the exterior paint and caulking — update this yourself.
  interval_months:
    default: 6
    description: How often to check, in months. South- and west-facing walls with more sun exposure weather faster.
compatible_agents: [generic, claude, codex]
notes: Zero-token. Bare wood exposed to weather for more than a season or two is at real risk of rot — treat peeling as a priority, not cosmetic.
