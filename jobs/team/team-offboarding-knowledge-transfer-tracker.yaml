id: team-offboarding-knowledge-transfer-tracker
version: 1
name: Team Offboarding Knowledge Transfer Tracker
description: >
  Checks handoff tasks for a departing team member against their last
  day and flags anything still open as it approaches. Use this if
  someone has ever left the team and taken undocumented context with
  them — a credential nobody knew about, a process only they ran —
  because knowledge transfer got squeezed out by exit paperwork and
  a farewell lunch.
category: team
tags: [team, offboarding, knowledge-transfer, handoff]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn_days="{{warn_days_before_last_day}}" '
    NR==1 {next}
    $4 == "open" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_day_epoch; close(cmd);
      days_left = (last_day_epoch - today) / 86400;
      if (days_left <= warn_days) {
        status = (days_left < 0) ? "PAST LAST DAY" : "DUE SOON";
        printf "%s (%d day(s)): %s — handoff task \"%s\" still open\n", status, days_left, $1, $3;
      }
    }
  ' "{{offboarding_handoff_csv_path}}"
variables:
  offboarding_handoff_csv_path:
    default: "./offboarding-handoff-tasks.csv"
    description: "Path to a CSV with columns: departing_person_name,last_day_date (YYYY-MM-DD),handoff_task,status (open/done)."
  warn_days_before_last_day:
    default: 10
    description: Start flagging open handoff tasks once the departing person's last day is within this many days.
compatible_agents: [claude, codex, hermes, openclaw, generic]
notes: >
  Zero-token. Distinct from oncall-handoff-reminder (a single shift
  sync) and new-hire-onboarding-task-check (the incoming side) — this
  is the outgoing side, making sure knowledge actually transfers
  before someone's last day, not just that exit paperwork is filed.
