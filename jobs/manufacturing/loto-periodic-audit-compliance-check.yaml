id: loto-periodic-audit-compliance-check
version: 1
name: Lockout/Tagout Periodic Audit Compliance Check
description: >
  Checks each lockout/tagout procedure against its required periodic
  audit date and flags any procedure overdue for its annual review. Use
  this if a LOTO procedure has ever gone years without the required
  periodic inspection because the procedure itself was written once and
  filed, with nobody tracking the standing re-audit requirement.
category: manufacturing
tags: [manufacturing, loto, lockout-tagout, osha, safety, compliance]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_audit_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      next_due_epoch = last_audit_epoch + (365 * 86400);
      diff_days = (next_due_epoch - now_epoch) / 86400;
      if (diff_days <= days) {
        printf "LOTO AUDIT DUE: procedure %s (equipment %s) — last audited %s (%d days until/past due)\n", $1, $3, $2, diff_days;
      }
    }
  ' "{{loto_audit_log_csv_path}}"
variables:
  loto_audit_log_csv_path:
    default: "./loto-procedure-audit-log.csv"
    description: "Path to a CSV with columns: procedure_id,last_audit_date (YYYY-MM-DD),equipment_id."
  warn_days_before:
    default: 30
    description: How many days before the annual re-audit is due to start warning.
compatible_agents: [generic, claude, codex]
notes: Assumes a standard annual review interval (US OSHA 1910.147 baseline) — confirm your jurisdiction's actual required interval. Distinct from `preventive-maintenance-due-check` (equipment upkeep schedule, not the written LOTO procedure's own review requirement) and `safety-walk-audit-completion-check` (general floor walks, not procedure-specific documentation review).
