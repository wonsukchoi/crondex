id: event-permit-application-deadline-tracker
version: 1
name: Event Permit Application Deadline Tracker
description: >
  Tracks the application deadlines for permits an event needs (street
  closure, alcohol service, amplified sound, tent/structure, food
  vendor) and flags any that are coming up unfiled. Use this if an event
  has ever nearly gotten shut down because a permit application deadline
  passed weeks before anyone remembered to file it.
category: events
tags: [events, permits, compliance, deadlines]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  warn={{warn_days}};
  awk -F, -v today="$today" -v warn="$warn" '
    NR>1 && $3 != "filed" {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline due_ts; close(cmd);
      days_left = int((due_ts - today) / 86400);
      if (days_left <= warn) {
        if (days_left < 0) print "OVERDUE UNFILED: " $1 " application deadline was " (-days_left) " day(s) ago (" $2 ")";
        else print "FILE SOON: " $1 " application due in " days_left " day(s) (" $2 ")";
      }
    }
  ' {{permits_csv}}
variables:
  permits_csv:
    default: "event-permits.csv"
    description: "CSV with header row, columns: permit_name,application_due_date(YYYY-MM-DD),status(filed/not-filed)."
  warn_days:
    default: 14
    description: Days before an unfiled permit's deadline to start warning — many permit offices have slow processing, so warn early.
compatible_agents: [generic, claude, codex]
notes: Update the status column to "filed" as soon as each application is submitted, otherwise this keeps flagging it every run.
