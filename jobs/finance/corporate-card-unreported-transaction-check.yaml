id: corporate-card-unreported-transaction-check
version: 1
name: Corporate Card Unreported Transaction Check
description: >
  Joins a corporate card transaction feed against the list of transaction
  IDs already claimed on a filed expense report, and flags card charges
  older than a grace period that still have no matching expense report at
  all. Use this if an employee has ever swiped a company card and simply
  never filed the expense report for it, leaving the charge sitting on the
  card statement with no accounting entry behind it.
category: finance
tags: [finance, corporate-card, expenses, reconciliation, controls]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v grace_days="{{grace_period_days}}" '
    FNR==NR { if (FNR>1) expensed[$1]=1; next }
    FNR==1 { next }
    {
      cmd = "date -d \"" $4 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $4 "\" +%s 2>/dev/null";
      cmd | getline txn_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      age_days = (now_epoch - txn_epoch) / 86400;
      if (age_days > grace_days+0 && !($2 in expensed)) {
        printf "UNREPORTED: %s charged $%s on %s (transaction %s, %d day(s) old) — no expense report found\n", $1, $3, $4, $2, age_days;
        n++;
      }
    }
    END { printf "%d unreported corporate card transaction(s) found.\n", n+0; }
  ' "{{expensed_transactions_csv_path}}" "{{card_transactions_csv_path}}"
variables:
  card_transactions_csv_path:
    default: "./card_transactions.csv"
    description: "Path to a CSV with columns: cardholder,transaction_id,amount,date (YYYY-MM-DD). One row per corporate card charge, typically exported from the card issuer's portal."
  expensed_transactions_csv_path:
    default: "./expensed_transactions.csv"
    description: "Path to a CSV with columns: transaction_id,employee. One row per card transaction that has already been claimed on a filed expense report."
  grace_period_days:
    default: 14
    description: Days a card charge is allowed to go unreported before it's flagged.
compatible_agents: [generic, claude, codex]
notes: >
  Zero-token join. Distinct from expense-report-compliance-check.yaml,
  which checks policy violations (missing receipts, over-limit amounts)
  within reports that were actually filed — this job instead catches
  card charges for which no expense report was ever filed at all. Also
  distinct from bank-statement-reconciliation-check.yaml, which ties the
  company's aggregate ledger to a bank/card statement, not individual
  cardholders' charges to their own expense report filings.
