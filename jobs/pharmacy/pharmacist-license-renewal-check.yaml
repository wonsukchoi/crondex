id: pharmacist-license-renewal-check
version: 1
name: Pharmacist License and DEA Registration Renewal Check
description: >
  Checks each pharmacist's state pharmacy license and DEA registration
  expiration dates and warns before either lapses. Use this if you've ever
  worried a pharmacist could end up dispensing on an expired license or
  registration because renewal paperwork got missed.
category: pharmacy
tags: [pharmacy, compliance, licensing, dea, staff]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $4 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $4 "\" +%s 2>/dev/null";
      cmd | getline expiry_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      diff_days = (expiry_epoch - now_epoch) / 86400;
      if (diff_days <= days) {
        printf "EXPIRING: %s — %s (%s) expires %s (%d days)\n", $1, $3, $2, $4, diff_days;
      }
    }
  ' "{{credential_csv_path}}"
variables:
  credential_csv_path:
    default: "./pharmacist-credentials.csv"
    description: "Path to a CSV with columns: pharmacist_name,credential_type (state-license/dea-registration),state_or_number,expiry_date (YYYY-MM-DD)."
  warn_days_before:
    default: 60
    description: How many days before expiry to start warning — DEA and most state boards recommend starting renewal well ahead of the deadline.
compatible_agents: [generic, claude, codex]
notes: >
  Assumes a manually maintained CSV of renewal dates; does not check a live
  state board or DEA database. This is specific to pharmacist licensure and
  DEA registration for a retail/independent pharmacy — for clinical-staff
  credentials in a medical practice see jobs/healthcare/license-credential-expiry-check.yaml.
