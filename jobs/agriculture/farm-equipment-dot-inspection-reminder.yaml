id: farm-equipment-dot-inspection-reminder
version: 1
name: Farm Equipment DOT/Road Safety Inspection Reminder
description: >
  Checks road-going farm equipment (grain trucks, trailers, sprayers that
  travel on public roads) against required safety inspection dates and
  warns before any lapse. Use this if you've ever had a truck pulled over
  during harvest with an inspection sticker that had quietly expired.
category: agriculture
tags: [agriculture, equipment, dot, safety-inspection, compliance]
schedule: "0 6 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v warn="{{warn_days_before}}" -v today="$today" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline due_ts; close(cmd);
      days_left = (due_ts - today) / 86400;
      if (days_left <= warn) {
        printf "DUE: %s — safety inspection expires %s (%d days left)\n", $1, $2, days_left;
      }
    }
  ' "{{equipment_inspections_csv_path}}"
variables:
  equipment_inspections_csv_path:
    default: "./road-equipment-inspections.csv"
    description: "Path to a CSV with columns: equipment_name,inspection_expiration_date (YYYY-MM-DD) — only equipment that travels on public roads."
  warn_days_before:
    default: 30
    description: Days before the inspection expiration date to start warning.
compatible_agents: [generic, claude, codex]
notes: >
  Covers road-safety/DOT-style inspection dates for equipment that leaves the
  farm on public roads — a different concern from equipment-maintenance-due-reminder's
  engine-hours service intervals. Exact inspection requirements vary by state
  and vehicle weight class; confirm yours before relying on this.
