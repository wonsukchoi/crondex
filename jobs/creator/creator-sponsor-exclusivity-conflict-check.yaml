id: creator-sponsor-exclusivity-conflict-check
version: 2
name: Creator Sponsor Category Exclusivity Conflict Check
description: >
  Checks upcoming sponsored posts across any platform for two sponsors in
  the same product category running too close together. Use this if
  you've ever signed a skincare brand for one post and a competing
  skincare brand for the next, breaking an exclusivity clause neither
  sponsor should have had to discover on their own.
category: creator
tags: [creator, sponsorship, contracts, compliance]
schedule: "0 9 * * 2"
timezone: "UTC"
runner: shell
command: >
  if [ ! -f "{{sponsor_bookings_csv}}" ]; then echo "WARNING: bookings file {{sponsor_bookings_csv}} not found"; exit 1; fi;
  tail -n +2 "{{sponsor_bookings_csv}}" | sort -t, -k2,2 -k3,3 | awk -F, -v window={{exclusivity_window_days}} '
    {
      cat=$2; datestr=$3; name=$1;
      cmd="date -d \"" datestr "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" datestr "\" +%s";
      cmd | getline ts; close(cmd);
      if (cat == prev_cat && prev_ts != "") {
        diff = int((ts - prev_ts) / 86400);
        if (diff < window) print "WARNING: " prev_name " (" prev_date ") and " name " (" datestr ") both in category \"" cat "\", only " diff " day(s) apart (exclusivity window " window ")";
      }
      prev_cat=cat; prev_ts=ts; prev_name=name; prev_date=datestr;
    }
  '
variables:
  sponsor_bookings_csv:
    default: "sponsor-bookings.csv"
    description: "CSV with header row, columns: sponsor_name,category,post_date (YYYY-MM-DD), one row per upcoming sponsored post across any platform."
  exclusivity_window_days:
    default: 30
    description: Minimum days required between two sponsors in the same category before it's flagged as a possible exclusivity conflict.
compatible_agents: [generic, claude, codex]
notes: >
  Category exclusivity terms vary by contract — treat
  exclusivity_window_days as a rough default and check the actual signed
  terms before assuming a flagged pair is (or isn't) a real conflict.
  Works the same way for podcast sponsor bookings: point
  sponsor_bookings_csv at a CSV of columns sponsor_name,category,air_date
  (YYYY-MM-DD) — one row per upcoming episode sponsor slot instead of a
  cross-platform post — and it flags two same-category sponsors airing
  too close together (e.g. a mattress company booked for one episode and
  a competing mattress company for the next), same as it would for a
  skincare brand booked across two feed posts.
