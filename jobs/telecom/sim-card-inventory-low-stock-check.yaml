id: sim-card-inventory-low-stock-check
version: 1
name: SIM/eSIM Card Inventory Low-Stock Check
description: >
  Checks your pool of unprovisioned physical SIM cards and eSIM profiles
  per form factor or plan type and warns when available stock is running
  low. Use this if a wireless activation has ever been delayed because a
  retail location or activation team ran out of the specific SIM form
  factor or eSIM profile batch a customer needed.
category: telecom
tags: [telecom, sim, esim, inventory]
schedule: "0 8 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v min_available="{{min_available_count}}" '
    NR==1 {next}
    $3 == "unprovisioned" {count[$2]++}
    END {
      for (t in count) {
        if (count[t] < min_available) {
          printf "LOW SIM STOCK: %s has only %d unprovisioned units\n", t, count[t];
        }
      }
    }
  ' "{{sim_inventory_csv_path}}"
variables:
  sim_inventory_csv_path:
    default: "./sim-inventory.csv"
    description: "Path to a CSV with columns: sim_id,form_factor_or_batch (e.g. nano-sim, esim-profile-a),status (unprovisioned/activated/damaged/returned)."
  min_available_count:
    default: 25
    description: Minimum unprovisioned SIM/eSIM units per form factor or batch before it's flagged as low stock.
compatible_agents: [generic, claude, codex]
notes: >
  Assumes SIM/eSIM inventory status is exported from your provisioning
  or logistics system into the CSV before this runs. Distinct from
  did-inventory-low-stock-check, which tracks phone numbers rather than
  the physical or profile-based SIM stock used to activate a subscriber.
