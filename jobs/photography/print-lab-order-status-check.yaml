id: print-lab-order-status-check
version: 1
name: Print Lab Order Status Check
description: >
  Checks outstanding print, canvas, and album orders sent to your lab
  against their expected turnaround time and flags any running late.
  Use this if a client has ever emailed asking where their prints or
  wedding album are before you'd even noticed the lab was behind.
category: photography
tags: [photography, print-lab, fulfillment, turnaround]
schedule: "0 9 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v grace="{{turnaround_grace_days}}" '
    NR==1 {next}
    $5 != "delivered" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline ordered_epoch; close(cmd);
      days_since_order = (today - ordered_epoch) / 86400;
      expected_days = $4 + grace;
      if (days_since_order > expected_days) {
        printf "LATE LAB ORDER: order %s for %s — %s, ordered %s, expected %s-day turnaround (%d days elapsed)\n", $1, $3, $6, $2, $4, days_since_order;
      }
    }
  ' "{{lab_orders_csv_path}}"
variables:
  lab_orders_csv_path:
    default: "./lab-orders.csv"
    description: "Path to a CSV with columns: order_id,order_date (YYYY-MM-DD),client_name,expected_turnaround_days,status (in-production/shipped/delivered),item_description."
  turnaround_grace_days:
    default: 3
    description: Extra days past the lab's stated turnaround to allow before flagging an order as late, to absorb normal shipping variance.
compatible_agents: [generic, claude, codex]
notes: >-
  Read-only: it only flags orders running behind, it doesn't contact
  the lab or the client — chase the lab for a status update and
  decide whether the client needs a heads-up once flagged.
