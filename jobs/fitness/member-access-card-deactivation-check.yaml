id: member-access-card-deactivation-check
version: 1
name: Member Access Card Deactivation Check
description: >
  Cross-references cancelled or expired memberships against the active
  key-fob and access-card list and flags any card that's still enabled
  for someone who shouldn't have access anymore. Use this if a cancelled
  member has ever kept badging into the gym for weeks after their
  membership ended because deactivating the fob wasn't part of the
  cancellation checklist.
category: fitness
tags: [fitness, security, membership, access-control]
schedule: "0 6 * * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' '
    FNR==NR {
      if (FNR > 1 && $2 == "cancelled") { cancelled[$1] = 1; }
      next;
    }
    FNR==1 { next }
    {
      if ($1 in cancelled && $2 == "active") {
        printf "STILL ACTIVE: %s — access card %s should be deactivated\n", $1, $3;
      }
    }
  ' "{{membership_status_csv_path}}" "{{access_card_status_csv_path}}"
variables:
  membership_status_csv_path:
    default: "./membership-status.csv"
    description: "Path to a CSV with columns: member_name,status (active/cancelled)."
  access_card_status_csv_path:
    default: "./access-card-status.csv"
    description: "Path to a CSV with columns: member_name,card_status (active/disabled),card_id."
compatible_agents: [generic, claude, codex]
notes: Requires both exports to use the same member_name spelling — a mismatch will cause false negatives, so ideally join on member ID instead of name in a real integration.
