id: video-ad-completion-rate-watch
version: 1
name: Video Ad Completion Rate Watch
description: >
  Checks the view-through and completion rate of running video ads
  against a baseline and flags a meaningful drop. Use this if a video ad
  has ever quietly stopped holding attention (creative fatigue or a
  targeting problem) while spend kept flowing because nobody was
  watching completion rate specifically, as opposed to general clicks.
category: marketing
tags: [marketing, video-ads, completion-rate, creative-performance]
schedule: "0 8 * * *"
timezone: "UTC"
runner: shell
command: >
  psql "{{database_url}}" -t -c "select ad_id, ad_name, completion_rate, baseline_completion_rate from video_ad_performance where completion_rate < baseline_completion_rate * (1 - {{drop_threshold_pct}}::numeric / 100) order by (baseline_completion_rate - completion_rate) desc;"
variables:
  database_url:
    default: "postgres://user:pass@host:5432/db"
    description: Connection string for the database or reporting warehouse holding video ad performance metrics.
  drop_threshold_pct:
    default: 20
    description: Percentage drop in completion rate versus baseline that triggers a flag.
compatible_agents: [generic, claude, codex]
notes: >
  Assumes a `video_ad_performance` table with `ad_id`, `ad_name`,
  `completion_rate`, and `baseline_completion_rate` columns, typically
  synced from a video ad platform (e.g. YouTube Ads, Meta, TikTok Ads)
  into a warehouse. Read-only query; distinct from general ad creative
  fatigue checks since this targets video-specific completion metrics.
