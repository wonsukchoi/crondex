id: water-heater-flush-reminder
version: 1
name: Water Heater Flush Reminder
description: >
  Reminds you to flush sediment out of your water heater tank based on how
  long it's been since the last flush. Use this if you've ever noticed
  banging noises or slower hot water because sediment had been building up
  for years.
category: home
tags: [home, water-heater, maintenance]
schedule: "0 9 1 * *"
timezone: "America/Los_Angeles"
runner: shell
command: >
  last={{last_flushed_date}}; interval={{interval_months}};
  last_epoch=$(date -j -f %Y-%m-%d "$last" +%s 2>/dev/null || date -d "$last" +%s);
  today_epoch=$(date +%s);
  days_since=$(( (today_epoch-last_epoch)/86400 ));
  interval_days=$(( interval * 30 ));
  if [ "$days_since" -ge "$interval_days" ]; then echo "REMINDER: water heater last flushed $days_since day(s) ago (every ${interval} months) — flush the tank.";
  else echo "OK: flushed $days_since day(s) ago, due again around day $interval_days."; fi
variables:
  last_flushed_date:
    default: "2026-01-01"
    description: Date (YYYY-MM-DD) you last flushed the water heater tank — update this yourself.
  interval_months:
    default: 12
    description: How often to flush the tank, in months.
compatible_agents: [generic, claude, codex]
notes: Zero-token. You update last_flushed_date yourself each time you actually flush it. Hard water shortens the safe interval.
