id: team-okr-checkin-reminder
version: 1
name: Team OKR Check-in Reminder
description: >
  Checks your team's OKRs for key results that haven't had a progress
  update in a while and reminds you to check in before the quarter
  ends. Use this if OKRs have ever gone untouched for six weeks and
  then gotten a rushed "80% confident" update the day before the
  quarterly review.
category: team
tags: [team, okr, goals, planning]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v max_days="{{max_days_since_update}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $3 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $3 "\" +%s 2>/dev/null";
      cmd | getline last_epoch; close(cmd);
      days_since = (today - last_epoch) / 86400;
      if (days_since >= max_days) {
        printf "STALE: KR \"%s\" (owner: %s) last updated %s (%d day(s) ago)\n", $1, $2, $3, days_since;
      }
    }
  ' "{{okrs_csv_path}}"
variables:
  okrs_csv_path:
    default: "./team-okrs.csv"
    description: "Path to a CSV with columns: key_result,owner_name,last_updated_date (YYYY-MM-DD)."
  max_days_since_update:
    default: 14
    description: Flag a key result if it hasn't been updated in this many days.
compatible_agents: [generic, claude, codex]
notes: Zero-token. Assumes OKRs are tracked in a maintained CSV export (from Notion, Sheets, or an OKR tool) — not a source of truth itself.
