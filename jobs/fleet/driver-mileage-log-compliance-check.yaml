id: driver-mileage-log-compliance-check
version: 1
name: Driver Mileage Log Compliance Check
description: >
  Checks whether each driver has submitted their required periodic
  mileage/trip log and flags anyone overdue. Use this if a mileage
  reimbursement or IRS business-use log has ever gone unfiled for weeks,
  making tax records or expense reports incomplete when someone finally
  asked for them.
category: fleet
tags: [fleet, drivers, mileage, logs, compliance]
schedule: "0 7 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v max_days="{{max_days_since_submission}}" '
    NR==1 {next}
    {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline last_ts; close(cmd);
      days_since = int((today - last_ts) / 86400);
      if (days_since >= max_days)
        print "LOG OVERDUE: " $1 " — last submitted " $2 " (" days_since " days ago)";
    }
  ' "{{mileage_log_csv_path}}"
variables:
  mileage_log_csv_path:
    default: "./driver-mileage-logs.csv"
    description: "Path to a CSV with columns: driver_name,last_log_submission_date(YYYY-MM-DD)."
  max_days_since_submission:
    default: 14
    description: Days since a driver's last mileage log submission before it's flagged as overdue.
compatible_agents: [generic, claude, codex]
notes: Tracks whether drivers are filing their own logs on schedule — distinct from `vehicle-utilization-rate-check` (per-vehicle usage totals) and `odometer-fuel-mileage-reconciliation-check` (cross-checking mileage sources for accuracy).
