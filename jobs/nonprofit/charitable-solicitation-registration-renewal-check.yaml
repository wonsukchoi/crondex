id: charitable-solicitation-registration-renewal-check
version: 1
name: Charitable Solicitation Registration Renewal Check
description: >
  Checks your state-by-state charitable solicitation registrations
  against each one's renewal deadline and flags any about to lapse. Use
  this if your organization has ever fundraised in a state where its
  registration had quietly expired, risking fines or a forced pause on
  soliciting donors there, because each state runs on its own renewal
  calendar and nobody was tracking all of them in one place.
category: nonprofit
tags: [nonprofit, compliance, fundraising, registration]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn={{warn_days_before}} '
    NR>1 {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline expiry_ts; close(cmd);
      days_left = int((expiry_ts - today) / 86400);
      if (days_left <= warn && days_left >= 0) print "REGISTRATION EXPIRING: " $1 " — expires " $2 " (" days_left " days left)";
      else if (days_left < 0) print "REGISTRATION EXPIRED: " $1 " — expired " $2 " (" (-days_left) " days ago)";
    }
  ' "{{registrations_csv}}"
variables:
  registrations_csv:
    default: "charitable-solicitation-registrations.csv"
    description: "CSV with header row, columns: state,renewal_date(YYYY-MM-DD) — one row per state where you're registered to solicit donations."
  warn_days_before:
    default: 45
    description: Days before a state registration's renewal date to start warning.
compatible_agents: [generic, claude, codex]
notes: >
  Distinct from `form-990-filing-deadline-reminder` and
  `annual-audit-deadline-reminder` — this tracks state-level fundraising
  registrations (often called "charitable solicitation" or "professional
  fundraiser" registration), which most states require to be renewed
  annually and separately from any federal filing, with your own
  renewal-date list since every state's cycle differs.
