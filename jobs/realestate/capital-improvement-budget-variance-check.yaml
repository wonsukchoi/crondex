id: capital-improvement-budget-variance-check
version: 1
name: Capital Improvement Project Budget Variance Check
description: >
  Compares actual spend against budget for each active capital
  improvement project (roof replacement, parking lot repaving, etc.) and
  flags any project that has exceeded its budget or is on pace to. Use
  this if a capital project has ever quietly blown through its budget
  before anyone flagged it to ownership.
category: realestate
tags: [realestate, capital-improvements, budget, reporting]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v overrun="{{overrun_warn_pct}}" '
    NR==1 {next}
    {
      variance_pct = ($3 > 0) ? (($4 - $3) / $3 * 100) : 0;
      if (variance_pct >= overrun) printf "BUDGET VARIANCE: %s budget $%.2f, actual $%.2f (+%.1f%% over budget)\n", $1, $3, $4, variance_pct;
    }
  ' "{{projects_csv}}"
variables:
  projects_csv:
    default: "./capital-improvement-projects.csv"
    description: "CSV with header row, columns: project_name,property_name,budget_amount,actual_spend_to_date."
  overrun_warn_pct:
    default: 10
    description: Percent over budget at which to raise a variance warning.
compatible_agents: [generic, claude, codex]
notes: Distinct from capital-reserve-fund-threshold-check, which watches the reserve fund balance itself — this tracks individual project spend against its allocated budget.
