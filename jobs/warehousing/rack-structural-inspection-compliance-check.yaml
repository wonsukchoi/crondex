id: rack-structural-inspection-compliance-check
version: 1
name: Rack Structural Inspection Compliance Check
description: >
  Checks pallet racking structural inspection records against the
  required inspection interval and flags any rack run overdue for its
  next inspection. Use this if a damaged upright or beam has ever gone
  unnoticed between annual rack safety inspections.
category: warehousing
tags: [warehousing, racking, structural, safety, compliance]
schedule: "0 7 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v days="{{inspection_interval_days}}" -v today="$today" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_inspect_epoch; close(cmd);
      age_days = (today - last_inspect_epoch) / 86400;
      if (age_days >= days) {
        printf "OVERDUE: rack run %s (aisle %s) — last inspected %s (%d days ago)\n", $1, $3, $2, age_days;
      }
    }
  ' "{{rack_inspection_log_csv_path}}"
variables:
  rack_inspection_log_csv_path:
    default: "./rack-inspection-log.csv"
    description: "Path to a CSV with columns: rack_run_id,last_inspection_date (YYYY-MM-DD),aisle."
  inspection_interval_days:
    default: 365
    description: Maximum days allowed between rack structural inspections before it is flagged overdue.
compatible_agents: [generic, claude, codex]
notes: >
  Tracks the inspection schedule only, not individual damage reports —
  pair with a rack-damage tagging process (red-tag/repair-or-replace
  program) for structural findings turned up during the inspection.
