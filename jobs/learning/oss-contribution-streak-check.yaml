id: oss-contribution-streak-check
version: 1
name: Open-Source Contribution Streak Check
description: >
  Checks how long it's been since your last open-source contribution
  (PR, issue, review) via the GitHub API, to keep your portfolio visibly
  active. Use this if you keep meaning to build an open-source track
  record for your resume but let it go cold for months.
category: learning
tags: [learning, open-source, github, portfolio, career]
schedule: "0 9 * * 1"
timezone: "America/Los_Angeles"
runner: shell
command: >
  resp=$(curl --max-time 15 -s "https://api.github.com/search/issues?q=author:{{github_username}}+type:pr&sort=created&order=desc&per_page=1");
  last_date=$(echo "$resp" | grep -m1 '"created_at"' | cut -d'"' -f4);
  if [ -z "$last_date" ]; then echo "ERROR: could not find any PRs for {{github_username}} via GitHub API"; exit 1; fi;
  last_ts=$(date -d "$last_date" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$last_date" +%s);
  now_ts=$(date +%s);
  days_since=$(( (now_ts - last_ts) / 86400 ));
  if [ "$days_since" -ge "{{stale_threshold_days}}" ]; then echo "WARNING: {{github_username}}'s last open-source PR was $days_since days ago ($last_date) — contribution streak has gone cold"; exit 1;
  else echo "OK: last PR from {{github_username}} was $days_since day(s) ago."; fi
variables:
  github_username:
    default: "your-github-username"
    description: GitHub username to check contribution activity for.
  stale_threshold_days:
    default: 30
    description: Days since the last PR before this is flagged as gone cold.
compatible_agents: [generic, claude, codex]
notes: >
  Zero-token, uses the unauthenticated GitHub search API (rate-limited to
  ~10 requests/min) — for higher limits, wrap curl with your own GitHub
  token. Only checks pull requests, not issues or reviews.
