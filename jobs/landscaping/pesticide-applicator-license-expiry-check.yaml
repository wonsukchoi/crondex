id: pesticide-applicator-license-expiry-check
version: 1
name: Pesticide Applicator License Expiry Check
description: >
  Checks each crew member's pesticide/herbicide applicator license
  expiration date and flags anyone expiring within your warning window.
  Use this if a technician has ever sprayed a client's lawn with an
  expired license because nobody was tracking renewal dates.
category: landscaping
tags: [landscaping, pesticide, licensing, compliance, crew]
schedule: "0 8 1 * *"
timezone: "America/Chicago"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn_days="{{warn_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline exp_epoch; close(cmd);
      days_left = (exp_epoch - today) / 86400;
      if (days_left <= warn_days) {
        if (days_left < 0) printf "EXPIRED: %s license (%s) expired %d day(s) ago\n", $1, $3, -days_left;
        else printf "EXPIRING: %s license (%s) expires in %d day(s)\n", $1, $3, days_left;
      }
    }
  ' "{{applicator_licenses_csv_path}}"
variables:
  applicator_licenses_csv_path:
    default: "./applicator-licenses.csv"
    description: "Path to a CSV with columns: crew_member_name,expiration_date (YYYY-MM-DD),license_number,state."
  warn_days:
    default: 45
    description: Days before license expiration to start flagging a crew member.
compatible_agents: [generic, claude, codex]
notes: Pull any crew member off spraying duty once their license expires — this job only surfaces the date, it doesn't enforce a hold.
