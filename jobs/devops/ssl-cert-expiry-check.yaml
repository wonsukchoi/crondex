id: ssl-cert-expiry-check
version: 2
name: SSL Certificate Expiry Check
description: >
  Checks how many days are left before a website's SSL certificate expires.
  Use this if you run a site and want a warning before the padlock breaks
  and visitors start seeing browser security errors. Works for any single
  TLS-terminated host — e.g. a set of customer-facing endpoints such as a
  portal, API, webmail, or self-care app can each be checked by running
  this job once per hostname (or by wrapping it in a small loop over that
  list) rather than needing a separate job per service type.
category: devops
tags: [ssl, tls, security, uptime]
schedule: "0 6 * * *"
timezone: "UTC"
runner: shell
command: >
  host={{host}}; port={{port}};
  exp=$(echo | openssl s_client -servername "$host" -connect "$host:$port" 2>/dev/null | openssl x509 -noout -enddate | cut -d= -f2);
  [ -z "$exp" ] && { echo "ERROR: could not fetch certificate for $host:$port"; exit 1; };
  exp_epoch=$(date -d "$exp" +%s 2>/dev/null || date -j -f "%b %d %T %Y %Z" "$exp" +%s);
  now=$(date +%s);
  days=$(( (exp_epoch-now)/86400 ));
  if [ "$days" -lt {{warn_days}} ]; then echo "WARNING: $host cert expires in $days days ($exp)"; exit 1;
  else echo "OK: $host cert expires in $days days ($exp)"; fi
variables:
  host:
    default: "example.com"
    description: Hostname to check.
  port:
    default: 443
    description: Port the TLS service listens on.
  warn_days:
    default: 14
    description: Alert if the cert expires within this many days.
compatible_agents: [generic, claude, codex]
notes: >
  Zero-token, deterministic — no LLM mode needed for a plain expiry check.
  For monitoring a fixed group of customer-facing endpoints (portal, API,
  webmail, self-care app, etc.), run one instance of this job per hostname
  or invoke it in a loop over that list of hosts.
