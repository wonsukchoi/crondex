id: financing-application-follow-up-check
version: 1
name: Financing Application Follow-Up Check
description: >
  Flags patient treatment-financing applications (e.g. CareCredit or a
  similar third-party plan) left in a pending or incomplete state past
  a configurable window. Use this if a big treatment plan has ever
  stalled because the financing application was started but never
  followed up on — distinct from unscheduled-treatment-value-report.yaml,
  which tracks unscheduled case value in general, not the financing
  step specifically.
category: dental
tags: [dental, financing, carecredit, treatment-plan, billing]
schedule: "0 16 * * 2"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v max_age="{{max_pending_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline start_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      age_days = (now_epoch - start_epoch) / 86400;
      if ($3 == "pending" && age_days > max_age+0) {
        printf "STALLED: %s financing application started %s is %d day(s) old, still pending\n", $1, $2, age_days;
        stalled++;
      }
    }
    END { printf "%d stalled financing application(s) found.\n", stalled+0; }
  ' "{{financing_log_csv_path}}"
variables:
  financing_log_csv_path:
    default: "./financing_applications.csv"
    description: "Path to a CSV with columns: patient_name,started_date (YYYY-MM-DD),status (pending/approved/denied/completed)."
  max_pending_days:
    default: 14
    description: Days a financing application can stay pending before it's flagged as stalled.
compatible_agents: [generic, claude, codex]
notes: Read-only nudge list — actual follow-up call/text to the patient still needs to happen separately.
