id: life-safety-system-inspection-check
version: 1
name: Fire and Life-Safety System Inspection Due Check
description: >
  Flags fire alarm, sprinkler, and life-safety system inspections that are
  due or overdue across the portfolio, based on each system's last
  inspection date and the required inspection interval. Use this if you've
  ever discovered a sprinkler certification lapsed only after a fire
  marshal or insurer asked for the paperwork.
category: realestate
tags: [realestate, life-safety, fire-inspection, compliance]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v interval="{{inspection_interval_days}}" '
    NR==1 {next}
    {
      cmd="date -d \"" $3 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $3 "\" +%s";
      cmd | getline last_ts; close(cmd);
      days_since = int((today - last_ts) / 86400);
      if (days_since >= interval) print "INSPECTION DUE: " $1 " system " $2 " last inspected " days_since " day(s) ago (due every " interval " days)";
    }
  ' "{{systems_csv}}"
variables:
  systems_csv:
    default: "./life-safety-systems.csv"
    description: "CSV with header row, columns: property_name,system_type(fire-alarm/sprinkler/standpipe/extinguisher),last_inspection_date(YYYY-MM-DD)."
  inspection_interval_days:
    default: 365
    description: Required days between inspections for the system type; run separately per system type if intervals differ.
compatible_agents: [generic, claude, codex]
notes: Distinct from property-maintenance-inspection-reminder, which covers general upkeep — this tracks statutory life-safety inspection cadence (fire alarm, sprinkler, standpipe) that local fire code and insurers require.
