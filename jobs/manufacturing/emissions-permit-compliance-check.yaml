id: emissions-permit-compliance-check
version: 1
name: Environmental Emissions Permit Compliance Check
description: >
  Checks logged air/water discharge readings against your facility's
  environmental permit limits and flags any exceedance or approaching
  permit renewal date. Use this if a discharge reading has ever crept
  past a permit limit without anyone noticing until the regulator's
  inspection.
category: manufacturing
tags: [manufacturing, environmental, compliance, safety]
schedule: "0 6 * * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn={{permit_warn_days}} '
    NR==1 {next}
    {
      if ($3 > $4) printf "EXCEEDANCE: %s reading %.2f exceeds permit limit %.2f on %s\n", $1, $3, $4, $2;
      if ($5 != "") {
        cmd="date -d \"" $5 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $5 "\" +%s";
        cmd | getline exp_ts; close(cmd);
        days_left = int((exp_ts - today) / 86400);
        if (days_left <= warn) printf "PERMIT RENEWAL: %s permit expires in %d days (%s)\n", $1, days_left, $5;
      }
    }
  ' "{{discharge_log_csv}}"
variables:
  discharge_log_csv:
    default: "./discharge-readings.csv"
    description: "CSV with header row, columns: parameter,reading_date(YYYY-MM-DD),measured_value,permit_limit,permit_expiry_date(YYYY-MM-DD, blank if not applicable on that row)."
  permit_warn_days:
    default: 30
    description: Days before permit expiry to start flagging renewal.
compatible_agents: [generic, claude, codex]
notes: Feed discharge-readings.csv from your environmental monitoring log; an exceedance may trigger mandatory regulator notification — verify with EHS before escalating externally.
