id: professional-membership-renewal-reminder
version: 1
name: Professional Association Membership Renewal Reminder
description: >
  Warns you before your professional association or industry body
  membership (IEEE, PMI, ACM, a bar/medical/CPA license body, etc.)
  lapses. Use this if you've ever lost member pricing or a credential
  status because a renewal email got buried in your inbox.
category: learning
tags: [learning, membership, renewal, career]
schedule: "0 9 * * 1"
timezone: "America/Los_Angeles"
runner: shell
command: >
  today=$(date +%s);
  renewal_ts=$(date -d "{{renewal_date}}" +%s 2>/dev/null || date -jf "%Y-%m-%d" "{{renewal_date}}" +%s);
  days_left=$(( (renewal_ts - today) / 86400 ));
  if [ "$days_left" -le "{{warn_days}}" ] && [ "$days_left" -ge 0 ]; then echo "WARNING: {{org_name}} membership renews/expires in $days_left days ({{renewal_date}})"; exit 1;
  elif [ "$days_left" -lt 0 ]; then echo "WARNING: {{org_name}} membership renewal date ({{renewal_date}}) has passed — check status"; exit 1;
  else echo "OK: {{org_name}} membership renews in $days_left days"; fi
variables:
  org_name:
    default: "your professional association"
    description: Name of the association or licensing body.
  renewal_date:
    default: "2026-12-31"
    description: Membership renewal or expiration date (YYYY-MM-DD).
  warn_days:
    default: 30
    description: Days before renewal_date to start warning.
compatible_agents: [generic, claude, codex]
notes: >
  Zero-token. Manual renewal_date input, update it yourself after each
  renewal — this job doesn't integrate with any membership system.
