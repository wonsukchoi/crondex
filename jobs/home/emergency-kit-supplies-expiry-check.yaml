id: emergency-kit-supplies-expiry-check
version: 1
name: Emergency Kit Supplies Expiry Check
description: >
  Scans a log of your home emergency kit contents (water, food, batteries,
  medications, etc.) and flags any item whose expiry date has passed or is
  coming up soon. Use this if you've ever grabbed the emergency kit during
  a storm or outage and found the water pouches expired and the batteries
  corroded, because nobody rotates that box until it's needed.
category: home
tags: [home, safety, emergency-preparedness, reminder]
schedule: "0 9 1 */3 *"
timezone: "America/Los_Angeles"
runner: shell
command: >
  today=$(date +%s);
  awk -F, -v today="$today" -v warn={{warn_days}} '
    NR>1 {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline exp_ts; close(cmd);
      days_left = int((exp_ts - today) / 86400);
      if (days_left <= warn) print "CHECK: \"" $1 "\" in emergency kit expires/expired in " days_left " day(s) (" $2 ") — replace it.";
    }
  ' {{kit_items_csv}}
variables:
  kit_items_csv:
    default: "emergency-kit-items.csv"
    description: "CSV with header row, columns: item_name,expiry_date(YYYY-MM-DD). One row per perishable kit item (water, food, batteries, medication, etc.)."
  warn_days:
    default: 60
    description: Days before (or after) expiry to start flagging an item.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only, no destructive action. Update emergency-kit-items.csv whenever
  you restock the kit. Distinct from warranty-expiry-reminder (product
  warranties) and the detector battery-check jobs (installed devices) —
  this tracks consumable supplies stored for use during an emergency, not
  fixed equipment.
