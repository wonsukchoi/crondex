id: dock-leveler-inspection-check
version: 1
name: Dock Leveler Mechanical Inspection Check
description: >
  Checks each loading dock leveler/plate against its required periodic
  mechanical inspection date and flags any coming due or overdue. Use
  this if a dock leveler has ever failed mid-load (hydraulic drop,
  lip-plate failure) because it was assumed covered by general MHE
  maintenance when dock levelers are typically inspected on their own
  separate schedule as fixed building equipment.
category: warehousing
tags: [warehousing, dock, leveler, maintenance, safety]
schedule: "0 7 1 * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{inspection_interval_days}}" -v warn="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_inspected_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      next_due_epoch = last_inspected_epoch + (days * 86400);
      diff_days = (next_due_epoch - now_epoch) / 86400;
      if (diff_days <= warn) {
        printf "DOCK LEVELER INSPECTION DUE: %s — last inspected %s, %s-day interval (%d days until/past due)\n", $1, $2, days, diff_days;
      }
    }
  ' "{{dock_leveler_log_csv_path}}"
variables:
  dock_leveler_log_csv_path:
    default: "./dock-leveler-inspection-log.csv"
    description: "Path to a CSV with columns: dock_id,last_inspected_date (YYYY-MM-DD)."
  inspection_interval_days:
    default: 180
    description: Required mechanical inspection interval in days per manufacturer/insurer guidance.
  warn_days_before:
    default: 14
    description: How many days before the next required inspection is due to start warning.
compatible_agents: [generic, claude, codex]
notes: Distinct from `mhe-preventive-maintenance-check` (mobile equipment like pallet jacks and order pickers, not fixed dock equipment) and `rack-structural-inspection-compliance-check` (storage racking, not dock levelers).
