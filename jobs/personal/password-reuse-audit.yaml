id: password-reuse-audit
version: 1
name: Personal Password Reuse Audit
description: >
  Scans a local password manager export for passwords used identically
  across more than one account and flags how many reused entries exist.
  Use this if you suspect you've fallen back on the same password for a
  few accounts but have never actually checked.
category: personal
tags: [security, passwords, reuse, privacy, personal]
schedule: "0 9 1 */3 *"
timezone: "America/Los_Angeles"
runner: shell
command: >
  file="{{password_export_csv_path}}";
  [ -f "$file" ] || { echo "ERROR: $file not found"; exit 1; };
  total=$(($(wc -l < "$file") - 1));
  reused=$(awk -F',' 'NR>1 {print $3}' "$file" | sort | uniq -d | wc -l | tr -d ' ');
  if [ "$reused" -gt 0 ]; then
    echo "WARNING: $reused password value(s) are reused across multiple accounts (out of $total tracked). Open $file and diff the password column to find which ones.";
  else
    echo "OK: no exact password reuse detected across $total tracked account(s).";
  fi
variables:
  password_export_csv_path:
    default: "~/personal/password_export.csv"
    description: >
      Path to a plaintext CSV exported from your password manager, expected
      columns: site, username, password. Treat this file as highly
      sensitive.
compatible_agents: [generic, claude, codex]
notes: >
  SAFETY: this reads a plaintext password export directly. Only run it
  locally, store the export somewhere access-controlled, and delete it after
  the check — never commit it to a repo. Comparison happens entirely on
  your machine and nothing is sent anywhere. Only detects exact-value
  reuse, not similar/near-duplicate passwords. Distinct from
  password-breach-check-reminder.yaml, which checks external breach
  databases rather than your own vault for internal reuse.
