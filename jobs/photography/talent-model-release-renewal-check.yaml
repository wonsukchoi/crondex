id: talent-model-release-renewal-check
version: 1
name: Talent Model Release Renewal Check
description: >
  Checks signed model/talent releases that are time-limited (e.g. scoped to
  a fixed term for commercial or stock use) against their renewal or
  expiry date and flags any coming up within a notice window. Use this if
  you've ever kept using a photo or clip commercially past the date its
  model release actually authorized, putting you or a client at legal risk.
category: photography
tags: [photography, model-release, talent, compliance, renewal]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v window="{{notice_window_days}}" '
    NR==1 {next}
    {
      id=$1; talent=$2; shoot=$3; expiry=$4; usage=$5;
      if (expiry == "") { next; }
      cmd = "date -d \"" expiry "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" expiry "\" +%s 2>/dev/null";
      cmd | getline epoch; close(cmd);
      days_left = (epoch - today) / 86400;
      if (days_left <= window) {
        printf "RELEASE RENEWAL: %s — talent %s, shoot %s, expires %s (%.0f days left), usage: %s\n", id, talent, shoot, expiry, days_left, usage;
      }
    }
  ' "{{model_releases_csv_path}}"
variables:
  model_releases_csv_path:
    default: "./model-releases.csv"
    description: "Path to a CSV with columns: release_id,talent_name,shoot_id,expiry_date (YYYY-MM-DD, blank if the release is unlimited/perpetual),usage_scope."
  notice_window_days:
    default: 30
    description: How many days before a time-limited release's expiry date to flag it for renewal.
compatible_agents: [claude, codex, hermes, openclaw, generic]
notes: >
  Read-only — only flags time-limited releases nearing expiry; releases with
  a blank expiry_date are treated as unlimited/perpetual and skipped. This
  is distinct from checking for shoots that have no release on file at all.
  Stop using expired assets commercially until a renewed release is signed.
