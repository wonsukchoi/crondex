id: sedation-consent-form-completeness-check
version: 1
name: Sedation Consent Form Completeness Check
description: >
  Checks upcoming appointments scheduled with sedation or nitrous oxide
  against a signed consent-form log and flags any that don't yet have a
  matching signed form on file. Use this if a sedation appointment has ever
  gotten to the chair before anyone confirmed the consent form was actually
  signed, which is a compliance problem as much as a scheduling one.
category: dental
tags: [dental, sedation, consent, compliance, scheduling]
schedule: "0 7 * * 1-5"
timezone: "America/New_York"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v lookahead="{{lookahead_days}}" '
    NR==FNR {
      if (FNR > 1) signed[$1 "|" $2] = 1;
      next;
    }
    FNR==1 {next}
    $3 == "none" {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline appt_epoch; close(cmd);
      days_out = (appt_epoch - today) / 86400;
      if (days_out >= 0 && days_out <= lookahead) {
        key = $1 "|" $3;
        if (!(key in signed)) {
          printf "MISSING CONSENT: %s — %s appointment on %s has no signed consent form on file\n", $1, $3, $2;
        }
      }
    }
  ' "{{consent_form_log_csv_path}}" "{{sedation_appointments_csv_path}}"
variables:
  consent_form_log_csv_path:
    default: "./sedation-consent-log.csv"
    description: "Path to a CSV with columns: patient_name,sedation_type (nitrous/oral/iv) of signed consent forms on file."
  sedation_appointments_csv_path:
    default: "./sedation-appointments.csv"
    description: "Path to a CSV with columns: patient_name,appointment_date (YYYY-MM-DD),sedation_type (none/nitrous/oral/iv)."
  lookahead_days:
    default: 3
    description: How many days ahead to check upcoming sedation appointments for missing consent.
compatible_agents: [generic, claude, codex]
notes: >
  Matches on patient name and sedation type only, not form content — this is
  a "does a signed form exist" presence check, not a review of whether the
  form itself is filled out correctly.
