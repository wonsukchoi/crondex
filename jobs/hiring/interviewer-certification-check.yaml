id: interviewer-certification-check
version: 1
name: Interviewer Certification Check
description: >
  Cross-checks who's been scheduled to conduct interviews against your
  list of trained/certified interviewers and flags anyone booked who
  hasn't completed interviewer training. Use this if someone has ever
  ended up on an interview panel without having done the structured
  interviewing or bias-awareness training your process requires.
category: hiring
tags: [hiring, interviews, training, compliance]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' '
    NR==FNR { if (FNR>1) certified[$1]=1; next }
    FNR==1 { next }
    !($2 in certified) { printf "NOT CERTIFIED: %s scheduled to interview %s on %s\n", $2, $1, $3 }
  ' "{{certified_interviewers_csv_path}}" "{{interview_schedule_csv_path}}"
variables:
  certified_interviewers_csv_path:
    default: "./certified-interviewers.csv"
    description: "Path to a CSV of employees who've completed interviewer training, columns: employee_name."
  interview_schedule_csv_path:
    default: "./interview-schedule.csv"
    description: "Path to a CSV of scheduled interviews, columns: candidate_name,interviewer_name,datetime."
notes: Distinct from hr's compliance-training-completion-check, which tracks general employee compliance training rather than interviewer-specific certification tied to who's actually booked on panels.
compatible_agents: [generic, claude, codex]
