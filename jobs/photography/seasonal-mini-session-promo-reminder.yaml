id: seasonal-mini-session-promo-reminder
version: 1
name: Seasonal Mini-Session Promo Reminder
description: >
  Flags past clients who haven't booked a seasonal mini-session in over a
  set number of months and drafts a promo outreach message inviting them
  back. Use this if a seasonal mini-session slot has ever gone unbooked
  because past clients were never reminded it was that time of year again.
category: photography
tags: [photography, mini-sessions, seasonal, promo, sales]
schedule: "0 9 1 * *"
timezone: "UTC"
runner: hybrid
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v months="{{mini_session_interval_months}}" '
    NR==1 {next}
    {
      id=$1; name=$2; contact=$3; last=$4;
      if (last == "") {
        printf "PROMO CANDIDATE: %s (%s) — no mini-session on record\n", id, name;
        next;
      }
      cmd = "date -d \"" last "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" last "\" +%s 2>/dev/null";
      cmd | getline epoch; close(cmd);
      days_since = (today - epoch) / 86400;
      if (days_since > months * 30) {
        printf "PROMO CANDIDATE: %s (%s) — last mini-session %s (%.0f days ago)\n", id, name, last, days_since;
      }
    }
  ' "{{past_clients_csv_path}}"
prompt: >
  Read the past clients at {{past_clients_csv_path}} (columns: client_id,
  client_name, contact_info, last_mini_session_date, left blank if they've
  never booked one). Identify every client whose last_mini_session_date is
  more than {{mini_session_interval_months}} months ago, or blank. For each
  one, draft a short, friendly promo message announcing the current
  seasonal mini-session offering and inviting them to book a slot, using
  their name. Group the drafts by how long it's been since their last
  session, longest first — do not send anything.
script_note: >
  The command gives you a zero-token list of clients overdue for (or
  missing) a seasonal mini-session with day counts; only the prompt drafts
  the personalized promo outreach messages.
variables:
  past_clients_csv_path:
    default: "./past-clients.csv"
    description: "Path to a CSV with columns: client_id,client_name,contact_info,last_mini_session_date (YYYY-MM-DD, blank if never)."
  mini_session_interval_months:
    default: 12
    description: How many months without a seasonal mini-session before a past client is flagged as a promo candidate.
compatible_agents: [claude, codex, hermes, openclaw, generic]
notes: Draft-only — review and personalize the promo messages before sending through your usual SMS/email tool.
