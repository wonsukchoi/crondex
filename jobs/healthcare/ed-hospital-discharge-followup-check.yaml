id: ed-hospital-discharge-followup-check
version: 1
name: ED/Hospital Discharge Follow-Up Check
description: >
  Checks patients discharged from the emergency department or an inpatient
  stay for ones who don't have a primary-care or specialist follow-up
  appointment booked within the recommended window. Use this if a patient
  has ever bounced back to the ED for something a timely follow-up visit
  could have caught, because nobody in the practice was tracking who'd been
  discharged and needed a post-discharge visit scheduled.
category: healthcare
tags: [healthcare, care-coordination, discharge, follow-up, readmission]
schedule: "0 8 * * 1-5"
timezone: "America/New_York"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v window="{{followup_window_days}}" '
    NR==1 {next}
    $4 != "" {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline discharge_epoch; close(cmd);
      days_since = (today - discharge_epoch) / 86400;
      if (days_since >= 0 && days_since <= window) {
        printf "NO FOLLOW-UP BOOKED: %s — discharged %s (%s), %d of %d days elapsed, no visit scheduled\n", $1, $2, $3, days_since, window;
      } else if (days_since > window) {
        printf "FOLLOW-UP WINDOW MISSED: %s — discharged %s (%s), %d days elapsed, still no visit scheduled\n", $1, $2, $3, days_since;
      }
    }
  ' "{{discharges_csv_path}}"
variables:
  discharges_csv_path:
    default: "./ed-hospital-discharges.csv"
    description: "Path to a CSV with columns: patient_id,discharge_date (YYYY-MM-DD),discharge_reason (e.g. chf-exacerbation, pneumonia, fall),followup_scheduled_date (blank if not yet booked)."
  followup_window_days:
    default: 7
    description: Recommended number of days after discharge within which a follow-up visit should be scheduled.
compatible_agents: [generic, claude, codex]
notes: >
  Assumes the practice already receives discharge notifications (via HIE
  feed export, fax log, or manual entry) as a CSV — this job doesn't pull
  from a hospital system itself. Read-only triage list for staff to book
  appointments from; it does not contact the patient or the hospital.
