id: board-member-term-expiry-check
version: 1
name: Board Member Term Expiry Check
description: >
  Checks board roster term-end dates and flags members approaching the
  end of their term with no renewal or replacement decided yet. Use this
  if a board seat has ever gone stale — someone stayed on past their term
  by default, or a seat sat empty — because nobody was tracking term
  dates.
category: nonprofit
tags: [nonprofit, board, governance]
schedule: "0 9 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn={{warn_days}} '
    NR>1 && $3 == "pending" {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline term_end_ts; close(cmd);
      days_left = int((term_end_ts - today) / 86400);
      if (days_left <= warn && days_left >= 0) print "TERM EXPIRING: " $1 " — term ends " $2 " (" days_left " days left, renewal decision pending)";
    }
  ' "{{board_roster_csv}}"
variables:
  board_roster_csv:
    default: "board-roster.csv"
    description: "CSV with header row, columns: member_name,term_end_date(YYYY-MM-DD),renewal_status(pending/renewed/not-renewing)."
  warn_days:
    default: 60
    description: Days before a member's term ends to start warning if renewal_status is still pending.
compatible_agents: [generic, claude, codex]
notes: Update renewal_status once the board or governance committee decides each member's next term, so this stops flagging that seat.
