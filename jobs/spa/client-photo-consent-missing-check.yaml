id: client-photo-consent-missing-check
version: 1
name: Before/After Photo Marketing Consent Missing Check
description: >
  Cross-references the log of clients photographed for before/after or
  marketing purposes against the signed photo-release consent list,
  flagging any client whose photos were taken or used without a
  matching signed release on file. Use this if a medspa or laser clinic
  has ever posted a before/after photo to social media or a website
  gallery and only later wondered whether that client had actually
  signed a release for marketing use.
category: spa
tags: [spa, medspa, consent, marketing, compliance, privacy]
schedule: "0 15 * * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' '
    BEGIN { while ((getline line < "{{consent_forms_csv_path}}") > 0) {
      n++; split(line, f, ","); cname[n]=f[1]; signed[n]=tolower(f[2]);
    } close("{{consent_forms_csv_path}}") }
    NR==FNR { next }
    FNR==1 { next }
    {
      if ($3 == "marketing") {
        found=0;
        for (i=1; i<=n; i++) {
          if ($1 == cname[i] && signed[i] == "yes") { found=1; }
        }
        if (found == 0) {
          printf "MISSING PHOTO CONSENT: %s — photographed %s for marketing use, no signed release on file\n", $1, $2;
        }
      }
    }
  ' "{{consent_forms_csv_path}}" "{{photo_log_csv_path}}"
variables:
  photo_log_csv_path:
    default: "./client-photo-log.csv"
    description: "Path to a CSV with columns: client_name,photo_date (YYYY-MM-DD),purpose (marketing or clinical-only)."
  consent_forms_csv_path:
    default: "./photo-release-consents.csv"
    description: "Path to a CSV with columns: client_name,release_signed (yes/no)."
compatible_agents: [generic, claude, codex]
notes: >
  Photos logged as clinical-only are intentionally skipped — this job
  only flags marketing-intended photos. It never removes or unpublishes
  anything; a human must confirm and pull any already-posted image
  before contacting the client. Distinct from
  high-risk-treatment-waiver-missing-check.yaml, which covers treatment
  consent/liability waivers, not photo/marketing release forms, and from
  intake-form-staleness-check.yaml, which covers general intake form age.
