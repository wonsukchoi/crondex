id: incident-postmortem-action-item-check
version: 1
name: Incident Postmortem Action Item Check
description: >
  Checks a logged postmortem action-item tracker for open items past
  their due date and flags them. Use this if a postmortem has ever
  produced a solid list of follow-up fixes that then quietly never got
  done — distinct from repo-health-check.yaml, which audits repository
  hygiene in general, not incident-specific remediation commitments.
category: devops
tags: [devops, incident, postmortem, follow-up, reliability]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' '
    NR==1 {next}
    $4 == "open" {
      cmd = "date -d \"" $3 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $3 "\" +%s 2>/dev/null";
      cmd | getline due_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      if (now_epoch > due_epoch) {
        printf "OVERDUE: [%s] %s was due %s\n", $1, $2, $3;
        overdue++;
      }
    }
    END { printf "%d overdue postmortem action item(s).\n", overdue+0; }
  ' "{{action_items_csv_path}}"
variables:
  action_items_csv_path:
    default: "./postmortem_action_items.csv"
    description: "Path to a CSV with columns: incident_id,action_item,due_date (YYYY-MM-DD),status (open/done)."
compatible_agents: [generic, claude, codex]
notes: Zero-token follow-up tracker — pair with whatever tool actually owns the incident/postmortem record as the source of truth.
