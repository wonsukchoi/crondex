id: vehicle-emissions-test-due-check
version: 1
name: Vehicle Emissions/Smog Test Due Check
description: >
  Checks fleet vehicles against their state emissions or smog test due
  dates and warns before any lapse. Use this if a vehicle has ever failed
  a registration renewal because its separate emissions certification
  quietly expired and nobody was tracking it apart from the registration
  itself.
category: fleet
tags: [fleet, emissions, smog, compliance]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline expiry_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      diff_days = (expiry_epoch - now_epoch) / 86400;
      if (diff_days <= days) {
        printf "EMISSIONS TEST DUE: %s — due %s (%d days)\n", $1, $2, diff_days;
      }
    }
  ' "{{emissions_csv_path}}"
variables:
  emissions_csv_path:
    default: "./vehicle-emissions-tests.csv"
    description: "Path to a CSV with columns: vehicle_id,emissions_test_due_date (YYYY-MM-DD)."
  warn_days_before:
    default: 30
    description: How many days before the emissions/smog test is due to start warning.
compatible_agents: [generic, claude, codex]
notes: Not every jurisdiction or vehicle type requires a separate emissions test — leave rows blank or skip this job for vehicles/regions where it doesn't apply. Distinct from `vehicle-inspection-due-check` (safety/DOT inspection) and `vehicle-registration-expiry-check` (registration renewal).
