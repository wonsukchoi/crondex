id: facility-license-renewal-deadline-check
version: 1
name: Facility License Renewal Deadline Check
description: >
  Checks your center's state childcare license, food service permit, and
  any other facility-level licenses against their renewal deadlines and
  warns before one lapses. Use this if a facility license has ever come
  up for renewal without enough lead time to get the paperwork and
  inspection done before the old one expired.
category: childcare
tags: [childcare, licensing, facility, compliance]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline expiry_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      diff_days = (expiry_epoch - now_epoch) / 86400;
      if (diff_days <= days) {
        printf "RENEWAL DUE: %s — expires %s (%d days)\n", $1, $2, diff_days;
      }
    }
  ' "{{facility_licenses_csv_path}}"
variables:
  facility_licenses_csv_path:
    default: "./facility-licenses.csv"
    description: "Path to a CSV with columns: license_name (e.g. state childcare license, food service permit, fire safety permit),expiry_date (YYYY-MM-DD)."
  warn_days_before:
    default: 60
    description: How many days before a license expires to start warning — facility renewals often need an inspection scheduled well ahead of the deadline.
compatible_agents: [generic, claude, codex]
notes: A lapsed facility license can force a center to close until renewed — treat this as higher-urgency than an individual staff certification.
