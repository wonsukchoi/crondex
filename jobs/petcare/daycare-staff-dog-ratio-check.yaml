id: daycare-staff-dog-ratio-check
version: 1
name: Daycare Playgroup Staff-to-Dog Ratio Check
description: >
  Compares the number of dogs checked into each daycare playgroup against
  the staff assigned to supervise it and flags any group over your target
  ratio. Use this if you've ever had a playgroup get too crowded for the
  handlers on the floor before anyone noticed.
category: petcare
tags: [petcare, daycare, playgroup, staffing, safety, ratio]
schedule: "0 9,13 * * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v target="{{max_dogs_per_staff}}" '
    NR==1 {next}
    {
      group[$1] += 1;
      staff[$1] = $3;
    }
    END {
      for (g in group) {
        ratio = (staff[g] > 0) ? group[g] / staff[g] : 999;
        printf "%s: %d dog(s), %d staff (ratio %.1f:1)\n", g, group[g], staff[g], ratio;
        if (ratio > target) printf "ALERT: %s exceeds target ratio of %s:1 — add staff or move dogs to another group\n", g, target;
      }
    }
  ' "{{playgroups_csv_path}}"
variables:
  playgroups_csv_path:
    default: "./playgroups.csv"
    description: "Path to a CSV with columns: group_name,dog_name,staff_count (staff_count repeated per row for that group)."
  max_dogs_per_staff:
    default: 10
    description: Target maximum number of dogs per staff member in a single playgroup.
compatible_agents: [generic, claude, codex]
notes: Ratio target is a starting point — check local licensing requirements, which may mandate a stricter ratio than your own default.
