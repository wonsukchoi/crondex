id: emergency-contact-information-currency-check
version: 1
name: Emergency Contact Information Currency Check
description: >
  Checks how long it's been since each child's emergency contact
  information was last verified with the family and flags anyone overdue
  for a re-confirmation. Use this if a phone number on an emergency card
  has ever turned out to be disconnected or years stale right when someone
  actually needed to make the call — distinct from
  parent-pickup-authorization-verification-check, which tracks who's
  allowed to pick a child up, not whether the contact numbers on file
  still work.
category: childcare
tags: [childcare, emergency-contact, safety, compliance]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v days="{{verify_interval_days}}" -v today="$today" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_epoch; close(cmd);
      age_days = (today - last_epoch) / 86400;
      if (age_days >= days) {
        printf "STALE CONTACT INFO: %s — last verified %s (%d days ago)\n", $1, $2, age_days;
      }
    }
  ' "{{emergency_contacts_csv_path}}"
variables:
  emergency_contacts_csv_path:
    default: "./emergency-contacts.csv"
    description: "Path to a CSV with columns: child_id,last_verified_date (YYYY-MM-DD)."
  verify_interval_days:
    default: 180
    description: How many days since the last verification before contact info counts as stale and due for re-confirmation.
compatible_agents: [generic, claude, codex]
notes: A flagged child needs an actual phone call or updated form from the family, not just a note in a file — this only tells you who's due for re-verification, it doesn't verify anything itself.
