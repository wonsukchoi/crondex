id: stale-ssh-key-cleanup-check
version: 1
name: Stale SSH Key Cleanup Check
description: >
  Flags SSH public keys on servers or a git hosting platform that haven't
  been used in a configurable number of days, as candidates for
  revocation. Use this if a former contractor's SSH key has ever stayed
  active on a box or repo long after their engagement ended because
  nobody was tracking last-used dates.
category: security
tags: [security, ssh, access-review, offboarding]
schedule: "0 9 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F, -v today="$today" -v stale={{stale_days}} '
    NR>1 {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline last_used_ts; close(cmd);
      days_idle = int((today - last_used_ts) / 86400);
      if (days_idle >= stale) print "STALE: key \"" $1 "\" unused for " days_idle " days (last used: " $2 ")";
    }
  ' {{keys_csv}}
variables:
  keys_csv:
    default: "ssh-key-usage.csv"
    description: "CSV with header row, columns: key_fingerprint_or_label,last_used_date(YYYY-MM-DD). Build with `ssh-keygen -lf` plus auth log parsing, or export last-used timestamps from your git hosting platform's SSH key settings."
  stale_days:
    default: 90
    description: Days of inactivity before a key is flagged as a revocation candidate.
compatible_agents: [generic, claude, codex]
notes: >
  Zero-token. Populate ssh-key-usage.csv from `last` / auth.log analysis
  on servers, or from your git hosting platform's API (e.g. GitHub's
  list-ssh-signing-keys / list-public-keys-for-user with last-used data
  where available). This only flags candidates for a human to review; it
  does not remove keys automatically.
