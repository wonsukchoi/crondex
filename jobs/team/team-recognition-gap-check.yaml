id: team-recognition-gap-check
version: 1
name: Team Recognition Gap Check
description: >
  Scans a team recognition/kudos log and flags anyone who hasn't
  received public recognition in a while. Use this if praise on your
  team tends to cluster on the same few loud wins while quieter,
  steady contributors go months without ever being acknowledged.
category: team
tags: [team, recognition, kudos, morale, engagement]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v max_days="{{max_days_since_recognition}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_epoch; close(cmd);
      days_since = (today - last_epoch) / 86400;
      if (days_since >= max_days) {
        printf "GAP: %s — last recognized %s (%d day(s) ago)\n", $1, $2, days_since;
      }
    }
  ' "{{recognition_log_csv_path}}"
variables:
  recognition_log_csv_path:
    default: "./team-recognition-log.csv"
    description: "Path to a CSV with columns: person_name,last_recognition_date (YYYY-MM-DD) — the last time this person received public recognition/kudos (shoutout channel, kudos tool, recognition program)."
  max_days_since_recognition:
    default: 60
    description: Flag a person if they haven't been recognized in this many days.
compatible_agents: [claude, codex, hermes, openclaw, generic]
notes: >
  Zero-token. Surfaces who's gone quiet on recognition, not whether
  their work merited a shoutout — use judgment (and actual context)
  before publicly calling anyone out for going unrecognized.
