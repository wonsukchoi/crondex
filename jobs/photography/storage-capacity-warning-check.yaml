id: storage-capacity-warning-check
version: 1
name: Storage Capacity Warning Check
description: >
  Checks available storage capacity across the studio's local drives and
  mounted NAS volumes against a warning threshold. Use this if you've ever
  had a shoot import fail mid-busy-season because nobody noticed the drive
  was almost full.
category: photography
tags: [photography, storage, backup, capacity]
schedule: "0 */6 * * *"
timezone: "UTC"
runner: shell
command: >
  threshold="{{warning_threshold_percent}}";
  df -P {{storage_paths}} | awk -v threshold="$threshold" '
    NR==1 {next}
    {
      used_pct = $5;
      gsub(/%/, "", used_pct);
      if (used_pct + 0 >= threshold + 0) {
        printf "LOW STORAGE: %s mounted at %s — %s%% used (%s available)\n", $1, $6, used_pct, $4;
      }
    }
  '
variables:
  storage_paths:
    default: "/mnt/studio-nas /Volumes/StudioDrive"
    description: Space-separated list of mount points/drives to check (local disks, external drives, NAS mounts).
  warning_threshold_percent:
    default: 85
    description: Percent used at or above which a drive is flagged as running low on space.
compatible_agents: [claude, codex, hermes, openclaw, generic]
notes: Read-only job — it only reports drives crossing the warning threshold, it doesn't delete or move files. Adjust storage_paths to match the mount points actually used by your editing workstations and NAS.
