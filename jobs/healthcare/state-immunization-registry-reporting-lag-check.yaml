id: state-immunization-registry-reporting-lag-check
version: 1
name: State Immunization Registry Reporting Lag Check
description: >
  Checks administered vaccinations against a state immunization
  registry submission log and flags doses not yet reported within the
  required window. Use this if a required state registry submission
  has ever quietly fallen behind because it's a separate step from
  charting the vaccination itself — distinct from
  patient-immunization-schedule-check.yaml, which flags patients due
  for a vaccine, not whether an already-given dose was reported
  upstream to the state.
category: healthcare
tags: [healthcare, immunization, registry, reporting, compliance]
schedule: "0 9 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v max_days="{{max_reporting_lag_days}}" '
    NR==1 {next}
    $4 == "no" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline admin_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      age_days = (now_epoch - admin_epoch) / 86400;
      if (age_days > max_days+0) {
        printf "UNREPORTED: %s vaccine (%s) given %s, not yet reported to state registry (%d day(s))\n", $1, $3, $2, age_days;
        n++;
      }
    }
    END { printf "%d administered dose(s) overdue for state registry reporting.\n", n+0; }
  ' "{{immunization_log_csv_path}}"
variables:
  immunization_log_csv_path:
    default: "./immunization_administration_log.csv"
    description: "Path to a CSV with columns: patient_name,administered_date (YYYY-MM-DD),vaccine_name,reported_to_registry (yes/no)."
  max_reporting_lag_days:
    default: 3
    description: Days after administration before an unreported dose is flagged.
compatible_agents: [generic, claude, codex]
notes: Zero-token compliance check — actual submission still needs to go through the state's registry interface or manual entry portal.
