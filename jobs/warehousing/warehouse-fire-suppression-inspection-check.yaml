id: warehouse-fire-suppression-inspection-check
version: 1
name: Warehouse Fire Suppression Inspection Due Check
description: >
  Checks sprinkler, fire pump, and fire suppression inspection records
  against the required inspection interval and flags any system overdue.
  Use this if a fire-suppression inspection has ever lapsed quietly
  because it was buried in a facilities spreadsheet nobody reviewed.
category: warehousing
tags: [warehousing, fire-safety, sprinkler, compliance, inspection]
schedule: "0 7 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v days="{{inspection_interval_days}}" -v today="$today" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_inspect_epoch; close(cmd);
      age_days = (today - last_inspect_epoch) / 86400;
      if (age_days >= days) {
        printf "OVERDUE: system %s (%s) — last inspected %s (%d days ago)\n", $1, $3, $2, age_days;
      }
    }
  ' "{{fire_suppression_log_csv_path}}"
variables:
  fire_suppression_log_csv_path:
    default: "./fire-suppression-log.csv"
    description: "Path to a CSV with columns: system_id,last_inspection_date (YYYY-MM-DD),system_type."
  inspection_interval_days:
    default: 90
    description: Maximum days allowed between fire suppression system inspections before it is flagged overdue.
compatible_agents: [generic, claude, codex]
notes: >
  Covers sprinkler heads, fire pumps, and suppression system inspection
  cadence only — pair with a separate program for fire extinguisher
  spot checks and local AHJ fire-marshal filing deadlines.
