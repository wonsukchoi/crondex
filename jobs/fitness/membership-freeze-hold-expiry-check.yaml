id: membership-freeze-hold-expiry-check
version: 1
name: Membership Freeze/Hold Expiry Check
description: >
  Checks paused or frozen memberships against their scheduled resume date
  and flags the ones ending soon, so billing and access resume as
  expected instead of surprising the member. Use this if a member has
  ever been charged full price the moment their freeze ended with zero
  warning, or kept frozen past when they meant to come back.
category: fitness
tags: [fitness, membership, freeze, billing, members]
schedule: "0 7 * * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline resume_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      diff_days = (resume_epoch - now_epoch) / 86400;
      if (diff_days <= days && diff_days >= 0) {
        printf "FREEZE ENDING: %s — resumes %s (%d days), reason: %s\n", $1, $2, diff_days, $3;
      }
    }
  ' "{{freezes_csv_path}}"
variables:
  freezes_csv_path:
    default: "./membership-freezes.csv"
    description: "Path to a CSV with columns: member_name,resume_date (YYYY-MM-DD),freeze_reason."
  warn_days_before:
    default: 5
    description: How many days before a freeze ends to start warning, giving time to send a reminder before billing and access resume.
compatible_agents: [generic, claude, codex]
notes: A courtesy heads-up before a freeze lifts (rather than a surprise charge) is a small thing that noticeably cuts "why was I charged" disputes.
