id: reorder-point-staleness-check
version: 1
name: Reorder Point Staleness Check
description: >
  Flags SKUs whose reorder point hasn't been recalculated in a long time
  while their sales velocity has meaningfully changed, so the trigger
  for reordering no longer matches how fast the item actually sells. Use
  this if a reorder point has ever gone stale after a product got
  slower or faster, leading to either a stockout or a pile of unneeded
  stock.
category: inventory
tags: [inventory, reorder-point, staleness, procurement]
schedule: "0 6 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v max_age="{{max_age_days}}" -v drift="{{velocity_drift_pct}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_set_epoch; close(cmd);
      age_days = (today - last_set_epoch) / 86400;
      old_v = $3+0; new_v = $4+0;
      velocity_change_pct = (old_v > 0) ? (((new_v - old_v) / old_v) * 100 < 0 ? -((new_v-old_v)/old_v)*100 : ((new_v-old_v)/old_v)*100) : 0;
      if (age_days >= max_age && velocity_change_pct >= drift) {
        printf "STALE REORDER POINT: %s — last set %s (%d days ago), velocity changed %.1f%%\n", $1, $2, age_days, velocity_change_pct;
      }
    }
  ' "{{reorder_points_csv_path}}"
variables:
  reorder_points_csv_path:
    default: "./reorder-points.csv"
    description: "Path to a CSV with columns: sku,reorder_point_last_set_date (YYYY-MM-DD),velocity_at_last_set,current_velocity."
  max_age_days:
    default: 180
    description: Days since the reorder point was last recalculated before it's eligible to be flagged.
  velocity_drift_pct:
    default: 25
    description: Absolute percent change in sales velocity (up or down) since the reorder point was set that triggers a flag.
compatible_agents: [generic, claude, codex]
notes: Distinct from `low-stock-alert` (checks current stock against the reorder point as-is) and `supplier-lead-time-drift-check` (tracks the supplier side) — this checks whether the reorder point number itself needs recalculating.
