id: referral-bonus-payout-reminder
version: 1
name: Referral Bonus Payout Reminder
description: >
  Tracks employee-referred hires against their bonus payout milestone
  (e.g. 90 days employed) and flags anyone due so payroll can be told.
  Use this if a referral bonus has ever gone unpaid for months because
  nobody tracked the milestone date after the hire started.
category: hiring
tags: [hiring, recruiting, referrals, payroll]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v milestone="{{milestone_days}}" '
    NR==1 {next}
    $4 != "paid" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline start_epoch; close(cmd);
      days_employed = (today - start_epoch) / 86400;
      if (days_employed >= milestone) {
        printf "DUE: %s referred by %s — hired %s (%d days employed), bonus not yet marked paid\n", $1, $3, $2, days_employed;
      }
    }
  ' "{{referrals_csv_path}}"
variables:
  referrals_csv_path:
    default: "./referral-hires.csv"
    description: "Path to a CSV with columns: hired_candidate_name,start_date (YYYY-MM-DD),referring_employee,payout_status (pending/paid)."
  milestone_days:
    default: 90
    description: Days the referred hire must be employed before the referral bonus is due.
compatible_agents: [generic, claude, codex]
notes: Read-only reminder — actually running payroll or updating payout_status is a separate step for HR/finance.
