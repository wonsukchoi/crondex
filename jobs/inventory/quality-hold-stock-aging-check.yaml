id: quality-hold-stock-aging-check
version: 1
name: Quality Hold Stock Aging Check
description: >
  Flags inventory sitting on a quality/QA hold, quarantine, or
  recall-pending status for longer than a set number of days without a
  disposition decision (release, return to supplier, or scrap). Use
  this if stock has ever sat untouched on "hold" for weeks because
  nobody owned deciding what to do with it, tying up space and value in
  the meantime.
category: inventory
tags: [inventory, quality-hold, quarantine, compliance]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v max_days="{{max_days_on_hold}}" '
    NR==1 {next}
    $4 != "" {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline hold_start_epoch; close(cmd);
      days_on_hold = (today - hold_start_epoch) / 86400;
      if (days_on_hold >= max_days) {
        printf "AGING HOLD: %s — reason %s, on hold %d days (since %s), no disposition yet\n", $1, $3, days_on_hold, $2;
      }
    }
  ' "{{quality_hold_log_csv_path}}"
variables:
  quality_hold_log_csv_path:
    default: "./quality-hold-log.csv"
    description: "Path to a CSV with columns: sku,hold_start_date (YYYY-MM-DD),hold_reason,disposition_date (blank if not yet resolved)."
  max_days_on_hold:
    default: 14
    description: Days a SKU can sit on hold before it's flagged as needing a disposition decision.
compatible_agents: [generic, claude, codex]
notes: Covers stock held for quality/QA/recall reasons pending a decision, not in-facility handling damage — distinct from `warehouse-damage-writeoff-review`, which reviews damage incidents and their likely causes rather than open quality holds of any origin.
