id: database-long-running-transaction-check
version: 1
name: Database Long-Running Transaction Check
description: >
  Queries a Postgres database for transactions (including
  idle-in-transaction sessions) that have been open longer than a
  configurable threshold and flags them. Use this if a forgotten open
  transaction or a session left idle-in-transaction has ever held locks
  and blocked autovacuum or a routine migration for hours before anyone
  traced the stall back to it — distinct from
  database-connection-pool-exhaustion-check.yaml, which counts total
  connections against the pool's max, not how long any single
  transaction has stayed open.
category: devops
tags: [devops, database, postgres, transactions, locks, maintenance]
schedule: "*/15 * * * *"
timezone: "UTC"
runner: shell
command: >
  psql "{{database_url}}" -t -A -F'|' -c "select pid, state, coalesce(usename,''), round(extract(epoch from (now() - xact_start))) as txn_age_seconds, left(coalesce(query,''), 80) from pg_stat_activity where xact_start is not null and now() - xact_start > interval '{{max_txn_age_minutes}} minutes' order by xact_start;" |
  awk -F'|' '
    { printf "LONG-RUNNING TXN: pid=%s state=%s user=%s age=%ss query=%s\n", $1, $2, $3, $4, $5; n++ }
    END { if (n+0 == 0) print "OK: no transactions open longer than the threshold"; }
  '
variables:
  database_url:
    default: "postgres://user:pass@host:5432/db"
    description: Connection string for the database to check.
  max_txn_age_minutes:
    default: 15
    description: Minutes a transaction can stay open (including idle-in-transaction) before it's flagged.
compatible_agents: [generic, claude, codex]
notes: >
  Written for Postgres using `pg_stat_activity`; adjust the query for
  another engine (e.g. `information_schema.innodb_trx` for MySQL) if
  different. Read-only: only reads session/transaction state, never
  calls `pg_terminate_backend` or `pg_cancel_backend` — killing a flagged
  transaction is a deliberate follow-up action, not something this job
  does automatically.
