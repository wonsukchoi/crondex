id: binding-estimate-follow-up-drafts
version: 1
name: Binding Estimate Follow-Up Drafts
description: >
  Reviews binding and non-binding moving estimates sent to prospects and
  drafts a friendly follow-up message for anyone who hasn't booked their
  move within a set number of days. Use this if an estimate has ever gone
  out to a prospect and then quietly disappeared because nobody remembered
  to check back in before they booked with a competitor.
category: moving-relocation
tags: [moving-relocation, sales, estimates, follow-up]
schedule: "0 9 * * 1-5"
timezone: "UTC"
runner: agent-prompt
prompt: >
  Read the moving estimates at {{estimates_csv_path}} (columns:
  estimate_id, prospect_name, contact_email, estimate_date, estimate_type,
  requested_move_date, quoted_amount, status). Find every estimate with
  status "sent" whose estimate_date is more than {{follow_up_after_days}}
  days ago. For each one, draft a short, friendly follow-up message from
  the sales coordinator that reminds the prospect whether this was a
  binding or non-binding estimate, restates the quoted amount, notes
  their requested move date if it's coming up soon, and asks whether
  they're ready to lock in a crew and truck. Group the drafts under a
  short summary of how many estimates are stalled, their total dollar
  value, and which ones have a requested move date within
  {{urgent_move_date_days}} days so those get prioritized first.
variables:
  estimates_csv_path:
    default: "./moving-estimates.csv"
    description: "Path to a CSV with columns: estimate_id,prospect_name,contact_email,estimate_date,estimate_type (binding or non-binding),requested_move_date,quoted_amount,status (sent, booked, declined)."
  follow_up_after_days:
    default: 4
    description: Number of days an estimate can sit with status "sent" before it triggers a follow-up draft.
  urgent_move_date_days:
    default: 14
    description: If the prospect's requested move date is within this many days, their follow-up draft is flagged as urgent/priority.
compatible_agents: [claude, codex, generic]
notes: Draft-only — messages should be reviewed and personalized by a person before sending, not sent automatically.
