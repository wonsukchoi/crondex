id: oncall-stipend-payout-check
version: 1
name: On-Call Stipend Payout Check
description: >
  Checks a log of on-call stipends against payout status and flags any
  that are still marked pending well after the shift happened. Use
  this if someone has ever covered an on-call rotation and had to
  personally chase down payroll weeks later because their stipend
  quietly never got processed.
category: team
tags: [team, oncall, compensation, payroll]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v max_days="{{max_days_before_flag}}" '
    NR==1 {next}
    $4 == "pending" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline shift_epoch; close(cmd);
      days_since = (today - shift_epoch) / 86400;
      if (days_since >= max_days) {
        printf "UNPAID: %s — $%s stipend for on-call shift on %s (%d day(s) ago, still pending)\n", $1, $3, $2, days_since;
      }
    }
  ' "{{oncall_stipend_csv_path}}"
variables:
  oncall_stipend_csv_path:
    default: "./oncall-stipend-log.csv"
    description: "Path to a CSV with columns: person_name,shift_date (YYYY-MM-DD),stipend_amount,payout_status (pending/paid)."
  max_days_before_flag:
    default: 30
    description: Flag a stipend as overdue if it's still pending this many days after the shift date.
compatible_agents: [claude, codex, hermes, openclaw, generic]
notes: >
  Zero-token. Distinct from on-call-fatigue-check (rotation fairness)
  and oncall-handoff-reminder (per-shift sync) — this checks that
  compensation owed for on-call work actually gets paid out. Assumes
  a maintained stipend log; doesn't integrate with payroll directly.
