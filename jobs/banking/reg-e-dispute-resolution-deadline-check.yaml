id: reg-e-dispute-resolution-deadline-check
version: 1
name: Regulation E Dispute Resolution Deadline Check
description: >
  Tracks open Regulation E electronic-transfer error disputes against
  their required resolution deadline (typically 10 business days, up to
  45 for certain cases) and flags ones at risk of missing it. Use this
  if a Reg E dispute has ever blown past its deadline unnoticed, which
  exposes the bank to a compliance violation and forces provisional
  credit rules to kick in regardless of the investigation's outcome.
category: banking
tags: [banking, regulation-e, dispute, compliance, deadline]
schedule: "0 7 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v warn="{{warn_days_before_deadline}}" '
    NR==1 { next }
    $5 == "OPEN" {
      deadline_days = ($4 != "" ? $4 : {{default_deadline_business_days}});
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline filed_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      elapsed_days = int((now_epoch - filed_epoch) / 86400);
      remaining = deadline_days - elapsed_days;
      if (remaining <= warn) {
        status = (remaining < 0) ? "PAST DEADLINE" : "AT RISK";
        printf "%s: dispute %s (account %s) filed %s — %d of %d business/day allowance elapsed\n", status, $1, $3, $2, elapsed_days, deadline_days;
        n++;
      }
    }
    END { printf "%d open Reg E dispute(s) at risk of or past their resolution deadline.\n", n+0; }
  ' "{{reg_e_disputes_csv_path}}"
variables:
  reg_e_disputes_csv_path:
    default: "./reg_e_disputes.csv"
    description: "Path to a CSV with columns: dispute_id,filed_date (YYYY-MM-DD),account_number,deadline_days (blank to use default),status (OPEN or RESOLVED)."
  default_deadline_business_days:
    default: 10
    description: Default resolution deadline in days used when a dispute row doesn't specify one (extend to 45 for cases eligible for extended investigation, e.g. new accounts or POS/foreign transactions, per Reg E).
  warn_days_before_deadline:
    default: 3
    description: How many days of remaining allowance triggers an at-risk flag.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only compliance tracker — does not issue provisional credit or
  resolve disputes itself. Deadline elapsed-day counting here is
  calendar-day based; align with your institution's business-day
  calculation and any extended-investigation eligibility rules before
  treating flags as final.
