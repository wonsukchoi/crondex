id: internal-mobility-application-tracker
version: 1
name: Internal Mobility Application Tracker
description: >
  Flags internal employees who applied to an open req but whose current
  manager still hasn't been notified within your policy window, the step
  most internal-transfer processes require before the candidate can move
  forward. Use this if an internal transfer has ever stalled — or blown up
  a manager relationship — because the manager found out about the
  application late, or not from the right person.
category: hiring
tags: [hiring, internal-mobility, recruiting, employees]
schedule: "0 9 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v sla="{{notify_sla_days}}" '
    NR==1 {next}
    $4 == "" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline applied_epoch; close(cmd);
      days_waiting = (today - applied_epoch) / 86400;
      if (days_waiting >= sla) {
        printf "MANAGER NOT NOTIFIED: %s applied to %s on %s (%d days ago)\n", $1, $3, $2, days_waiting;
      }
    }
  ' "{{internal_applicants_csv_path}}"
variables:
  internal_applicants_csv_path:
    default: "./internal-applicants.csv"
    description: "Path to a CSV with columns: employee_name,applied_date (YYYY-MM-DD),req_title,manager_notified_date (blank if not yet notified)."
  notify_sla_days:
    default: 3
    description: Days after an internal application before the current manager should have been notified, per policy.
compatible_agents: [generic, claude, codex]
notes: Distinct from application-first-response-sla-check, which covers general applicant response time — this tracks the manager-notification step that's specific to internal-transfer policy, not applicable to external candidates.
