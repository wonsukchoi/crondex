id: fall-risk-assessment-schedule-compliance-check
version: 1
name: Fall Risk Assessment Schedule Compliance Check
description: >
  Checks each resident's most recent standardized fall-risk assessment
  (e.g. Morse Fall Scale) against the required reassessment interval and
  flags anyone whose assessment is due or overdue. Use this if you want
  to catch a stale fall-risk score before it's relied on to set care
  interventions, separate from investigating a fall that already
  happened.
category: senior-living
tags: [senior-living, falls, risk-assessment, resident-care, compliance]
schedule: "0 7 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v interval="{{reassessment_interval_days}}" -v lead="{{lookahead_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_epoch; close(cmd);
      days_since = (today - last_epoch) / 86400;
      days_until_due = interval - days_since;
      if (days_until_due <= lead) {
        printf "DUE: %s — last fall-risk assessment %s (%d days ago, %d days until next due)\n", $1, $2, days_since, days_until_due;
      }
    }
  ' "{{fall_risk_assessments_csv_path}}"
variables:
  fall_risk_assessments_csv_path:
    default: "./fall-risk-assessments.csv"
    description: >
      Path to a CSV with columns: resident_id,last_assessment_date
      (YYYY-MM-DD). Use resident_id rather than a resident's full name.
  reassessment_interval_days:
    default: 90
    description: >
      Maximum number of days allowed between required fall-risk
      reassessments — set to your facility's care-plan policy or state
      regulation (many facilities also require reassessment after any
      fall or significant change in condition, which this schedule-based
      check does not detect on its own).
  lookahead_days:
    default: 7
    description: How many days before a reassessment is due to start flagging it.
compatible_agents: [generic, claude, codex]
notes: >
  Assumes a `fall-risk-assessments.csv` export with one row per resident
  holding the date of their most recent standardized fall-risk
  assessment — adjust to your EHR/charting system's export format. This
  is distinct from fall-incident-report-followup-check, which tracks
  documentation on falls that already happened, and from
  resident-elopement-risk-reassessment-reminder, which covers
  wandering/exit-seeking risk rather than general fall risk. Read-only
  and summary-only: it only flags which residents are due for
  reassessment, it does not perform the assessment, change a care plan,
  or contact anyone.
