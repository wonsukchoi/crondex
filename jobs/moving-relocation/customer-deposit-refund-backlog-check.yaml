id: customer-deposit-refund-backlog-check
version: 1
name: Customer Deposit Refund Backlog Check
description: >
  Checks cancelled or adjusted bookings that owe a customer a deposit
  refund and flags any refund that has sat unpaid past a set number of
  days. Use this if a move has ever been cancelled and the customer's
  deposit refund quietly stalled in accounting while the customer kept
  calling to ask where their money is.
category: moving-relocation
tags: [moving-relocation, deposits, refunds, accounting, customer-service]
schedule: "0 9 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v max_days="{{max_days_pending}}" '
    NR==1 {next}
    $5 == "pending" {
      cmd = "date -d \"" $4 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $4 "\" +%s 2>/dev/null";
      cmd | getline requested_epoch; close(cmd);
      days_pending = (today - requested_epoch) / 86400;
      if (days_pending >= max_days) {
        printf "REFUND OVERDUE: booking %s — %s owed $%s since %s (%d days pending)\n", $1, $2, $3, $4, days_pending;
      }
    }
  ' "{{deposit_refunds_csv_path}}"
variables:
  deposit_refunds_csv_path:
    default: "./deposit-refunds.csv"
    description: "Path to a CSV with columns: booking_id,customer_name,refund_amount,refund_requested_date (YYYY-MM-DD),status (pending/paid/denied)."
  max_days_pending:
    default: 10
    description: Days a deposit refund can sit pending before it's flagged as overdue.
compatible_agents: [generic, claude, codex]
notes: Read-only job — it only surfaces stalled refunds, it doesn't process the payment itself. Prioritize the oldest and largest amounts first when working the backlog.
