id: fall-risk-reassessment-overdue-check
version: 1
name: Fall Risk Reassessment Overdue Check
description: >
  Flags inpatients whose fall-risk score hasn't been reassessed within
  the required interval (typically each shift or after a status change).
  Use this if a patient's fall-risk score has ever gone stale for days
  while their condition actually changed, leaving fall-precaution
  measures out of sync with real risk — distinct from
  patient-safety-incident-report-followup-check.yaml, which tracks
  follow-up after an incident already happened, not the proactive
  reassessment cadence that's meant to prevent one.
category: healthcare
tags: [healthcare, fall-risk, patient-safety, nursing, reassessment]
schedule: "0 */8 * * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v max_hours="{{max_hours_between_assessments}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f \"%Y-%m-%dT%H:%M\" \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      age_hours = (now_epoch - last_epoch) / 3600;
      if (age_hours > max_hours+0) {
        printf "OVERDUE: %s last fall-risk assessment %s (%.1f hour(s) ago, max %s)\n", $1, $2, age_hours, max_hours;
        n++;
      }
    }
    END { printf "%d inpatient(s) overdue for fall-risk reassessment.\n", n+0; }
  ' "{{fall_risk_log_csv_path}}"
variables:
  fall_risk_log_csv_path:
    default: "./fall_risk_assessments.csv"
    description: "Path to a CSV with columns: patient_name,last_assessment_datetime (YYYY-MM-DDTHH:MM)."
  max_hours_between_assessments:
    default: 12
    description: Maximum hours between fall-risk reassessments before a patient is flagged as overdue.
compatible_agents: [generic, claude, codex]
notes: Zero-token cadence check — actual reassessment still requires a nurse's clinical evaluation.
