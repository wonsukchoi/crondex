id: background-check-renewal-tracker
version: 1
name: Background Check Renewal Tracker
description: >
  Checks each cleaner's background-check expiration date and flags anyone
  whose renewal is coming up or already overdue. Use this if a cleaner has
  ever shown up to an in-home or office job on an expired background check,
  which is the kind of thing that ends client contracts and insurance
  coverage fast.
category: cleaning-services
tags: [cleaning-services, background-check, compliance, credentials]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v lookahead="{{renewal_lookahead_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline expiry_epoch; close(cmd);
      days_left = (expiry_epoch - today) / 86400;
      if (days_left < 0) {
        printf "EXPIRED: %s — background check expired %s (%.0f days ago)\n", $1, $2, -days_left;
      } else if (days_left <= lookahead) {
        printf "RENEWAL DUE: %s — background check expires %s (%.0f days left)\n", $1, $2, days_left;
      }
    }
  ' "{{background_check_csv_path}}"
variables:
  background_check_csv_path:
    default: "./background-checks.csv"
    description: "Path to a CSV with columns: cleaner_name,expiration_date (YYYY-MM-DD)."
  renewal_lookahead_days:
    default: 30
    description: Flag background checks expiring within this many days as due for renewal.
compatible_agents: [claude, codex, hermes, openclaw, generic]
notes: Read-only job — it only surfaces upcoming/expired renewals, it doesn't submit renewal paperwork or block scheduling on its own. Keep expiration dates current in the source CSV.
