id: farm-liability-insurance-renewal-reminder
version: 1
name: Farm Liability Insurance Renewal Reminder
description: >
  Checks your farm/ranch liability, property, and crop insurance policy
  expiration dates and warns before coverage lapses. Use this if you've
  ever discovered a policy had expired only after an accident or claim
  made the gap obvious.
category: agriculture
tags: [agriculture, insurance, liability, renewal, risk-management]
schedule: "0 7 * * 1"
timezone: "America/Chicago"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline exp_ts; close(cmd);
      days_left = (exp_ts - today) / 86400;
      if (days_left <= 0) {
        printf "LAPSED: %s (%s) expired %s\n", $1, $3, $2;
      } else if (days_left <= warn) {
        printf "RENEW: %s (%s) expires %s (%d days left)\n", $1, $3, $2, days_left;
      }
    }
  ' "{{policies_csv_path}}"
variables:
  policies_csv_path:
    default: "./farm-insurance-policies.csv"
    description: "Path to a CSV with columns: policy_name,expiration_date (YYYY-MM-DD),coverage_type (e.g. general liability, property, crop)."
  warn_days_before:
    default: 30
    description: Days before expiration to start warning, giving time to shop or renew with your agent.
compatible_agents: [generic, claude, codex]
notes: Coverage details and renewal underwriting requirements vary by carrier — confirm actual policy terms with your insurance agent before relying on this for coverage decisions.
