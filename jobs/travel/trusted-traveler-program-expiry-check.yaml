id: trusted-traveler-program-expiry-check
version: 1
name: Trusted Traveler Program Expiry Check
description: >
  Warns you before a trusted-traveler membership (like TSA PreCheck or
  Global Entry) expires. Use this if you've ever gotten stuck in the
  regular security line because your membership quietly lapsed months
  earlier.
category: travel
tags: [travel, documents, security, membership]
schedule: "0 9 1 * *"
timezone: "UTC"
runner: shell
command: >
  name="{{program_name}}"; expiry={{expiry_date}}; warn_days={{warn_days}};
  expiry_epoch=$(date -j -f %Y-%m-%d "$expiry" +%s 2>/dev/null || date -d "$expiry" +%s);
  today_epoch=$(date +%s);
  days_left=$(( (expiry_epoch-today_epoch)/86400 ));
  if [ "$days_left" -le 0 ]; then echo "EXPIRED: $name membership expired on $expiry — renew before your next trip."; exit 1;
  elif [ "$days_left" -le "$warn_days" ]; then echo "WARNING: $name membership expires in $days_left day(s) ($expiry) — renewal can take weeks, apply now."; exit 1;
  else echo "OK: $name membership valid, $days_left day(s) until expiry."; fi
variables:
  program_name:
    default: "TSA PreCheck / Global Entry"
    description: Name of the trusted-traveler program (TSA PreCheck, Global Entry, NEXUS, CLEAR, etc).
  expiry_date:
    default: "2027-01-01"
    description: Date (YYYY-MM-DD) the membership expires.
  warn_days:
    default: 90
    description: Start warning this many days before expiry — renewal processing can take weeks to months.
compatible_agents: [generic, claude, codex]
notes: Zero-token. Update expiry_date after renewal; one job per membership if you hold more than one.
