id: number-porting-request-aging-check
version: 1
name: Number Porting Request Aging Check
description: >
  Flags LNP (local number portability) port-in or port-out requests that
  have been open longer than expected without completing. Use this if a
  customer has ever been stuck mid-port for weeks, unable to make or
  receive calls, because a porting request stalled with the losing or
  gaining carrier and nobody followed up.
category: telecom
tags: [telecom, porting, lnp, provisioning]
schedule: "0 9 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v max_days="{{max_days_open}}" '
    NR==1 {next}
    $4 != "" {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline submit_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      age_days = (now_epoch - submit_epoch) / 86400;
      if (age_days >= max_days) {
        printf "STALLED PORT: %s (%s) submitted %s, still open after %d days\n", $1, $3, $2, age_days;
      }
    }
  ' "{{port_requests_csv_path}}"
variables:
  port_requests_csv_path:
    default: "./port-requests.csv"
    description: "Path to a CSV with columns: phone_number,submitted_date (YYYY-MM-DD),direction (port-in/port-out),completed_date (blank if still open)."
  max_days_open:
    default: 4
    description: Business days a port request can stay open before it's flagged as stalled.
compatible_agents: [generic, claude, codex]
notes: Assumes port request status is exported from your LNP/porting system into the CSV before this runs.
