id: truck-weight-ticket-missing-check
version: 1
name: Missing Truck Weight Ticket Check
description: >
  Checks completed weight-based moves (not binding-estimate jobs) for a
  required tare/gross weight ticket on file and flags any that are
  missing one. Use this if a weight-based move has ever been billed out
  before the scale ticket actually made it into the file, which leaves
  you unable to prove the charged weight if a customer disputes the bill.
category: moving-relocation
tags: [moving-relocation, compliance, weight-ticket, billing]
schedule: "0 7 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  awk -F',' '
    NR==1 {next}
    $3 == "weight-based" && $4 == "completed" {
      ticket = $5; gsub(/^[ \t]+|[ \t]+$/, "", ticket);
      if (ticket == "" || tolower(ticket) == "no" || tolower(ticket) == "missing") {
        printf "MISSING WEIGHT TICKET: move %s for %s, completed %s — no tare/gross weight ticket on file\n", $1, $2, $6;
      }
    }
  ' "{{moves_csv_path}}"
variables:
  moves_csv_path:
    default: "./moves.csv"
    description: "Path to a CSV with columns: move_id,customer_name,pricing_method (weight-based/binding-estimate),move_status (completed/scheduled/cancelled),weight_ticket_on_file (yes/no/blank),move_date (YYYY-MM-DD)."
compatible_agents: [generic, claude, codex]
notes: >-
  Read-only: it only flags moves missing a weight ticket, it doesn't
  pull the ticket from the scale or fix the billing — get the ticket
  filed (or the invoice corrected) before it goes out, since billing a
  weight-based move without one is a compliance and dispute risk.
