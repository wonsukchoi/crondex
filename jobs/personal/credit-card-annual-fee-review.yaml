id: credit-card-annual-fee-review
version: 1
name: Credit Card Annual Fee Review
description: >
  Reminds you before a credit card's annual fee posts so you can decide
  whether the rewards and perks you've used this year justify keeping it, or
  whether it's time to downgrade or cancel. Use this if you've ever been
  surprised by an annual fee charge for a card you rarely use.
category: personal
tags: [credit-card, finance, annual-fee, reminder]
schedule: "0 8 1 * *"
timezone: "America/Los_Angeles"
runner: shell
command: >
  today=$(date +%s);
  fee_date=$(date -d "{{fee_post_date}}" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "{{fee_post_date}}" +%s);
  days_left=$(( (fee_date - today) / 86400 ));
  if [ "$days_left" -le "{{lead_time_days}}" ] && [ "$days_left" -ge 0 ]; then
    echo "{{card_name}} annual fee of {{annual_fee}} posts in $days_left day(s) — review usage before it hits.";
  fi
variables:
  card_name:
    default: "Rewards Card"
    description: Name of the credit card being tracked.
  annual_fee:
    default: "95.00"
    description: The annual fee amount for this card.
  fee_post_date:
    default: "2026-11-01"
    description: The date the annual fee typically posts (YYYY-MM-DD).
  lead_time_days:
    default: "30"
    description: How many days before the fee posts to start reminding.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only reminder only; does not connect to any bank or card issuer
  account. Update fee_post_date manually if the billing cycle shifts.
