id: password-rotation-reminder
version: 1
name: Sensitive Account Password Rotation Reminder
description: >
  Reminds you when it's been long enough since you last rotated the password
  on a sensitive personal account (email, banking, password manager master
  password) that a refresh is due. Use this if you rely on memory to track
  when you last changed a critical password.
category: personal
tags: [security, passwords, accounts, reminder]
schedule: "0 9 1 * *"
timezone: "America/Los_Angeles"
runner: shell
command: >
  today=$(date +%s);
  last_changed=$(date -d "{{last_changed_date}}" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "{{last_changed_date}}" +%s);
  days_since=$(( (today - last_changed) / 86400 ));
  if [ "$days_since" -ge "{{rotation_interval_days}}" ]; then
    echo "{{account_name}} password hasn't been changed in $days_since day(s) — time to rotate it.";
  else
    echo "{{account_name}} password was rotated $days_since day(s) ago, within the {{rotation_interval_days}}-day window.";
  fi
variables:
  account_name:
    default: "Primary Email"
    description: The account this reminder tracks.
  last_changed_date:
    default: "2026-01-01"
    description: The last date the password was changed (YYYY-MM-DD).
  rotation_interval_days:
    default: "180"
    description: How many days between password rotations for this account.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only reminder only; does not access, view, or change any actual
  password. Update last_changed_date manually after each rotation. Prefer a
  password manager with unique, generated passwords over frequent manual
  rotation for accounts with strong unique passwords already.
