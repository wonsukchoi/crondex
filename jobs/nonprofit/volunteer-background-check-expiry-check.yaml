id: volunteer-background-check-expiry-check
version: 1
name: Volunteer Background Check Expiry Check
description: >
  Checks volunteer background-check/clearance expiration dates and flags
  anyone whose clearance is about to lapse before their next scheduled
  shift. Use this if a volunteer has ever worked a shift with clients or
  minors on an expired background check because renewal dates weren't
  tracked centrally.
category: nonprofit
tags: [nonprofit, volunteers, compliance, safety]
schedule: "0 9 * * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn={{warn_days}} '
    NR>1 {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline expiry_ts; close(cmd);
      days_left = int((expiry_ts - today) / 86400);
      if (days_left <= warn && days_left >= 0) print "CLEARANCE EXPIRING: " $1 " — expires " $2 " (" days_left " days left)";
      else if (days_left < 0) print "CLEARANCE EXPIRED: " $1 " — expired " $2 " (" (-days_left) " days ago)";
    }
  ' "{{volunteers_csv}}"
variables:
  volunteers_csv:
    default: "volunteer-clearances.csv"
    description: "CSV with header row, columns: volunteer_name,clearance_expiry_date(YYYY-MM-DD)."
  warn_days:
    default: 30
    description: Days before a clearance expires to start warning.
compatible_agents: [generic, claude, codex]
notes: >
  Distinct from `volunteer-hours-shortfall-check`, which tracks hours
  logged, not compliance status — treat an already-expired clearance as
  a hard stop on scheduling that volunteer until it's renewed, especially
  for programs working with children or vulnerable populations.
