id: home-warranty-claim-window-check
version: 1
name: Home Warranty Claim Window Check
description: >
  Tracks the remaining time on a home warranty or appliance protection plan's
  claim window so an issue doesn't go unreported until coverage lapses. Use
  this if you've bought a home warranty or extended appliance warranty and
  want a nudge before it expires.
category: personal
tags: [home, warranty, appliances, reminder]
schedule: "0 8 * * 1"
timezone: "America/Los_Angeles"
runner: shell
command: >
  today=$(date +%s);
  expiry=$(date -d "{{coverage_end_date}}" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "{{coverage_end_date}}" +%s);
  days_left=$(( (expiry - today) / 86400 ));
  if [ "$days_left" -le "{{lead_time_days}}" ] && [ "$days_left" -ge 0 ]; then
    echo "{{warranty_name}} coverage ends in $days_left day(s) on {{coverage_end_date}} — file any pending claims now.";
  fi
variables:
  warranty_name:
    default: "Home Warranty Plan"
    description: Name of the home warranty or appliance protection plan.
  coverage_end_date:
    default: "2026-12-31"
    description: The date coverage ends (YYYY-MM-DD).
  lead_time_days:
    default: "30"
    description: How many days before coverage ends to start reminding.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only reminder only; does not connect to any warranty provider account.
  Update coverage_end_date manually when a plan is renewed.
