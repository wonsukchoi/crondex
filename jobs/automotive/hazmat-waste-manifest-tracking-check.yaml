id: hazmat-waste-manifest-tracking-check
version: 1
name: Hazmat/Used-Oil Waste Manifest Tracking Check
description: >
  Checks hazardous waste pickup manifests (used oil, coolant, solvents,
  batteries) for return copies that haven't come back from the hauler
  within the expected window, so unsigned manifests don't sit unresolved
  come audit time. Use this if a shop has ever discovered at inspection
  time that a signed manifest copy never made it back from the disposal
  vendor.
category: automotive
tags: [automotive, hazmat, compliance, waste-disposal]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v warn="{{overdue_days}}" -v today="$today" '
    NR==1 {next}
    {
      if ($4 != "") {next}
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline pickup_ts; close(cmd);
      days_waiting = (today - pickup_ts) / 86400;
      if (days_waiting >= warn) {
        printf "UNSIGNED MANIFEST: %s — waste type %s, picked up %s, %d days waiting on return copy\n", $1, $3, $2, days_waiting;
      }
    }
  ' "{{manifests_csv_path}}"
variables:
  manifests_csv_path:
    default: "./hazmat-manifests.csv"
    description: "Path to a CSV with columns: manifest_number,pickup_date (YYYY-MM-DD),waste_type,signed_return_date (blank if not yet received)."
  overdue_days:
    default: 35
    description: Days after pickup before a missing signed return copy is flagged as overdue.
compatible_agents: [generic, claude, codex]
notes: >
  US EPA generators typically must receive a signed copy back within 35
  days (60 for exception reporting); adjust `overdue_days` to your local
  or state hazardous-waste rules. Read-only tracker — does not file
  exception reports.
