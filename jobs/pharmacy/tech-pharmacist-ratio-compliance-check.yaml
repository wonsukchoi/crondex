id: tech-pharmacist-ratio-compliance-check
version: 1
name: Technician-to-Pharmacist Ratio Compliance Check
description: >
  Checks a staffing schedule export against your state board's maximum
  technician-to-pharmacist ratio and flags any day the schedule would put
  you over it. Use this if you've ever realized mid-shift that too many
  techs were scheduled against too few pharmacists to stay compliant.
category: pharmacy
tags: [pharmacy, staffing, compliance, technicians]
schedule: "0 7 * * 1"
timezone: "America/New_York"
runner: shell
command: >
  awk -F',' -v max_ratio="{{max_tech_to_pharmacist_ratio}}" '
    NR==1 {next}
    { if ($2 == "pharmacist") pharm[$1] += $3; if ($2 == "technician") tech[$1] += $3 }
    END {
      for (d in pharm) {
        if (pharm[d] > 0) {
          ratio = tech[d] / pharm[d];
          if (ratio > max_ratio + 0) {
            printf "RATIO OVER LIMIT: %s — %.2f tech-hours per pharmacist-hour (max %.2f)\n", d, ratio, max_ratio;
          }
        } else if (tech[d] > 0) {
          printf "RATIO UNDEFINED: %s — technician hours scheduled with zero pharmacist hours\n", d;
        }
      }
    }
  ' "{{staffing_schedule_csv_path}}"
variables:
  staffing_schedule_csv_path:
    default: "./staffing-schedule.csv"
    description: "Path to a CSV export of scheduled shifts with columns: date,role,hours_scheduled (role is 'pharmacist' or 'technician')."
  max_tech_to_pharmacist_ratio:
    default: 3
    description: Maximum technicians allowed per on-duty pharmacist under your state board rule — confirm the exact figure for your state before relying on this.
compatible_agents: [generic, claude, codex]
notes: >
  State ratio rules vary widely and some states don't set a fixed ratio at
  all — verify your board's current rule before setting
  max_tech_to_pharmacist_ratio. This is a scheduling check only, not legal
  advice.
