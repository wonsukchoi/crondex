id: safety-equipment-inspection-log-check
version: 1
name: Facility Safety Equipment Inspection Log Check
description: >
  Checks that fire extinguishers, first-aid kits, and gate/latch hardware
  around the boarding, daycare, and grooming areas each have a logged
  inspection within the required interval, and flags anything overdue. Use
  this if a routine safety inspection has ever quietly lapsed until an
  insurance or licensing visit caught it.
category: petcare
tags: [petcare, facility, safety, inspection, compliance]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v interval="{{inspection_interval_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_epoch; close(cmd);
      age_days = (today - last_epoch) / 86400;
      if (age_days > interval) printf "OVERDUE: %s — last inspected %s (%d days ago)\n", $1, $2, age_days;
    }
  ' "{{inspection_log_csv_path}}"
variables:
  inspection_log_csv_path:
    default: "./safety-equipment-inspections.csv"
    description: "Path to a CSV with columns: equipment_name,last_inspected_date (YYYY-MM-DD), one row per fire extinguisher, first-aid kit, or gate/latch."
  inspection_interval_days:
    default: 90
    description: Maximum number of days between inspections before an item is flagged overdue.
compatible_agents: [generic, claude, codex]
notes: Checks your logged records only, not a substitute for the physical inspection itself or any locally mandated fire/safety inspection schedule.
