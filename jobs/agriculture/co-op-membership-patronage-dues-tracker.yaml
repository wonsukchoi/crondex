id: co-op-membership-patronage-dues-tracker
version: 1
name: Co-op Membership & Patronage Dues Tracker
description: >
  Checks your agricultural cooperative membership dues and expected
  patronage dividend/equity payments against what's actually been
  received or paid, and flags mismatches. Use this if you've ever missed
  a dues deadline or not noticed a patronage payment was short or never
  arrived.
category: agriculture
tags: [agriculture, cooperative, membership, patronage, dues]
schedule: "0 7 1 * *"
timezone: "America/Chicago"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline due_ts; close(cmd);
      days_left = (due_ts - today) / 86400;
      expected = $3+0;
      received = $4+0;
      if (days_left <= 0 && received < expected) {
        printf "SHORT/UNPAID: %s — due %s, expected %.2f, received %.2f\n", $1, $2, expected, received;
      } else if (days_left > 0 && days_left <= warn) {
        printf "UPCOMING: %s — due %s in %d days, expected %.2f\n", $1, $2, days_left, expected;
      }
    }
  ' "{{coop_dues_csv_path}}"
variables:
  coop_dues_csv_path:
    default: "./coop-membership-dues.csv"
    description: "Path to a CSV with columns: cooperative_name,due_date (YYYY-MM-DD),expected_amount,received_amount."
  warn_days_before:
    default: 14
    description: Days before a dues or expected patronage payment date to start warning.
compatible_agents: [generic, claude, codex]
notes: Patronage dividend timing and amounts are set by each co-op's board — treat "expected_amount" as your own estimate, not a guaranteed figure.
