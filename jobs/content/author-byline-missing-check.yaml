id: author-byline-missing-check
version: 1
name: Author Byline Missing Check
description: >
  Scans published content pages for a visible author byline (name and, where
  expected, an author bio link) and flags pages where one is missing. Use
  this if you publish articles or guides and want to catch missing author
  attribution, since named authorship is a trust signal search engines and
  readers both look for.
category: content
tags: [content, seo, e-e-a-t, author-byline]
schedule: "0 6 * * 5"
timezone: "UTC"
runner: agent-prompt
prompt: >
  Fetch the sitemap at {{sitemap_url}} and list published page URLs whose
  path contains any of these fragments: {{content_paths}} (comma-separated).
  For each, fetch the page and check for a visible author byline — an
  author name near element(s) matching the CSS selector {{byline_css_selector}},
  or an equivalent visible "By <name>" credit if the selector doesn't match
  the site's actual markup. Report the list of pages missing a byline,
  grouped by content section, most recently published first.
variables:
  sitemap_url:
    default: "https://example.com/sitemap.xml"
    description: Sitemap used to enumerate published pages to check for an author byline.
  byline_css_selector:
    default: ".article-byline .author-name"
    description: CSS selector identifying the author-byline element on a rendered page.
  content_paths:
    default: "/blog/,/guides/"
    description: Comma-separated URL path fragments identifying which sections count as "content" pages that require a byline.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only: fetches and reads publicly reachable pages, makes no edits.
  Needs an agent since checking for a byline reliably across differently
  templated pages is a judgment call, not a fixed selector match every
  site will satisfy identically.
