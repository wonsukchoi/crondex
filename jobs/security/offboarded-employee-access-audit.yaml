id: offboarded-employee-access-audit
version: 1
name: Offboarded Employee Access Audit
description: >
  Compares active access grants across systems and apps against the current
  HR employee roster, then flags any access still active for someone who
  has already left the company. Use this if you want a safety net catching
  leftover accounts after offboarding, separate from routine key rotation —
  this is specifically about access nobody remembered to remove.
category: security
tags: [offboarding, access-review, iam, hr-integration]
schedule: "0 7 * * *"
timezone: "UTC"
runner: agent-prompt
prompt: >
  Pull the list of employees terminated in the last {{lookback_days}} days
  from {{hr_system}} (name and email/username). Separately, pull the list of
  currently active access grants across the org's systems and apps (SSO/IAM
  provider, key vendor-specific tools as needed). Cross-reference by
  email/username and flag any active grant belonging to someone on the
  terminated list. Report each hit with the person, the system/app, and the
  grant type, grouped by how long ago they were terminated (longest first —
  those are the highest-risk gaps).
variables:
  lookback_days:
    default: "180"
    description: How far back to look for terminated employees when cross-checking active access grants.
  hr_system:
    default: "workday"
    description: HR system providing the employee roster and termination dates (e.g. workday, bamboohr).
compatible_agents: [generic, claude, codex]
notes: >
  Needs an agent since pulling from a specific HR system and a specific
  access-management/IAM tool, then reconciling them, is too
  connector-specific for one generic script. This job only flags leftover
  access for a human to revoke — it does not deactivate accounts or remove
  any permissions itself.
