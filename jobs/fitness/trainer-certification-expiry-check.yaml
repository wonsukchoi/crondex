id: trainer-certification-expiry-check
version: 1
name: Trainer Certification Expiry Check
description: >
  Checks trainer and instructor certifications (personal training cert,
  CPR/AED, group fitness credentials) against their expiry dates and
  warns before any lapse. Use this if a trainer has ever kept training
  clients on an expired certification because nobody was tracking renewal
  dates across the whole staff roster.
category: fitness
tags: [fitness, staff, certification, compliance, trainers]
schedule: "0 7 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $3 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $3 "\" +%s 2>/dev/null";
      cmd | getline expiry_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      diff_days = (expiry_epoch - now_epoch) / 86400;
      if (diff_days <= days) {
        status = (diff_days < 0) ? "ALREADY EXPIRED" : "EXPIRING SOON";
        printf "%s: %s — %s expires %s (%d days)\n", status, $1, $2, $3, diff_days;
      }
    }
  ' "{{certifications_csv_path}}"
variables:
  certifications_csv_path:
    default: "./trainer-certifications.csv"
    description: "Path to a CSV with columns: staff_name,certification_name,expiry_date (YYYY-MM-DD)."
  warn_days_before:
    default: 30
    description: How many days before a certification expires to start warning.
compatible_agents: [generic, claude, codex]
notes: An expired CPR/AED or training certification is a liability issue, not just an admin one — pull an already-expired trainer from client-facing sessions until it's renewed.
