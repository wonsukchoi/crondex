id: tree-trimming-utility-clearance-check
version: 1
name: Tree-Trimming Utility-Line Clearance Check
description: >
  Reviews jobs on the upcoming tree-trimming schedule that are flagged as
  near overhead utility lines and checks whether a utility clearance
  notification or permit has been filed, drafting the notification if
  it's missing. Use this if a crew has ever started trimming near a power
  line without the utility company having been notified first.
category: landscaping
tags: [landscaping, tree-trimming, utility, permits, safety]
schedule: "0 7 * * 1"
timezone: "America/Chicago"
runner: agent-prompt
prompt: >
  Read the tree-trimming job schedule at {{trim_schedule_csv_path}}
  (columns: job_id, client_name, service_date, near_utility_line (yes/no),
  utility_notified (yes/no)). For every job in the next {{lookahead_days}}
  days where near_utility_line is "yes" and utility_notified is not "yes",
  draft a utility clearance notification (site address, planned work,
  planned date) addressed to {{utility_company_name}}, and list those jobs
  clearly so scheduling can hold them until clearance is confirmed.
variables:
  trim_schedule_csv_path:
    default: "./tree-trim-schedule.csv"
    description: "Path to a CSV with columns: job_id,client_name,service_date (YYYY-MM-DD),near_utility_line (yes/no),utility_notified (yes/no)."
  lookahead_days:
    default: 14
    description: How many days ahead to scan the trim schedule for utility-line jobs.
  utility_company_name:
    default: "Local Utility Co."
    description: Name of the utility company to address clearance notifications to.
compatible_agents: [claude, codex, generic]
notes: Draft-only — do not send the utility notification automatically, and do not schedule work near a live line without confirmed clearance.
