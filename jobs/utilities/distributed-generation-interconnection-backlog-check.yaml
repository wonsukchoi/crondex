id: distributed-generation-interconnection-backlog-check
version: 1
name: Distributed Generation Interconnection Backlog Check
description: >
  Checks the interconnection-application queue for distributed generation
  (rooftop solar, storage, small wind) requests that have sat in a review
  stage longer than the target turnaround time, and lists them oldest
  first. Use this if a solar installer or customer has ever complained
  that an interconnection application vanished into a backlog with no
  visible movement.
category: utilities
tags: [utilities, distributed-generation, interconnection, solar, regulatory-compliance]
schedule: "0 7 * * 1"
timezone: "UTC"
runner: shell
command: >
  psql "{{database_url}}" -t -c "select application_id, applicant_name, review_stage, submitted_date, (current_date - submitted_date) as days_in_queue from interconnection_applications where status = 'in_review' and (current_date - submitted_date) > {{max_queue_days}} order by days_in_queue desc;"
variables:
  database_url:
    default: "postgres://user:pass@host:5432/db"
    description: Connection string for the interconnection-application tracking database.
  max_queue_days:
    default: "60"
    description: Maximum days an application should sit in review before it's flagged as backlogged.
compatible_agents: [generic, claude, codex]
notes: Assumes an `interconnection_applications` table with `application_id`, `applicant_name`, `review_stage`, `submitted_date`, and `status` columns — adjust to your interconnection queue/tracking system's schema. Read-only reporting job; it does not advance or approve applications itself, and many jurisdictions have regulatory turnaround requirements, so persistent backlog hits should go to the interconnection engineering team.
