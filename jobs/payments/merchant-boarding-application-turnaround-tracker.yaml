id: merchant-boarding-application-turnaround-tracker
version: 1
name: Merchant Boarding Application Turnaround Tracker
description: >
  Tracks new-merchant boarding applications sitting in the onboarding queue
  and flags any that have gone past your target turnaround SLA without a
  decision. Use this if boarding delays have ever cost you a merchant who
  gave up and signed with a competitor while their application sat
  untouched.
category: payments
tags: [payments, merchant-boarding, onboarding, sla]
schedule: "0 8 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v target="{{target_turnaround_hours}}" '
    NR==1 { next }
    $3 == "PENDING" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%dT%H:%M:%S \"" $2 "\" +%s 2>/dev/null";
      cmd | getline submit_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      age_hours = (now_epoch - submit_epoch) / 3600;
      if (age_hours > target) {
        printf "OVERDUE: application %s (%s) submitted %s — %.1f hours pending, target %s\n", $1, $4, $2, age_hours, target;
        n++;
      }
    }
    END { printf "%d boarding application(s) past target turnaround.\n", n+0; }
  ' "{{boarding_applications_csv_path}}"
variables:
  boarding_applications_csv_path:
    default: "./merchant_boarding_applications.csv"
    description: "Path to a CSV with columns: application_id,submit_timestamp (ISO 8601),status (PENDING or DECISIONED),merchant_name."
  target_turnaround_hours:
    default: 48
    description: Target number of hours from application submission to a boarding decision before it is flagged overdue.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only queue report for merchant-boarding/underwriting follow-up — does
  not approve, decline, or expedite applications itself.
