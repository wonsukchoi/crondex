id: operator-certification-equipment-match-check
version: 2
name: Operator Certification-to-Equipment Match Check
description: >
  Cross-checks the shift roster or crew assignment sheet against operator
  equipment certifications and flags anyone assigned to a machine they
  aren't certified to run. Use this if an uncertified operator or crew
  member has ever ended up running a press, forklift, crane, or aerial
  lift because the scheduler didn't know their certification had lapsed
  or didn't check cert records against the equipment assignment sheet.
category: manufacturing
tags: [manufacturing, construction, safety, training, certification, compliance, equipment, crew-assignment]
schedule: "0 5 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" '
    FNR==NR { if (FNR>1) { equip[$1]=$2; cert_exp[$1 SUBSEP $2]=$3 }; next }
    FNR==1 { next }
    {
      key = $1 SUBSEP $2;
      if (!(key in cert_exp)) { printf "NOT CERTIFIED: operator %s assigned to equipment %s\n", $1, $2; next }
      cmd="date -d \"" cert_exp[key] "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" cert_exp[key] "\" +%s";
      cmd | getline exp_ts; close(cmd);
      if (exp_ts < today) printf "EXPIRED CERT: operator %s on equipment %s expired %s\n", $1, $2, cert_exp[key];
    }
  ' "{{cert_roster_csv}}" "{{shift_assignment_csv}}"
variables:
  cert_roster_csv:
    default: "./operator-certifications.csv"
    description: "CSV with header row, columns: operator_id,equipment_type,cert_expiry_date(YYYY-MM-DD)."
  shift_assignment_csv:
    default: "./shift-assignments.csv"
    description: "CSV with header row, columns: operator_id,equipment_type,shift_date."
compatible_agents: [generic, claude, codex]
notes: Refresh both CSVs from the LMS/training record and the day's scheduling board before each run — this is a safety gate, review flagged assignments before the shift starts. Applies equally to construction crews being assigned to cranes, forklifts, or aerial lifts, not just factory-floor equipment. Distinct from crew-safety-cert-expiry-check — that job watches certs approaching expiry in isolation; this one cross-checks actual equipment assignments against who's certified for that specific machine type.
