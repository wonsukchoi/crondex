id: dental-insurance-claim-denial-by-cdt-code-check
version: 1
name: Dental Insurance Claim Denial by CDT Code Check
description: >
  Parses a dental claims log and flags denied claims, grouped by CDT
  procedure code, that are approaching or past the payer's resubmission or
  appeal deadline. Use this if denied claims (especially recurring ones tied
  to a specific procedure code like a crown or scaling code) are quietly
  aging past the window to appeal instead of being caught early.
category: dental
tags: [dental, insurance, claims, denials, cdt-codes, billing]
schedule: "0 7 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v deadline_days="{{appeal_deadline_days}}" -v warn_days="{{warn_days_before_deadline}}" '
    NR==1 {next}
    $4 == "denied" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline claim_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      age_days = int((now_epoch - claim_epoch) / 86400);
      remaining = deadline_days - age_days;
      if (remaining <= warn_days) {
        status = (remaining < 0) ? "PAST DEADLINE" : "DEADLINE APPROACHING";
        printf "%s: claim %s, CDT %s, denied %s, %d day(s) remaining to appeal (%s)\n", status, $1, $3, $2, remaining, $5;
        count++;
      }
    }
    END {
      if (count == 0) print "No denied claims nearing or past the appeal deadline.";
      else printf "%d denied claim(s) need attention.\n", count;
    }
  ' "{{claims_csv_path}}"
variables:
  claims_csv_path:
    default: "./dental_claims.csv"
    description: "Path to a CSV with columns: claim_id,submitted_date (YYYY-MM-DD),cdt_code,status (paid/denied/pending),denial_reason."
  appeal_deadline_days:
    default: 90
    description: Number of days from the submitted/denial date the payer allows for resubmission or appeal.
  warn_days_before_deadline:
    default: 14
    description: How many days before the deadline (or already past it) to start flagging a claim.
compatible_agents: [generic, claude, codex]
notes: Read-only triage list — denial reason text is echoed as-is from the log, no interpretation performed.
