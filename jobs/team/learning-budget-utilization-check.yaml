id: learning-budget-utilization-check
version: 1
name: Learning Budget Utilization Check
description: >
  Warns you before an unused learning-and-development budget expires or
  resets. Use this if you've ever let training budget go unused because
  nobody was tracking the deadline.
category: team
tags: [learning, budget, team]
schedule: "0 9 1 * *"
timezone: "America/Los_Angeles"
runner: shell
command: >
  today_epoch=$(date +%s);
  expiry_epoch=$(date -j -f %Y-%m-%d "{{expiry_date}}" +%s 2>/dev/null || date -d "{{expiry_date}}" +%s);
  days_left=$(( (expiry_epoch-today_epoch)/86400 ));
  if [ "$days_left" -lt 0 ]; then echo "note: expiry_date has passed — update it for the next budget period.";
  elif [ "$days_left" -le {{warn_days_before_expiry}} ] && [ {{learning_budget_remaining}} -gt 0 ]; then
    echo "REMINDER: \${{learning_budget_remaining}} of learning budget expires in $days_left day(s) (on {{expiry_date}}) — use it or lose it.";
  else echo "OK: \${{learning_budget_remaining}} learning budget remaining, $days_left day(s) until expiry."; fi
variables:
  learning_budget_remaining:
    default: 500
    description: Your current unused learning/development budget amount — update this yourself as it changes.
  expiry_date:
    default: "2026-12-31"
    description: Date (YYYY-MM-DD) this learning budget expires or resets.
  warn_days_before_expiry:
    default: 30
    description: Start warning this many days before expiry.
compatible_agents: [generic, claude, codex]
notes: >
  Zero-token. You maintain learning_budget_remaining and expiry_date
  yourself — this doesn't pull from any finance or L&D system.
