id: tower-site-lease-renewal-reminder
version: 1
name: Tower/Site Lease Renewal Reminder
description: >
  Checks tower and equipment site lease agreements for upcoming renewal
  or termination-notice deadlines and warns with enough lead time to act.
  Use this if a site lease has ever auto-renewed at a bad rate, or a
  landlord notice window closed unnoticed, because nobody was tracking
  lease dates across dozens of sites.
category: telecom
tags: [telecom, tower, site-lease, real-estate]
schedule: "0 7 1 * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v warn_days="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline deadline_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      diff_days = (deadline_epoch - now_epoch) / 86400;
      if (diff_days <= warn_days && diff_days >= 0) {
        printf "LEASE DEADLINE: site %s notice/renewal due %s (%d days)\n", $1, $2, diff_days;
      }
    }
  ' "{{site_leases_csv_path}}"
variables:
  site_leases_csv_path:
    default: "./tower-site-leases.csv"
    description: "Path to a CSV with columns: site_id,next_deadline_date (YYYY-MM-DD, renewal or notice-to-terminate), landlord_name."
  warn_days_before:
    default: 120
    description: Days before the deadline to start warning — landlord notice windows are often 90+ days.
compatible_agents: [generic, claude, codex]
notes: Assumes lease deadlines are tracked in a site/real-estate management sheet exported to the CSV.
