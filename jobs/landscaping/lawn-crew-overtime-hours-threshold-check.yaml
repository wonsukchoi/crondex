id: lawn-crew-overtime-hours-threshold-check
version: 1
name: Lawn Crew Weekly Overtime Hours Threshold Check
description: >
  Totals each crew member's logged hours for the trailing week and flags
  anyone crossing your overtime threshold before payroll runs. Use this
  if a mowing crew has ever blown past 40 hours on a long storm-cleanup
  week and the overtime cost only showed up as a surprise on the payroll
  report.
category: landscaping
tags: [landscaping, crew, payroll, overtime, labor-cost]
schedule: "0 6 * * 1"
timezone: "America/Chicago"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v lookback="{{lookback_days}}" -v ot_threshold="{{overtime_threshold_hours}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline day_epoch; close(cmd);
      age_days = (today - day_epoch) / 86400;
      if (age_days >= 0 && age_days <= lookback) {
        hours[$1] += $3;
      }
    }
    END {
      for (name in hours) {
        printf "%s: %.1f hour(s) over trailing %d day(s)", name, hours[name], lookback;
        if (hours[name] >= ot_threshold) printf " -- OVER OVERTIME THRESHOLD (%.1f)", ot_threshold;
        print "";
      }
    }
  ' "{{crew_hours_csv_path}}"
variables:
  crew_hours_csv_path:
    default: "./crew-hours-log.csv"
    description: "Path to a CSV with columns: crew_member_name,work_date (YYYY-MM-DD),hours_worked."
  lookback_days:
    default: 7
    description: Trailing days of logged hours to total per crew member.
  overtime_threshold_hours:
    default: 40
    description: Hours in the lookback window at or above which a crew member is flagged for overtime.
compatible_agents: [generic, claude, codex]
notes: Read-only totals for payroll planning — this doesn't approve or block overtime, it just surfaces who's near the threshold before the pay period closes. Distinct from fuel-cost-per-route-tracker, which tracks route fuel spend rather than labor hours.
