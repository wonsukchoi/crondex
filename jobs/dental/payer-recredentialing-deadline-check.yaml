id: payer-recredentialing-deadline-check
version: 1
name: Payer Recredentialing Deadline Check
description: >
  Tracks each provider's recredentialing deadline with the insurance
  payers they're paneled with and flags anything approaching or past
  due. Use this if a provider has ever fallen off a payer's network
  mid-quarter because recredentialing paperwork lapsed — distinct from
  license-cde-credit-expiry-tracker.yaml, which tracks the state
  license/CDE requirement, not payer-panel credentialing.
category: dental
tags: [dental, credentialing, payer, insurance, compliance, provider]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v warn_days="{{warn_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $3 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $3 "\" +%s 2>/dev/null";
      cmd | getline due_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      days_left = (due_epoch - now_epoch) / 86400;
      if (days_left <= warn_days+0) {
        if (days_left < 0) printf "OVERDUE: %s recredentialing with %s was due %s (%d day(s) ago)\n", $1, $2, $3, -days_left;
        else printf "DUE SOON: %s recredentialing with %s due %s (%d day(s) left)\n", $1, $2, $3, days_left;
        flagged++;
      }
    }
    END { printf "%d recredentialing deadline(s) flagged.\n", flagged+0; }
  ' "{{credentialing_csv_path}}"
variables:
  credentialing_csv_path:
    default: "./payer_credentialing.csv"
    description: "Path to a CSV with columns: provider_name,payer_name,recredentialing_due_date (YYYY-MM-DD)."
  warn_days:
    default: 60
    description: Days before (or past) the recredentialing due date to start flagging it.
compatible_agents: [generic, claude, codex]
notes: Read-only reminder — actual recredentialing submission still goes through each payer's own portal or paperwork process.
