id: post-event-vendor-invoice-reconciliation-check
version: 1
name: Post-Event Vendor Invoice Reconciliation Check
description: >
  After an event wraps, compares each vendor's final invoice against what
  was actually contracted (and any signed change orders) and flags
  mismatches before you pay. Use this if you've ever paid a final invoice
  that quietly included a fee never approved, because nobody checked it
  against the contract.
category: events
tags: [events, vendors, invoices, reconciliation, post-event]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F, -v tol="{{tolerance_usd}}" '
    NR==1 {next}
    {
      diff = $3 - $2;
      absdiff = diff < 0 ? -diff : diff;
      if (absdiff > tol) {
        printf "MISMATCH: %s — contracted $%.2f, invoiced $%.2f (diff $%.2f)\n", $1, $2, $3, diff;
      }
    }
  ' "{{vendor_invoices_csv}}"
variables:
  vendor_invoices_csv:
    default: "event-vendor-invoices.csv"
    description: "CSV with header row, columns: vendor_name,contracted_amount,invoiced_amount."
  tolerance_usd:
    default: 25
    description: Dollar difference allowed before a vendor's invoice is flagged as a mismatch (covers small rounding/tax differences).
compatible_agents: [generic, claude, codex]
notes: Include approved change orders in the contracted_amount column before running this, or legitimate add-ons will get flagged as mismatches every time.
