id: orphaned-page-internal-link-check
version: 1
name: Orphaned Page Internal Link Check
description: >
  Crawls the site's internal link graph and flags published pages that have
  zero inbound internal links, meaning nothing else on the site points to
  them. Use this if you want to catch pages that visitors and search engine
  crawlers can only reach by knowing the exact URL, since orphaned pages
  rarely get discovered or ranked.
category: content
tags: [content, seo, internal-links, orphan-pages]
schedule: "0 5 * * 4"
timezone: "UTC"
runner: agent-prompt
prompt: >
  Fetch the sitemap at {{sitemap_url}} to get the master list of published
  pages. Starting from {{crawl_start_url}}, crawl internal links up to
  {{max_crawl_depth}} levels deep, recording which sitemap pages get linked
  to from somewhere in the crawl. Report sitemap pages that were never
  reached by any internal link during the crawl — these are orphaned pages
  nothing else on the site points to. Note that a flagged page may still be
  reachable via search or a link from outside the crawl start point, so call
  that caveat out in the report.
variables:
  sitemap_url:
    default: "https://example.com/sitemap.xml"
    description: Sitemap used as the master list of published pages to check for inbound links.
  crawl_start_url:
    default: "https://example.com/"
    description: URL the crawler starts from when walking internal links to build the link graph.
  max_crawl_depth:
    default: "6"
    description: Maximum link-following depth from the start URL before the crawl stops.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only: crawls publicly reachable pages to build a link graph, makes no
  edits. Needs an agent since walking a real site's link structure and
  cross-referencing it against the sitemap isn't a fixed-shape task a
  generic script can do without knowing the site's structure ahead of time.
