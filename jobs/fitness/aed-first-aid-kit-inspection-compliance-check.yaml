id: aed-first-aid-kit-inspection-compliance-check
version: 2
name: AED and First-Aid Kit Inspection Compliance Check
description: >
  Checks the equipment inspection log for AED units and first-aid kits
  and flags any unit that's overdue for its scheduled check, plus any
  AED pad or battery approaching its expiry date. Use this if an AED has
  ever gone months without a documented check and nobody realized the
  battery indicator was flashing until an actual emergency.
category: fitness
tags: [fitness, safety, compliance, aed, first-aid]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{max_days_since_inspection}}" -v pad_days="{{pad_expiry_warn_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      days_since = (now_epoch - last_epoch) / 86400;
      if (days_since > days) {
        printf "OVERDUE INSPECTION: %s (%s) — last checked %d days ago\n", $1, $3, days_since;
      }
      exp_cmd = "date -d \"" $4 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $4 "\" +%s 2>/dev/null";
      exp_cmd | getline exp_epoch; close(exp_cmd);
      days_to_exp = (exp_epoch - now_epoch) / 86400;
      if (days_to_exp <= pad_days) {
        printf "EXPIRY SOON: %s (%s) — pads/battery expire in %d days\n", $1, $3, days_to_exp;
      }
    }
  ' "{{safety_equipment_log_csv_path}}"
variables:
  safety_equipment_log_csv_path:
    default: "./aed-first-aid-log.csv"
    description: "Path to a CSV with columns: unit_id,last_inspection_date (YYYY-MM-DD),location,pad_battery_expiry_date (YYYY-MM-DD)."
  max_days_since_inspection:
    default: 30
    description: Maximum days allowed between documented AED/first-aid kit inspections before it's flagged overdue.
  pad_expiry_warn_days:
    default: 45
    description: How many days before AED pad or battery expiry to start warning.
compatible_agents: [generic, claude, codex]
notes: >
  This is a life-safety check — treat any flagged item as urgent, not just
  another line item to schedule around. Distinct from
  safety-equipment-inspection-check — this one runs weekly against a
  two-column log (last inspection date plus pad/battery expiry date) for
  AEDs/first-aid kits specifically, while that job is a broader monthly
  sweep (including fire extinguishers) driven by a single upcoming
  due/expiry date per item.
