id: new-client-intake-packet-completion-check
version: 1
name: New Client Intake Packet Completion Check
description: >
  Checks recently registered new clients for outstanding intake
  paperwork — signed consent-to-treat, payment policy acknowledgment,
  and patient history form — and flags anyone still missing a piece
  before their first appointment. Use this if a new client has ever
  shown up for a first visit without a signed consent-to-treat on file,
  forcing the front desk to scramble at check-in — distinct from
  patient-record-completeness-audit.yaml, which spot-checks established
  patients' clinical records rather than new-client onboarding
  paperwork.
category: veterinary
tags: [veterinary, intake, new-clients, onboarding, records]
schedule: "0 7 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v days="{{lookback_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline reg_epoch; close(cmd);
      if (reg_epoch == "") next;
      age_days = (today - reg_epoch) / 86400;
      if (age_days > days) next;
      missing = "";
      if ($3 != "signed") missing = missing " consent-to-treat";
      if ($4 != "signed") missing = missing " payment-policy";
      if ($5 != "complete") missing = missing " patient-history";
      if (missing != "") {
        print "INCOMPLETE INTAKE: " $1 " (registered " $2 ") missing:" missing;
      }
    }
  ' "{{new_client_intake_csv}}"

variables:
  new_client_intake_csv:
    default: "./new_client_intake.csv"
    description: >
      Path to a CSV with columns: client_name, registration_date
      (YYYY-MM-DD), consent_to_treat_status, payment_policy_status,
      patient_history_status.
  lookback_days:
    default: 14
    description: >
      Only check clients who registered within this many days, so the
      report stays focused on recent onboarding rather than old
      closed-out records.

compatible_agents: [claude, codex, hermes, openclaw, generic]

notes: >
  Read-only report intended to run before a new client's first
  appointment so front desk can chase down missing forms in advance
  instead of at check-in.
