id: reg-dd-disclosure-accuracy-audit
version: 1
name: Regulation DD Disclosure Accuracy Audit
description: >
  Spot-checks posted account disclosure rates and terms (Regulation DD
  truth-in-savings) against the source rate sheet and flags any mismatch.
  Use this if a posted APY, minimum balance, or fee term on a deposit
  account disclosure has ever drifted out of sync with the actual current
  rate sheet — distinct from deposit-account-fee-waiver-audit, which
  checks fee waiver eligibility application, not disclosure accuracy
  against the rate sheet.
category: banking
tags: [banking, reg-dd, truth-in-savings, disclosure, compliance]
schedule: "0 7 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' '
    FNR==NR { if (FNR>1) { rate[$1]=$2; min_bal[$1]=$3 }; next }
    FNR==1 { next }
    {
      if (!($1 in rate)) { printf "NO SOURCE RATE: disclosure for product %s has no matching rate sheet entry\n", $1; n++; next; }
      rate_diff = ($2 - rate[$1]); if (rate_diff < 0) rate_diff = -rate_diff;
      if (rate_diff > {{apy_tolerance_pct}}) { printf "RATE MISMATCH: product %s — disclosed APY %.3f%% vs rate sheet %.3f%%\n", $1, $2, rate[$1]; n++; }
      if ($3 + 0 != min_bal[$1] + 0) { printf "MIN BALANCE MISMATCH: product %s — disclosed $%.2f vs rate sheet $%.2f\n", $1, $3, min_bal[$1]; n++; }
    }
    END { printf "%d disclosure mismatch(es) found.\n", n+0; }
  ' "{{rate_sheet_csv_path}}" "{{posted_disclosures_csv_path}}"
variables:
  rate_sheet_csv_path:
    default: "./rate-sheet.csv"
    description: "Path to a CSV with columns: product_code,apy,minimum_balance — the authoritative source rate sheet."
  posted_disclosures_csv_path:
    default: "./posted-disclosures.csv"
    description: "Path to a CSV with columns: product_code,disclosed_apy,disclosed_minimum_balance — what's currently posted/printed."
  apy_tolerance_pct:
    default: 0.01
    description: Maximum allowed difference (in percentage points) between disclosed APY and the source rate sheet before flagging.
compatible_agents: [generic, claude, codex]
notes: Read-only audit — route mismatches to compliance/marketing to correct the posted disclosure, doesn't change any rate itself.
