id: staff-background-check-recertification-check
version: 1
name: Staff Background Check Recertification Check
description: >
  Checks each staff member's background check / fingerprint clearance
  against your licensing body's required recertification interval and
  warns before it lapses. Use this if a staff member's clearance has ever
  quietly expired while they kept working, because the CPR/first-aid
  certification tracker doesn't cover it — this is a separate,
  longer-cycle clearance, not a skills certification.
category: childcare
tags: [childcare, background-check, licensing, compliance, staff]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline expiry_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      diff_days = (expiry_epoch - now_epoch) / 86400;
      if (diff_days <= days) {
        printf "CLEARANCE DUE: %s — background check clearance expires %s (%d days)\n", $1, $2, diff_days;
      }
    }
  ' "{{background_checks_csv_path}}"
variables:
  background_checks_csv_path:
    default: "./staff-background-checks.csv"
    description: "Path to a CSV with columns: staff_name,clearance_expiry_date (YYYY-MM-DD). Recertification interval varies by state (often 3-5 years)."
  warn_days_before:
    default: 60
    description: How many days before a background check clearance expires to start warning.
compatible_agents: [generic, claude, codex]
notes: A staff member working past a lapsed background check clearance can jeopardize your license — confirm your jurisdiction's exact recheck interval rather than assuming a default.
