id: powered-industrial-truck-license-expiry-check
version: 1
name: Powered Industrial Truck License Expiry Check
description: >
  Checks each operator's powered industrial truck (forklift/PIT)
  certification expiry date and flags anyone due for recertification
  soon or already expired. Use this if an operator has ever kept driving
  a forklift on an expired certification because nobody was tracking
  individual recert dates separately from the equipment's own inspection
  schedule.
category: warehousing
tags: [warehousing, certification, forklift, osha, compliance]
schedule: "0 7 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v days="{{expiry_warning_days}}" -v today="$today" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline expiry_epoch; close(cmd);
      days_left = (expiry_epoch - today) / 86400;
      if (days_left <= days) {
        status = (days_left < 0) ? "EXPIRED" : "EXPIRING SOON";
        printf "%s: operator %s — PIT certification expires %s (%d days)\n", status, $1, $2, days_left;
      }
    }
  ' "{{pit_certification_log_csv_path}}"
variables:
  pit_certification_log_csv_path:
    default: "./pit-certification-log.csv"
    description: "Path to a CSV with columns: operator_name,certification_expiry_date (YYYY-MM-DD)."
  expiry_warning_days:
    default: 30
    description: Days before expiry (or already past it, as a negative count) at which an operator's certification is flagged.
compatible_agents: [generic, claude, codex]
notes: Tracks operator certification only, distinct from mhe-preventive-maintenance-check and forklift-inspection-check, which track the equipment rather than the driver.
