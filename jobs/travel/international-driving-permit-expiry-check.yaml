id: international-driving-permit-expiry-check
version: 1
name: International Driving Permit Expiry Check
description: >
  Warns you before your International Driving Permit (IDP) expires or
  before an upcoming trip where you'll need one but haven't gotten it
  yet. Use this if you've ever shown up at a rental counter abroad
  without the permit and gotten turned away.
category: travel
tags: [travel, driving, documents, international]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  has_idp="{{has_valid_idp}}"; expiry={{idp_expiry_date}}; trip="{{next_driving_trip_date}}"; warn_days={{warn_days_before_trip}};
  trip_epoch=$(date -d "$trip" +%s 2>/dev/null || date -jf "%Y-%m-%d" "$trip" +%s);
  today_epoch=$(date +%s);
  days_to_trip=$(( (trip_epoch-today_epoch)/86400 ));
  if [ "$has_idp" != "true" ]; then
    if [ "$days_to_trip" -ge 0 ] && [ "$days_to_trip" -le "$warn_days" ]; then echo "WARNING: no valid IDP on file and a driving trip is in $days_to_trip day(s) — apply now, most permits are issued same-day but only in person."; exit 1;
    else echo "note: no valid IDP on file. Next driving trip in $days_to_trip day(s)."; fi
  else
    expiry_epoch=$(date -j -f %Y-%m-%d "$expiry" +%s 2>/dev/null || date -d "$expiry" +%s);
    days_left=$(( (expiry_epoch-today_epoch)/86400 ));
    if [ "$days_left" -le 0 ]; then echo "EXPIRED: IDP expired on $expiry — get a new one before your next driving trip."; exit 1;
    elif [ "$days_left" -le "$warn_days" ] && [ "$days_to_trip" -le "$warn_days" ]; then echo "WARNING: IDP expires in $days_left day(s) ($expiry), driving trip in $days_to_trip day(s) — renew before departure."; exit 1;
    else echo "OK: IDP valid, $days_left day(s) until expiry."; fi
  fi
variables:
  has_valid_idp:
    default: "false"
    description: "\"true\" if you currently hold a valid International Driving Permit."
  idp_expiry_date:
    default: "2027-01-01"
    description: Date (YYYY-MM-DD) your IDP expires, if you have one. IDPs typically expire 1 year after issue.
  next_driving_trip_date:
    default: "2026-12-31"
    description: Date of your next trip where you plan to drive abroad (YYYY-MM-DD).
  warn_days_before_trip:
    default: 21
    description: Start warning this many days before a driving trip if the IDP is missing or will have expired.
compatible_agents: [generic, claude, codex]
notes: >
  Zero-token. IDP eligibility rules and issuing bodies vary by home country
  (e.g. AAA/AATA in the US); this job only tracks dates, it doesn't verify
  whether an IDP is actually required at your destination.
