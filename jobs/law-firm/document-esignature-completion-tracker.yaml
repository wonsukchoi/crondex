id: document-esignature-completion-tracker
version: 1
name: Document E-Signature Completion Tracker
description: >
  Checks a log of documents sent for e-signature, such as engagement
  letters and settlement agreements, and flags any that have not
  completed within a target turnaround window. Use this if signed
  documents sometimes stall in a signer's inbox and nobody follows up
  until a matter is blocked on it.
category: law-firm
tags: [law-firm, esignature, engagement-letters, settlement-agreements]
schedule: "0 9 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v max_days="{{max_days_to_complete}}" '
    NR==1 {next}
    $4=="pending" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline sent_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      age_days = (now_epoch - sent_epoch) / 86400;
      if (age_days > max_days) {
        printf "OVERDUE: %s (%s) sent %s, pending %d days (limit %d)\n", $1, $3, $2, age_days, max_days;
        flagged++;
      }
      total++;
    }
    END {
      if (flagged + 0 == 0) { print "OK: no pending e-signature documents past the turnaround target."; }
      else { printf "%d of %d pending e-signature documents are past the turnaround target.\n", flagged, total; }
    }
  ' "{{esignature_log_csv_path}}"
variables:
  esignature_log_csv_path:
    default: "./esignature_log.csv"
    description: "Path to a CSV with columns: document_id,sent_date (YYYY-MM-DD),document_type,status (pending/completed/declined/voided)."
  max_days_to_complete:
    default: 5
    description: Maximum allowed days a document can remain pending signature before it is flagged for follow-up.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only check against an e-signature vendor's status export; it does
  not send reminder emails or re-trigger the signature request itself.
