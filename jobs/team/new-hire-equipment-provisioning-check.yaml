id: new-hire-equipment-provisioning-check
version: 1
name: New Hire Equipment Provisioning Check
description: >
  Flags new hires whose laptop, badge, or other required equipment hasn't
  been marked provisioned within a few days of their start date. Use this if
  a new hire has ever shown up on day one without a working laptop because
  IT provisioning fell through the cracks.
category: team
tags: [team, onboarding, equipment, it]
schedule: "0 8 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F, -v today="$today" -v warn={{grace_days}} '
    NR>1 && $3 == "not_provisioned" {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline start_ts; close(cmd);
      days_since = int((today - start_ts) / 86400);
      if (days_since >= warn) print "WARNING: " $1 " started " days_since " days ago, equipment still not provisioned";
    }
  ' {{new_hires_csv}}
variables:
  new_hires_csv:
    default: "new-hires.csv"
    description: "CSV with header row, columns: name,start_date(YYYY-MM-DD),equipment_status(not_provisioned/provisioned)."
  grace_days:
    default: 2
    description: Days after start date before missing equipment gets flagged.
compatible_agents: [generic, claude, codex]
notes: Keep new-hires.csv updated as IT marks equipment shipped/set up — one row per new hire.
