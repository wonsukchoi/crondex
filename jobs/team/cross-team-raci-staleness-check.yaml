id: cross-team-raci-staleness-check
version: 1
name: Cross-Team RACI Staleness Check
description: >
  Warns you when a shared ownership or RACI document hasn't been updated
  in a while. Use this if cross-team ownership docs have ever gone stale
  and caused confusion about who owns what.
category: team
tags: [raci, ownership, cross-team]
schedule: "0 9 1 * *"
timezone: "UTC"
runner: shell
command: >
  today_epoch=$(date +%s);
  updated_epoch=$(date -j -f %Y-%m-%d "{{raci_doc_last_updated}}" +%s 2>/dev/null || date -d "{{raci_doc_last_updated}}" +%s);
  days_since=$(( (today_epoch-updated_epoch)/86400 ));
  if [ "$days_since" -ge {{stale_after_days}} ]; then
    echo "STALE: RACI doc ({{raci_doc_url}}) last updated $days_since day(s) ago (threshold {{stale_after_days}}) — confirm owners are still accurate.";
  else echo "OK: RACI doc updated $days_since day(s) ago."; fi
variables:
  raci_doc_url:
    default: ""
    description: Link or short label for the RACI/ownership document being tracked.
  raci_doc_last_updated:
    default: "2026-01-01"
    description: Date (YYYY-MM-DD) the RACI doc was last updated.
  stale_after_days:
    default: 120
    description: Flag the doc as stale after this many days without an update.
compatible_agents: [generic, claude, codex]
notes: >
  Zero-token. You maintain raci_doc_last_updated yourself — this doesn't
  pull from any wiki or docs system.
