name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: validate job schema
        run: npm run validate

      - name: check catalog.json is up to date
        run: |
          npm run build-catalog
          git diff --exit-code catalog.json || {
            echo "::error::catalog.json is stale — run 'npm run build-catalog' and commit the result.";
            exit 1;
          }
