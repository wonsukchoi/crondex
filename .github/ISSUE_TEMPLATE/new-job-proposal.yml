name: New job proposal
description: Propose a new cron job for the catalog (or request one you'd like someone else to add).
title: "[job] "
labels: ["new-job"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: run `node bin/crondex.js recommend "<what you want>"` — if a close
        match already exists, prefer improving it over proposing a near-duplicate.
        See [CONTRIBUTING.md](../../CONTRIBUTING.md) for the full job format.

  - type: input
    id: id
    attributes:
      label: Proposed job id
      description: "lowercase-with-hyphens, matches the pattern ^[a-z0-9]+(-[a-z0-9]+)*$"
      placeholder: ssl-cert-expiry-check
    validations:
      required: true

  - type: input
    id: category
    attributes:
      label: Category
      description: An existing category (see `node bin/crondex.js categories`) or a new one.
      placeholder: devops
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What should this job do, and who's it for?
      description: One sentence on what it does, one on when you'd want it. Write for a normal person, not an agent.
      placeholder: "Checks how many days are left before a website's SSL certificate expires. Use this if you run a site and want a warning before the padlock breaks."
    validations:
      required: true

  - type: dropdown
    id: runner
    attributes:
      label: Runner type
      description: "shell = zero tokens, fully scriptable. agent-prompt = needs synthesis/judgment. hybrid = both."
      options:
        - shell
        - agent-prompt
        - hybrid
        - not sure yet
    validations:
      required: true

  - type: textarea
    id: schedule
    attributes:
      label: Suggested schedule + any variables it should take
      placeholder: |
        Schedule: 0 6 * * * (daily at 6am)
        Variables: host (default example.com), warn_days (default 14)

  - type: checkboxes
    id: submitting
    attributes:
      label: Are you submitting the PR yourself?
      options:
        - label: I plan to open the PR for this job
        - label: I'm just proposing it — open to someone else picking it up
