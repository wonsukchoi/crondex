id: funding-delay-alert
version: 1
name: Funding Delay Alert
description: >
  Checks merchant payout/funding batches against their expected T+N
  business-day funding window and flags any batch that still hasn't posted
  once that window has passed. Use this if a merchant funding batch has ever
  silently stalled between settlement and the bank transfer, leaving a
  merchant unpaid with nobody noticing until they escalated.
category: payments
tags: [payments, funding, payouts, merchant-services]
schedule: "0 8 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v max_days="{{funding_window_business_days}}" -v today_str="$(date +%Y-%m-%d)" '
    NR==1 {next}
    $4=="pending" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline batch_epoch; close(cmd);
      cmd2 = "date -d \"" today_str "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" today_str "\" +%s 2>/dev/null";
      cmd2 | getline today_epoch; close(cmd2);
      elapsed_days = (today_epoch - batch_epoch) / 86400;
      if (elapsed_days > max_days) {
        printf "FUNDING DELAY: merchant %s batch %s from %s still pending after %d days (window %d business days)\n", $1, $3, $2, elapsed_days, max_days;
        delayed++;
      }
    }
    END {
      if (delayed == 0) { print "OK: no funding batches past their expected window."; }
    }
  ' "{{funding_batches_csv_path}}"
variables:
  funding_batches_csv_path:
    default: "./funding_batches.csv"
    description: "Path to a CSV with columns: merchant_id,batch_date (YYYY-MM-DD),batch_id,status (pending/posted)."
  funding_window_business_days:
    default: 2
    description: "Expected T+N business-day window for a funding batch to post before it's flagged as delayed."
compatible_agents: [generic, claude, codex]
notes: >
  Read-only check against a funding batch export your payout system already
  produces; the business-day math here is a simple calendar-day approximation
  and does not account for bank holidays. It does not itself trigger or
  retry a payout.
