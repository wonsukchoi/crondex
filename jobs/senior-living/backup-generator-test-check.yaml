id: backup-generator-test-check
version: 1
name: Backup Generator Test Check
description: >
  Checks the facility's backup generator test log against the required
  test interval and flags any test coming due or overdue. Use this if a
  power outage has ever revealed a generator that hadn't actually been
  load-tested in months, separate from the general fire/evacuation drill
  schedule that doesn't cover life-support and building-systems power
  continuity.
category: senior-living
tags: [senior-living, generator, emergency-preparedness, facilities]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{test_interval_days}}" -v warn="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_test_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      next_due_epoch = last_test_epoch + (days * 86400);
      diff_days = (next_due_epoch - now_epoch) / 86400;
      if (diff_days <= warn) {
        printf "GENERATOR TEST DUE: %s — last tested %s, %s-day interval (%d days until/past due)\n", $1, $2, days, diff_days;
      }
    }
  ' "{{generator_test_log_csv_path}}"
variables:
  generator_test_log_csv_path:
    default: "./generator-test-log.csv"
    description: "Path to a CSV with columns: generator_id,last_test_date (YYYY-MM-DD)."
  test_interval_days:
    default: 30
    description: Required load-test interval in days per your facility's emergency power plan/regulation.
  warn_days_before:
    default: 5
    description: How many days before the next required test is due to start warning.
compatible_agents: [generic, claude, codex]
notes: Distinct from `emergency-preparedness-drill-reminder` (fire/evacuation drills for staff and residents, not building power-continuity equipment) — generator load testing is a separate facilities-maintenance requirement with its own cadence.
