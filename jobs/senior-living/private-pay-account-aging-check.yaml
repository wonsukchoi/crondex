id: private-pay-account-aging-check
version: 1
name: Private-Pay Account Aging Check
description: >
  Looks through private-pay resident billing accounts for balances that are
  past due and flags the ones falling behind schedule. Use this if you want
  billing staff to catch a resident's account sliding into arrears early,
  before it grows into a serious collections problem.
category: senior-living
tags: [billing, private-pay, accounts-receivable, aging]
schedule: "0 7 * * 1"
timezone: "UTC"
runner: shell
command: >
  psql "{{database_url}}" -t -c "select resident_id, resident_name, balance_due, days_past_due from private_pay_accounts where days_past_due >= {{aging_threshold_days}} order by days_past_due desc;"
variables:
  database_url:
    default: "postgres://user:pass@host:5432/db"
    description: Connection string for the billing/accounts database.
  aging_threshold_days:
    default: 30
    description: Number of days past the due date before an account is flagged.
compatible_agents: [generic, claude, codex]
notes: >
  Assumes a `private_pay_accounts` table with `resident_id`, `resident_name`,
  `balance_due`, and `days_past_due` columns — adjust the query to match your
  billing system's schema. Read-only: this only flags accounts for billing
  staff to follow up on, it does not send statements or contact anyone.
