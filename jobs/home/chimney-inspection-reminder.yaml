id: chimney-inspection-reminder
version: 1
name: Chimney Inspection Reminder
description: >
  Reminds you to get your chimney and flue inspected/swept based on how
  long it's been since the last inspection. Use this if you burn wood
  regularly and don't want creosote buildup to turn into a chimney fire.
category: home
tags: [home, chimney, safety, maintenance]
schedule: "0 9 1 * *"
timezone: "America/Los_Angeles"
runner: shell
command: >
  last={{last_inspected_date}}; interval={{interval_months}};
  last_epoch=$(date -j -f %Y-%m-%d "$last" +%s 2>/dev/null || date -d "$last" +%s);
  today_epoch=$(date +%s);
  days_since=$(( (today_epoch-last_epoch)/86400 ));
  interval_days=$(( interval * 30 ));
  if [ "$days_since" -ge "$interval_days" ]; then echo "REMINDER: chimney last inspected $days_since day(s) ago (every ${interval} months) — schedule an inspection/sweep.";
  else echo "OK: inspected $days_since day(s) ago, due again around day $interval_days."; fi
variables:
  last_inspected_date:
    default: "2026-01-01"
    description: Date (YYYY-MM-DD) you last had the chimney inspected/swept — update this yourself.
  interval_months:
    default: 12
    description: How often to inspect the chimney, in months. Shorten this if you burn wood heavily.
compatible_agents: [generic, claude, codex]
notes: Zero-token. You update last_inspected_date yourself after each inspection. Skip this if you have no fireplace or wood/pellet stove.
