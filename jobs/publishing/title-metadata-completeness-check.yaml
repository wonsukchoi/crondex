id: title-metadata-completeness-check
version: 1
name: Title Metadata Completeness Check
description: >
  Checks upcoming titles for missing catalog metadata — subtitle, BISAC
  category code, page count, or cover image file — that retailers and
  distributors require before a title can be listed for sale. Use this if
  a title has ever gone up for preorder with a missing cover file or blank
  BISAC code, which can get a listing rejected or buried by a retailer.
category: publishing
tags: [publishing, metadata, catalog, pre-press]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' '
    NR>1 {
      missing = "";
      if ($2 == "") missing = missing " subtitle";
      if ($3 == "") missing = missing " bisac_code";
      if ($4+0 <= 0) missing = missing " page_count";
      if ($5 == "") missing = missing " cover_image_path";
      else { cmd = "test -f \"" $5 "\" && echo yes || echo no"; cmd | getline exists; close(cmd); if (exists == "no") missing = missing " cover_image_file_not_found"; }
      if (missing != "") print "INCOMPLETE METADATA: \"" $1 "\" missing:" missing;
    }
  ' "{{titles_metadata_csv}}"
variables:
  titles_metadata_csv:
    default: "./titles-metadata.csv"
    description: "CSV with header row, columns: title,subtitle,bisac_code,page_count,cover_image_path."
compatible_agents: [generic, claude, codex]
notes: >
  cover_image_path is checked for existence on the local filesystem (or a
  mounted asset drive) with `test -f`, not fetched over the network —
  point it at wherever cover files actually live for this to work.
