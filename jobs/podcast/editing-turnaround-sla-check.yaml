id: editing-turnaround-sla-check
version: 1
name: Podcast Editing Turnaround SLA Check
description: >
  Flags episodes sitting in the editor's queue past your usual turnaround
  time. Use this if an episode has ever missed its publish date because it
  was quietly stuck waiting on an edit and nobody followed up with the
  editor in time.
category: podcast
tags: [podcast, editing, production, sla]
schedule: "0 9 * * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F, -v today="$today" -v sla={{sla_days}} '
    NR>1 && $3 == "in-editing" {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline sent_ts; close(cmd);
      days_in_edit = int((today - sent_ts) / 86400);
      if (days_in_edit > sla) print "WARNING: " $1 " sent to editing " days_in_edit " days ago, past the " sla "-day SLA";
    }
  ' {{editing_queue_csv}}
variables:
  editing_queue_csv:
    default: "editing-queue.csv"
    description: "CSV with header row, columns: episode_title,sent_to_editor_date(YYYY-MM-DD),status(in-editing/returned)."
  sla_days:
    default: 5
    description: Number of days an episode is allowed to sit with the editor before it's flagged as overdue.
compatible_agents: [generic, claude, codex]
notes: Update status to "returned" in editing-queue.csv once the edited cut comes back, so the row stops flagging.
