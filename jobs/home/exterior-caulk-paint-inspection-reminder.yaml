id: exterior-caulk-paint-inspection-reminder
version: 1
name: Exterior Paint & Caulking Inspection Reminder
description: >
  Reminds you to walk the outside of the house and check for cracked,
  peeling paint and failed caulking around windows, doors, and trim based
  on how long it's been since the last check. Use this if you've ever
  found water damage behind a wall because a hairline gap in the caulking
  let moisture in for a whole season before anyone noticed.
category: home
tags: [home, exterior, maintenance, seasonal, paint]
schedule: "0 9 1 * *"
timezone: "America/Los_Angeles"
runner: shell
command: >
  last={{last_inspected_date}}; interval={{interval_months}};
  last_epoch=$(date -j -f %Y-%m-%d "$last" +%s 2>/dev/null || date -d "$last" +%s);
  today_epoch=$(date +%s);
  days_since=$(( (today_epoch-last_epoch)/86400 ));
  interval_days=$(( interval * 30 ));
  if [ "$days_since" -ge "$interval_days" ]; then echo "REMINDER: exterior paint/caulking last inspected $days_since day(s) ago (every ${interval} months) — walk the exterior and check for cracked/peeling paint and gapped caulk around windows, doors, and trim.";
  else echo "OK: inspected $days_since day(s) ago, due again around day $interval_days."; fi
variables:
  last_inspected_date:
    default: "2026-01-01"
    description: Date (YYYY-MM-DD) you last inspected the exterior paint and caulking — update this yourself.
  interval_months:
    default: 6
    description: How often to inspect, in months. Coastal/high-UV/freeze-thaw climates should shorten this.
compatible_agents: [generic, claude, codex]
notes: Zero-token. You update last_inspected_date yourself each time you actually inspect. This is the visual walk-around check, not a substitute for a professional exterior/roof inspection.
