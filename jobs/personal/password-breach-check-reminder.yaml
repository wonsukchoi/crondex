id: password-breach-check-reminder
version: 1
name: Personal Password Breach Check Reminder
description: >
  Periodically checks your personal email addresses against known data
  breach databases and tells you which accounts need a new password. Use
  this if you've ever found out an account was compromised months after
  the breach because nobody was checking.
category: personal
tags: [security, passwords, breach, privacy, personal]
schedule: "0 9 1 * *"
timezone: "America/Los_Angeles"
runner: agent-prompt
prompt: |
  Check {{email_addresses}} against known data breach sources (e.g. Have I
  Been Pwned's API or website, or any breach-monitoring service you have
  access to) for breaches reported since {{last_checked_date}}.
  1. List any new breach found: service name, breach date, and what data
     types were exposed (passwords, emails, etc.).
  2. For each affected account, recommend changing that password now and
     enabling two-factor authentication if it isn't already on.
  3. If nothing new turned up, say so plainly in one line.
  Keep the report short and actionable — this is a personal check, not a
  security audit.
variables:
  email_addresses:
    default: "your-email@example.com"
    description: Comma-separated personal email address(es) to check.
  last_checked_date:
    default: "2026-06-01"
    description: Date of the last breach check, so only new breaches are worth flagging (update after each run).
compatible_agents: [claude, codex, hermes, openclaw, generic]
notes: >
  No generic script mode — breach lookups need an API/service (e.g. Have I
  Been Pwned) that isn't guaranteed to be available or free for every agent.
  This is a personal-account check, distinct from org-wide work-security
  jobs like security/2fa-enrollment-audit.yaml or
  security/failed-login-watch.yaml, which audit company accounts and
  infrastructure logs rather than a person's own email addresses. Read-only
  — never changes a password itself.
