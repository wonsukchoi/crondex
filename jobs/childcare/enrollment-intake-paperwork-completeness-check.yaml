id: enrollment-intake-paperwork-completeness-check
version: 1
name: Enrollment Intake Paperwork Completeness Check
description: >
  Checks each newly enrolled child's intake packet (enrollment agreement,
  handbook acknowledgment, health history, emergency form, etc.) against
  how many required documents are actually on file and flags anyone past
  the intake grace period still incomplete. Use this if a child has ever
  started attending before the full intake packet was actually collected,
  not just promised — distinct from parent-consent-form-renewal-check,
  which tracks annual renewal of specific ongoing consent forms rather than
  one-time intake completeness for a new enrollment.
category: childcare
tags: [childcare, enrollment, paperwork, intake, compliance]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v grace="{{grace_period_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline enroll_epoch; close(cmd);
      age_days = (today - enroll_epoch) / 86400;
      submitted = $3 + 0;
      required = $4 + 0;
      if (age_days >= grace && submitted < required) {
        printf "INCOMPLETE INTAKE: %s — enrolled %s (%d days ago), %d of %d required documents on file\n", $1, $2, age_days, submitted, required;
      }
    }
  ' "{{intake_paperwork_csv_path}}"
variables:
  intake_paperwork_csv_path:
    default: "./enrollment-intake-paperwork.csv"
    description: "Path to a CSV with columns: child_id,enrollment_date (YYYY-MM-DD),documents_submitted,documents_required."
  grace_period_days:
    default: 10
    description: Days after enrollment before an incomplete intake packet counts as overdue.
compatible_agents: [generic, claude, codex]
notes: Confirm your program's actual required intake document list — it varies by funding source (e.g. subsidized/CACFP programs require more than a private-pay intake) — and follow up with the family directly rather than assuming the gap will close itself.
