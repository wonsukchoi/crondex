id: livestock-vaccination-schedule-reminder
version: 1
name: Livestock Vaccination Schedule Reminder
description: >
  Checks each animal group's next vaccination or booster due date and
  flags anything coming up soon, so herd health protocols don't slip. Use
  this if you've ever realized a booster was overdue only after an animal
  got sick.
category: agriculture
tags: [agriculture, livestock, vaccination, animal-health]
schedule: "0 6 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v warn="{{warn_days_before}}" -v today="$today" '
    NR==1 {next}
    {
      cmd = "date -d \"" $3 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $3 "\" +%s 2>/dev/null";
      cmd | getline due_ts; close(cmd);
      days_left = (due_ts - today) / 86400;
      if (days_left <= warn) {
        printf "DUE: %s — %s due %s (%d days left)\n", $1, $2, $3, days_left;
      }
    }
  ' "{{vaccination_schedule_csv_path}}"
variables:
  vaccination_schedule_csv_path:
    default: "./livestock-vaccinations.csv"
    description: "Path to a CSV with columns: animal_group,vaccine_or_treatment,due_date (YYYY-MM-DD)."
  warn_days_before:
    default: 14
    description: Days before the due date to start warning.
compatible_agents: [generic, claude, codex]
notes: Keep the schedule CSV in sync with your vet's protocol — this is a date-tracking reminder, not veterinary guidance on what to administer.
