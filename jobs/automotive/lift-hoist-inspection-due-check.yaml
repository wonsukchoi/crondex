id: lift-hoist-inspection-due-check
version: 1
name: Lift/Hoist Safety Inspection Due Check
description: >
  Checks each vehicle lift or hoist's last annual safety inspection date
  against your required inspection interval and flags any bay whose
  inspection is due or overdue. Use this if a lift has ever kept running
  past its inspection window because the paperwork lived in a drawer nobody
  checked.
category: automotive
tags: [automotive, equipment, safety, inspection]
schedule: "0 7 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v warn="{{warn_days}}" -v today="$today" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 " +1 year\" +%s 2>/dev/null || date -j -v+1y -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline due_ts; close(cmd);
      days_left = (due_ts - today) / 86400;
      if (days_left <= warn) {
        printf "INSPECTION DUE: %s (bay %s) — last inspected %s (%d days until due)\n", $1, $3, $2, days_left;
      }
    }
  ' "{{lift_inspections_csv_path}}"
variables:
  lift_inspections_csv_path:
    default: "./lift-hoist-inspections.csv"
    description: "Path to a CSV with columns: lift_id,last_inspection_date (YYYY-MM-DD),bay_number."
  warn_days:
    default: 30
    description: Days before the annual inspection anniversary to start warning.
compatible_agents: [generic, claude, codex]
notes: >
  Assumes an annual inspection cycle, which is typical for ALI-certified
  lift inspections in the US; adjust the `+1 year` offset in `command` if
  your jurisdiction or insurer requires a different interval. Read-only
  check — does not schedule the inspection itself.
