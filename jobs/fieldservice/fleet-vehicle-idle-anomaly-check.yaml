id: fleet-vehicle-idle-anomaly-check
version: 1
name: Fleet Vehicle GPS Idle-Time Anomaly Check
description: >
  Reads exported fleet GPS/telematics logs and flags vehicles with idle
  time above your threshold for a day, which usually means wasted fuel,
  a tech running personal errands, or a truck sitting at the wrong job
  site too long. Use this if fuel costs have ever crept up without a
  clear explanation and nobody was reviewing the idle-time data to find
  out why.
category: fieldservice
tags: [fieldservice, fleet, telematics, idle-time]
schedule: "0 6 * * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v threshold="{{max_idle_minutes}}" '
    NR==1 {next}
    {
      idle = $3 + 0;
      if (idle >= threshold) {
        printf "IDLE ANOMALY: vehicle %s (%s) — %d idle minutes on %s\n", $1, $2, idle, $4;
      }
    }
  ' "{{fleet_telematics_csv_path}}"
variables:
  fleet_telematics_csv_path:
    default: "./fleet-telematics.csv"
    description: "Path to a CSV with columns: vehicle_id,tech_name,idle_minutes,report_date."
  max_idle_minutes:
    default: 60
    description: Idle minutes in a single day above which a vehicle is flagged for review.
compatible_agents: [generic, claude, codex]
notes: This job flags outliers only — confirm with dispatch or GPS map history before assuming misuse; long idle can also mean a legitimate long job.
