id: parking-citation-check
version: 1
name: Parking Citation Check
description: >
  Checks fleet parking citations against their payment due date and flags
  any unpaid citation approaching or past due. Use this if a fleet
  vehicle has ever accrued late penalties or a registration hold because
  a parking ticket sat unpaid outside the normal toll and moving-violation
  tracking.
category: fleet
tags: [fleet, parking, citation, compliance]
schedule: "0 7 * * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_days_before}}" '
    NR==1 {next}
    {
      paid = tolower($4);
      if (paid == "yes" || paid == "true") { next }
      cmd = "date -d \"" $3 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $3 "\" +%s 2>/dev/null";
      cmd | getline due_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      diff_days = (due_epoch - now_epoch) / 86400;
      if (diff_days <= days) {
        printf "PARKING CITATION DUE: vehicle %s — citation %s due %s (%d days)\n", $1, $2, $3, diff_days;
      }
    }
  ' "{{parking_citations_csv_path}}"
variables:
  parking_citations_csv_path:
    default: "./fleet-parking-citations.csv"
    description: "Path to a CSV with columns: vehicle_id,citation_id,due_date (YYYY-MM-DD),paid (yes/no)."
  warn_days_before:
    default: 5
    description: How many days before the citation payment due date to start warning.
compatible_agents: [generic, claude, codex]
notes: Distinct from `toll-violation-tracker` (unpaid toll fees, a different municipal/agency channel) — parking citations are typically issued and collected by a separate city/county parking authority.
