id: insurance-coverage-lapse-check
version: 2
name: Insurance Coverage Lapse Check
description: >
  Looks at every active tenant/unit lease and flags anyone whose required
  insurance or goods-protection policy has expired, been canceled, or was
  never set up in the first place. Use this if your lease requires tenants
  to carry coverage — storage-unit goods protection, apartment renters
  insurance, or any similar lease-mandated policy — as a condition of the
  lease and you want to catch gaps before a claim (or an audit) exposes
  them.
category: self-storage
tags: [self-storage, insurance, compliance, lease-requirement]
schedule: "0 6 * * *"
timezone: "UTC"
runner: shell
command: >
  psql "{{database_url}}" -t -c "select t.unit_number, t.tenant_name, p.policy_status, p.expiration_date from tenants t left join insurance_policies p on p.tenant_id = t.id where t.lease_active = true and (p.policy_status is null or p.policy_status <> 'active' or p.expiration_date < current_date + interval '{{lookahead_days}} days') order by p.expiration_date asc nulls first;"
variables:
  database_url:
    default: "postgres://user:pass@host:5432/db"
    description: Connection string for the facility management database.
  lookahead_days:
    default: 0
    description: >
      How many days ahead of the actual expiration date to start flagging a
      policy, so staff can reach out before coverage actually lapses rather
      than only after.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only: it only reports gaps, it does not cancel a lease, bill a
  tenant, or enroll anyone in a policy automatically. Assumes a `tenants`
  table with `lease_active`, and an `insurance_policies` table keyed by
  `tenant_id` with `policy_status` and `expiration_date` — adjust the join
  and column names to your actual schema, including if your facility
  auto-enrolls tenants in a house protection plan billed alongside rent
  rather than tracking third-party policies. Merged in v2 from a
  near-duplicate realestate "tenant renters insurance compliance" check:
  if you don't have a database, the same logic works fine against a plain
  CSV of tenant_name,unit,coverage_expiration_date — just distinguish
  "LAPSED" (already past expiration) from "EXPIRING SOON" (within your
  warning window) in the output for clearer triage. Also distinct from
  subcontractor-insurance-expiry-check in jobs/construction, which tracks
  contractor COIs on a job site rather than a tenant's own required
  coverage.
