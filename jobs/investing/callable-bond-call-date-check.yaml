id: callable-bond-call-date-check
version: 1
name: Callable Bond Call Date Check
description: >
  Warns when a callable bond's next call date is approaching, since an
  issuer can redeem the bond early and return principal before the
  stated maturity. Use this if you've ever held a callable bond assuming
  it would run to full maturity and been surprised by an early
  redemption that cut off expected interest income.
category: investing
tags: [investing, bonds, callable-bond, call-risk]
schedule: "0 9 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F, -v today="$today" -v warn={{warn_days}} '
    NR>1 {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline call_ts; close(cmd);
      days_left = int((call_ts - today) / 86400);
      if (days_left >= 0 && days_left <= warn) print "WARNING: \"" $1 "\" has a call date on " $2 " (" days_left " days away) at call price " $3 " — issuer may redeem early.";
    }
  ' {{callable_holdings_csv}}
variables:
  callable_holdings_csv:
    default: "callable-bond-holdings.csv"
    description: "CSV with header row, columns: name,next_call_date(YYYY-MM-DD),call_price — one row per callable bond you hold."
  warn_days:
    default: 45
    description: Days before the next call date to start warning.
compatible_agents: [generic, claude, codex]
notes: >
  Update callable-bond-holdings.csv whenever you buy a callable bond or
  its next call date changes (check the issuer's redemption schedule or
  your broker's bond detail page). This is distinct from
  bond-cd-maturity-reminder, which tracks final maturity, not an
  issuer's option to call the bond earlier.
