id: farm-subsidy-grant-deadline-tracker
version: 1
name: Farm Subsidy/Grant Deadline Tracker
description: >
  Checks a list of government subsidy, cost-share, or grant programs
  you're tracking against their application deadlines and warns before any
  close. Use this if you've ever missed out on a cost-share program
  because the sign-up window closed before you got around to the
  paperwork.
category: agriculture
tags: [agriculture, subsidy, grant, funding, deadline]
schedule: "0 7 * * 1"
timezone: "America/Chicago"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v warn="{{warn_days_before}}" -v today="$today" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline due_ts; close(cmd);
      days_left = (due_ts - today) / 86400;
      if (days_left >= 0 && days_left <= warn) {
        printf "DEADLINE: %s closes %s (%d days left)\n", $1, $2, days_left;
      }
    }
  ' "{{programs_csv_path}}"
variables:
  programs_csv_path:
    default: "./subsidy-grant-programs.csv"
    description: "Path to a CSV with columns: program_name,application_deadline (YYYY-MM-DD)."
  warn_days_before:
    default: 21
    description: Days before the deadline to start warning.
compatible_agents: [generic, claude, codex]
notes: You maintain the programs list yourself (USDA FSA/NRCS or state programs you're watching) — this is a deadline tracker, not a program discovery tool.
