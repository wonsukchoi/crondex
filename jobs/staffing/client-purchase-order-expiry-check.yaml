id: client-purchase-order-expiry-check
version: 1
name: Client Purchase Order Expiry Check
description: >
  Checks client purchase orders against their expiration or not-to-exceed
  dates and flags ones expiring soon. Use this if timesheets have ever kept
  billing against a PO that quietly lapsed, leaving an invoice with no valid
  authorization behind it.
category: staffing
tags: [staffing, purchase-orders, billing, clients]
schedule: "0 7 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_within_days}}" '
    NR==1 {next}
    {
      client=$1; po_number=$2; expiry=$3;
      cmd = "date -d \"" expiry "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" expiry "\" +%s 2>/dev/null";
      cmd | getline exp_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      diff_days = int((exp_epoch - now_epoch) / 86400);
      if (diff_days < 0) {
        printf "EXPIRED: %s — PO %s expired %s\n", client, po_number, expiry;
      } else if (diff_days <= days) {
        printf "EXPIRING SOON: %s — PO %s expires %s (%d days out)\n", client, po_number, expiry, diff_days;
      }
    }
  ' "{{client_pos_csv_path}}"
variables:
  client_pos_csv_path:
    default: "./client-purchase-orders.csv"
    description: "Path to a CSV with columns: client_name,po_number,expiry_date(YYYY-MM-DD)."
  warn_within_days:
    default: 21
    description: Days before expiry at which a PO gets flagged.
compatible_agents: [generic, claude, codex]
notes: Read-only check. Requesting a renewed or extended PO from the client is a manual account-manager step.
