id: database-connection-pool-exhaustion-check
version: 1
name: Database Connection Pool Exhaustion Check
description: >
  Checks how many connections your database's connection pool is currently
  using compared to its configured maximum, and flags it when utilization
  is trending toward running out. Use this if you've ever had requests
  start timing out or erroring because the app ran out of database
  connections before anyone noticed the pool was nearly full.
category: devops
tags: [database, connection-pool, capacity, postgres]
schedule: "*/10 * * * *"
timezone: "UTC"
runner: shell
command: >
  psql "{{database_url}}" -t -A -c "select count(*) as active, {{max_connections}} as max_conn, round(100.0 * count(*) / {{max_connections}}, 1) as percent_used from pg_stat_activity;" | awk -F'|' -v thresh={{warn_threshold_percent}} '{ if ($3+0 >= thresh) print "WARNING: connection pool at " $3 "% (" $1 "/" $2 ")"; else print "OK: connection pool at " $3 "% (" $1 "/" $2 ")" }'
variables:
  database_url:
    default: "postgres://user:pass@host:5432/db"
    description: Connection string for the database to check.
  max_connections:
    default: 100
    description: Maximum number of connections the pool is configured to allow.
  warn_threshold_percent:
    default: 80
    description: Percentage of the max pool size at which to flag a warning.
compatible_agents: [generic, claude, codex]
notes: >
  Written for Postgres using `pg_stat_activity`; swap the query for your
  engine's equivalent (e.g. `SHOW STATUS LIKE 'Threads_connected'` for
  MySQL) if different. Read-only: only reads connection statistics, never
  terminates or alters a connection.
