id: shutoff-moratorium-compliance-check
version: 1
name: Shutoff Moratorium Compliance Check
description: >
  Checks scheduled and recently executed disconnection/shutoff actions
  against the active regulatory or seasonal moratorium window (such as a
  winter heating moratorium) and flags any that fall inside a protected
  period. Use this if a utility has ever had a shutoff go out during a
  moratorium and turn into a compliance violation and a bad news story.
category: utilities
tags: [utilities, disconnection, moratorium, compliance, regulatory]
schedule: "0 5 * * *"
timezone: "UTC"
runner: shell
command: >
  psql "{{database_url}}" -t -c "select account_id, action_type, scheduled_date, executed_date from disconnection_actions where (scheduled_date between '{{moratorium_start_date}}' and '{{moratorium_end_date}}') or (executed_date between '{{moratorium_start_date}}' and '{{moratorium_end_date}}') order by coalesce(executed_date, scheduled_date) asc;"
variables:
  database_url:
    default: "postgres://user:pass@host:5432/db"
    description: Connection string for the disconnection/collections action database.
  moratorium_start_date:
    default: "2026-11-01"
    description: Start date of the active regulatory or seasonal shutoff moratorium (e.g. winter heating moratorium).
  moratorium_end_date:
    default: "2027-03-31"
    description: End date of the active regulatory or seasonal shutoff moratorium.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only compliance check — this job only reports actions that fall inside the moratorium
  window; it does not itself disconnect, reconnect, cancel, or reschedule any service. Assumes a
  `disconnection_actions` table with `account_id`, `action_type`, `scheduled_date`, and
  `executed_date` columns — adjust the query to your schema. Any row this job returns is a
  potential regulatory violation and should go to the collections/compliance team immediately,
  not be auto-remediated.
