id: sod-installation-warranty-followup-check
version: 1
name: Sod Installation Warranty Follow-Up Check
description: >
  Checks your sod/turf installation log for jobs approaching the end of
  their establishment warranty window that haven't had a final follow-up
  visit scheduled, and flags them. Use this if a sod warranty has ever
  quietly expired with dead or thin patches still unresolved because
  nobody scheduled the final check-in before the window closed.
category: landscaping
tags: [landscaping, sod, turf, warranty, installation]
schedule: "0 7 * * 3"
timezone: "America/Chicago"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn_days="{{warn_days}}" '
    NR==1 {next}
    tolower($4) != "yes" {
      cmd = "date -d \"" $2 " +" $3 " days\" +%s 2>/dev/null || date -j -v+" $3 "d -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline warranty_end_epoch; close(cmd);
      days_left = (warranty_end_epoch - today) / 86400;
      if (days_left <= warn_days) {
        if (days_left < 0) printf "WARRANTY EXPIRED: %s — sod installed %s, warranty lapsed %d day(s) ago, no follow-up visit logged\n", $1, $2, -days_left;
        else printf "FOLLOW-UP NEEDED: %s — sod installed %s, warranty ends in %d day(s), no follow-up visit scheduled\n", $1, $2, days_left;
      }
    }
  ' "{{sod_install_csv_path}}"
variables:
  sod_install_csv_path:
    default: "./sod-installations.csv"
    description: "Path to a CSV with columns: client_name,install_date (YYYY-MM-DD),warranty_days,followup_visit_scheduled (yes/no)."
  warn_days:
    default: 14
    description: Days before a sod installation's warranty window closes to start flagging it if no follow-up visit is scheduled.
compatible_agents: [generic, claude, codex]
notes: Distinct from aeration-overseeding-schedule-check (seasonal maintenance timing) — this tracks the one-time post-install warranty window on new sod, not recurring turf care.
