id: fuel-cost-per-route-tracker
version: 1
name: Fuel Cost Per Route Tracker
description: >
  Totals logged fuel spend per route over the trailing window and flags
  any route whose cost per stop has crept above your target, a sign of
  an inefficient route or a fuel-card issue. Use this if fuel costs have
  ever quietly eaten your margin on a route without anyone noticing until
  the monthly statement arrived.
category: landscaping
tags: [landscaping, fuel, cost, routes, finance]
schedule: "0 7 * * 1"
timezone: "America/Chicago"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v lookback="{{lookback_days}}" -v max_cost="{{max_cost_per_stop}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline fuel_epoch; close(cmd);
      age_days = (today - fuel_epoch) / 86400;
      if (age_days <= lookback) {
        cost[$1] += $3;
        stops[$1] += $4;
      }
    }
    END {
      for (route in cost) {
        per_stop = (stops[route] > 0) ? cost[route] / stops[route] : 0;
        printf "%s: $%.2f fuel over %d stop(s) = $%.2f/stop", route, cost[route], stops[route], per_stop;
        if (per_stop > max_cost) printf " -- OVER TARGET ($%.2f)", max_cost;
        print "";
      }
    }
  ' "{{fuel_log_csv_path}}"
variables:
  fuel_log_csv_path:
    default: "./fuel-log.csv"
    description: "Path to a CSV with columns: route_name,fuel_date (YYYY-MM-DD),fuel_cost,stops_completed."
  lookback_days:
    default: 30
    description: Trailing days of fuel entries to include in the total.
  max_cost_per_stop:
    default: 3.50
    description: Target fuel cost per stop (USD); routes above this are flagged.
compatible_agents: [generic, claude, codex]
notes: Aggregate trend check only — a single expensive fill-up won't necessarily push a route over target, but a pattern will.
