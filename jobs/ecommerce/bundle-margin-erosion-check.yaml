id: bundle-margin-erosion-check
version: 1
name: Bundle Margin Erosion Check
description: >
  Recomputes each product bundle's actual margin from its current
  component costs and flags any bundle that has fallen below its target
  margin. Use this if a supplier cost increase on one bundle component
  has ever quietly eaten a bundle's profit for a whole quarter before
  anyone recalculated it.
category: ecommerce
tags: [ecommerce, bundles, margin, pricing, finance]
schedule: "0 6 1 * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v tolerance="{{margin_tolerance_pct}}" '
    NR==1 {next}
    {
      bundle=$1; price=$2; cost=$3; target=$4;
      if (price+0 <= 0) next;
      actual_margin = (price - cost) / price * 100;
      if (actual_margin < (target - tolerance)) {
        printf "MARGIN EROSION: %s — actual margin %.1f%%, target %.1f%% (price $%.2f, component cost $%.2f)\n", bundle, actual_margin, target, price, cost;
      }
    }
  ' "{{bundle_margins_csv_path}}"
variables:
  bundle_margins_csv_path:
    default: "./bundle-margins.csv"
    description: "Path to a CSV with columns: bundle_sku,bundle_price,component_cost_total,target_margin_pct — recompute component_cost_total whenever a component's cost changes."
  margin_tolerance_pct:
    default: 5
    description: Percentage points below target margin before a bundle is flagged.
compatible_agents: [generic, claude, codex]
notes: >
  Component costs (supplier price increases, currency shifts) creep up
  quietly while a bundle's sale price stays fixed — this catches that
  before a quarter-end margin review does. Distinct from
  `bundle-component-stock-mismatch-check`, which checks component
  availability, not profitability.
