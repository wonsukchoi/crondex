id: washing-machine-hose-inspection-reminder
version: 1
name: Washing Machine & Dishwasher Hose Inspection Reminder
description: >
  Reminds you to inspect washing machine and dishwasher supply hoses
  for bulging, cracking, or corrosion based on how long it's been since
  the last check. Use this if you've ever heard about a burst supply
  hose flooding someone's house while they were away and realized you'd
  never actually looked at yours.
category: home
tags: [home, appliances, plumbing, maintenance]
schedule: "0 9 1 */6 *"
timezone: "America/Los_Angeles"
runner: shell
command: >
  last={{last_inspected_date}}; interval={{interval_months}};
  last_epoch=$(date -j -f %Y-%m-%d "$last" +%s 2>/dev/null || date -d "$last" +%s);
  today_epoch=$(date +%s);
  days_since=$(( (today_epoch-last_epoch)/86400 ));
  interval_days=$(( interval * 30 ));
  if [ "$days_since" -ge "$interval_days" ]; then echo "REMINDER: washer/dishwasher hoses last inspected $days_since day(s) ago (every ${interval} months) — check for bulging, cracking, or corrosion at fittings.";
  else echo "OK: inspected $days_since day(s) ago, due again around day $interval_days."; fi
variables:
  last_inspected_date:
    default: "2026-01-01"
    description: Date (YYYY-MM-DD) you last inspected the supply hoses — update this yourself.
  interval_months:
    default: 6
    description: How often to inspect, in months. Rubber hoses should generally be replaced with braided steel every 5 years regardless.
compatible_agents: [generic, claude, codex]
notes: Zero-token. A burst supply hose is one of the most common sources of major water damage claims — this is cheap insurance.
