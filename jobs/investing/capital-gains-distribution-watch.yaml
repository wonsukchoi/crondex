id: capital-gains-distribution-watch
version: 1
name: Capital Gains Distribution Watch
description: >
  Checks a log of upcoming mutual fund/ETF capital gains distribution
  dates and flags any within your lookahead window. Use this if a fund's
  year-end capital gains distribution has ever surprised you with a tax
  bill you could have planned around, or avoided by not buying in right
  before it.
category: investing
tags: [investing, funds, capital-gains, tax]
schedule: "0 9 * * 1"
timezone: "America/New_York"
runner: shell
command: >
  today=$(date +%s);
  awk -F, -v today="$today" -v lookahead={{lookahead_days}} '
    NR>1 {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline dist_ts; close(cmd);
      days_left = int((dist_ts - today) / 86400);
      if (days_left >= 0 && days_left <= lookahead) print "UPCOMING: \"" $1 "\" est. capital gains distribution on " $2 " (" days_left " days away)";
    }
  ' {{distributions_csv}}
variables:
  distributions_csv:
    default: "fund-cap-gains-dates.csv"
    description: "CSV with header row, columns: fund,est_distribution_date(YYYY-MM-DD) — check your fund provider's estimated distribution schedule page each fall."
  lookahead_days:
    default: 21
    description: How many days ahead to flag an upcoming distribution.
compatible_agents: [generic, claude, codex]
notes: Fund providers post estimated (not final) distribution dates in Oct/Nov — update the CSV from your fund provider's site; this job doesn't fetch them automatically.
