id: app-store-review-response-time-check
version: 1
name: App Store Review Response Time Check
description: >
  Checks how long public app store or marketplace reviews have gone
  without a public reply and flags ones sitting past a target response
  window. Use this if a one-star app store review has ever sat
  unanswered for weeks in full public view while every private ticket
  channel stayed within SLA — distinct from
  multi-channel-response-time-parity-check, which compares response
  time across your own private support channels, not public reviews on
  third-party storefronts.
category: support
tags: [support, app-store, reviews, public-response, reputation]
schedule: "0 8 * * *"
timezone: "UTC"
runner: shell
command: >
  command -v curl >/dev/null 2>&1 || { echo "ERROR: curl not installed"; exit 1; };
  count=$(curl -s -H "Authorization: Bearer {{api_token}}" "{{reviews_api_url}}" | grep -o '"replied":false' | wc -l | tr -d ' ');
  if [ -z "$count" ] || [ "$count" -eq 0 ]; then echo "OK: no unanswered app store reviews past {{response_window_days}} days"; exit 0;
  else echo "WARNING: $count public app store/marketplace review(s) unanswered past {{response_window_days}} days at {{reviews_api_url}}"; exit 1; fi
variables:
  reviews_api_url:
    default: "https://api.example-review-aggregator.com/reviews?replied=false&age_gt_days=3"
    description: Review aggregator or app-store API endpoint pre-filtered to unreplied reviews older than the response window.
  api_token:
    default: "your-api-token"
    description: Bearer token for the review aggregator/app store API.
  response_window_days:
    default: 3
    description: Days a public review can go without a reply before it's flagged, for labeling output.
compatible_agents: [generic, claude, codex]
notes: >
  Requires a review-aggregation tool (or direct App Store Connect/Google
  Play Console API access) that exposes reply status — most teams route
  this through a third-party tool rather than the storefronts directly.
  Read-only; drafts nothing and posts no replies itself.
