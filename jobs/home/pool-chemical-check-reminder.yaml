id: pool-chemical-check-reminder
version: 1
name: Pool Chemical Balance Check Reminder
description: >
  Reminds you to test and balance your pool's chemical levels based on how
  long it's been since the last test. Use this if you've ever opened the
  pool to cloudy water or algae because testing slipped for a couple of
  weeks.
category: home
tags: [home, pool, maintenance]
schedule: "0 9 * * *"
timezone: "America/Los_Angeles"
runner: shell
command: >
  last={{last_tested_date}}; interval={{interval_days}};
  last_epoch=$(date -j -f %Y-%m-%d "$last" +%s 2>/dev/null || date -d "$last" +%s);
  today_epoch=$(date +%s);
  days_since=$(( (today_epoch-last_epoch)/86400 ));
  if [ "$days_since" -ge "$interval" ]; then echo "REMINDER: pool chemicals last tested $days_since day(s) ago (every $interval day(s)) — test and balance.";
  else echo "OK: tested $days_since day(s) ago, next test due in $(( interval - days_since )) day(s)."; fi
variables:
  last_tested_date:
    default: "2026-01-01"
    description: Date (YYYY-MM-DD) you last tested the pool water — update this yourself.
  interval_days:
    default: 7
    description: How often to test chemical levels, in days. Shorten during heavy-use summer weeks.
compatible_agents: [generic, claude, codex]
notes: Zero-token. You update last_tested_date yourself after each test. Only relevant if you maintain your own pool rather than a service contract.
