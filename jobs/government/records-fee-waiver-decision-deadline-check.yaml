id: records-fee-waiver-decision-deadline-check
version: 1
name: Public Records Fee Waiver Decision Deadline Check
description: >
  Checks pending public-records fee waiver requests against the
  statutory deadline for deciding on the waiver itself (separate from,
  and often shorter than, the overall records response deadline) and
  flags the ones close to due. Use this if a fee waiver request has ever
  sat undecided long enough to blow past its own decision clock, even
  though the underlying records request was still being tracked fine.
category: government
tags: [government, public-records, fee-waiver, deadline, compliance]
schedule: "0 8 * * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_days_before}}" '
    NR==1 {next}
    $4 == "no" {
      cmd = "date -d \"" $3 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $3 "\" +%s 2>/dev/null";
      cmd | getline due_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      diff_days = (due_epoch - now_epoch) / 86400;
      if (diff_days <= days) {
        printf "WAIVER DECISION DUE: request %s — decision due %s (%d days)\n", $1, $3, diff_days;
      }
    }
  ' "{{fee_waiver_csv_path}}"
variables:
  fee_waiver_csv_path:
    default: "./records-fee-waiver-requests.csv"
    description: "Path to a CSV with columns: request_id,requested_date (YYYY-MM-DD),decision_due_date (YYYY-MM-DD),decided (yes/no)."
  warn_days_before:
    default: 3
    description: How many days before the fee waiver decision deadline to start warning.
compatible_agents: [generic, claude, codex]
notes: This is distinct from foia-request-deadline-check, which tracks the overall records response deadline — compute decision_due_date per your jurisdiction's specific fee-waiver statute, which is often a shorter clock.
