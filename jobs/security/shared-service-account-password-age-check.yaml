id: shared-service-account-password-age-check
version: 1
name: Shared Service Account Password Age Check
description: >
  Checks how long it's been since each shared or non-SSO service account's
  password was last rotated and flags any past your rotation window. Use
  this if a shared "admin@" or NOC login has ever kept the same password
  for years because it isn't tied to SSO and nobody's individual offboarding
  checklist ever touches it.
category: security
tags: [security, shared-accounts, password-rotation, service-accounts]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F, -v today="$today" -v maxage={{max_age_days}} '
    NR>1 {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline rotated_ts; close(cmd);
      days_since = int((today - rotated_ts) / 86400);
      if (days_since >= maxage) print "OVERDUE: shared account \"" $1 "\" (owner: " $3 ") password last rotated " days_since " days ago (" $2 ")";
    }
  ' {{accounts_csv}}
variables:
  accounts_csv:
    default: "shared-service-accounts.csv"
    description: "CSV with header row, columns: account_name,last_rotated_date(YYYY-MM-DD),owner_team. Maintain by hand or export from your password vault."
  max_age_days:
    default: 90
    description: Maximum age in days before a shared account's password is flagged as overdue for rotation.
compatible_agents: [generic, claude, codex]
notes: >
  Zero-token. Distinct from iam-key-rotation-reminder (API/access keys) and
  stale-ssh-key-cleanup-check (SSH keys) — this covers human-usable shared
  login passwords for accounts that intentionally sit outside SSO/individual
  identity (shared mailboxes, NOC consoles, legacy admin logins). This job
  only flags overdue rotations for a human to action; it does not rotate
  passwords itself.
