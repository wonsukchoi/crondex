id: service-package-credit-expiry-check
version: 1
name: Prepaid Service Package Credit Expiry Check
description: >
  Scans prepaid boarding, daycare, or grooming package balances for clients
  with unused credits whose expiry date is approaching or has passed. Use
  this if a client has ever bought a 10-visit daycare pack, used three, and
  let the rest quietly expire because nobody nudged them to book before the
  window closed.
category: petcare
tags: [petcare, billing, packages, credits, retention]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%Y-%m-%d);
  warn_by=$(date -d "+{{warn_days}} days" +%Y-%m-%d 2>/dev/null || date -j -v+"{{warn_days}}"d +%Y-%m-%d);
  awk -F',' -v today="$today" -v warn="$warn_by" '
    NR==1 {next}
    {
      if ($3+0 <= 0) next;
      if ($4 < today) print "EXPIRED UNUSED: " $1 " — " $2 " (" $3 " credit(s) lost) expired " $4;
      else if ($4 <= warn) print "EXPIRING SOON: " $1 " — " $2 " (" $3 " credit(s) left) expires " $4;
    }
  ' "{{packages_csv_path}}"
variables:
  packages_csv_path:
    default: "./service-packages.csv"
    description: "Path to a CSV with columns: owner_name,package_name,credits_remaining,expiry_date (YYYY-MM-DD)."
  warn_days:
    default: 14
    description: How many days ahead of expiry to start flagging a package with unused credits as expiring soon.
compatible_agents: [generic, claude, codex]
notes: Distinct from frequent-boarder-loyalty-milestone-check.yaml, which celebrates a reward milestone rather than tracking a use-it-or-lose-it prepaid balance. Purely a records check against whatever balances your billing system last recorded.
