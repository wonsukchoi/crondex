id: interview-loop-feedback-nag
version: 1
name: Interview Loop Feedback Nag
description: >
  Checks which interviewers on a hiring loop haven't submitted their
  scorecard within a set window after the interview. Use this if a
  hiring decision has ever stalled because one interviewer's feedback
  never showed up and nobody chased it down.
category: team
tags: [team, hiring, interviews, feedback]
schedule: "0 9 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v hours="{{hours_before_flag}}" '
    NR==1 {next}
    $4 == "pending" {
      cmd = "date -d \"" $3 "\" +%s 2>/dev/null || date -j -f %Y-%m-%dT%H:%M \"" $3 "\" +%s 2>/dev/null";
      cmd | getline interview_epoch; close(cmd);
      age_hours = (today - interview_epoch) / 3600;
      if (age_hours >= hours) {
        printf "MISSING FEEDBACK: %s hasn'"'"'t submitted a scorecard for %s (interviewed %s, %.0f hour(s) ago)\n", $2, $1, $3, age_hours;
      }
    }
  ' "{{interview_loop_csv_path}}"
variables:
  interview_loop_csv_path:
    default: "./interview-loop.csv"
    description: "Path to a CSV with columns: candidate_name,interviewer_name,interview_datetime (YYYY-MM-DDTHH:MM),status (pending/submitted)."
  hours_before_flag:
    default: 24
    description: How many hours after the interview to start flagging missing feedback.
compatible_agents: [generic, claude, codex]
notes: Assumes a maintained interview-loop export (from an ATS or a spreadsheet) — this is the nag layer, not a source of truth for scheduling the loop itself.
