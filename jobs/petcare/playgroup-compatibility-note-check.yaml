id: playgroup-compatibility-note-check
version: 1
name: Daycare Playgroup Compatibility Note Check
description: >
  Checks recently added dogs in each daycare playgroup for a logged
  compatibility/pairing observation note, and flags anyone still missing
  one past your observation window. Use this if a new dog has ever kept
  running with the same playgroup week after week without any staff member
  actually logging how it's getting along with the others.
category: petcare
tags: [petcare, daycare, playgroup, behavior, compatibility]
schedule: "0 18 * * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v window="{{observation_window_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $3 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $3 "\" +%s 2>/dev/null";
      cmd | getline first_epoch; close(cmd);
      age_days = (today - first_epoch) / 86400;
      if (age_days >= 0 && age_days <= window && $4 == "") {
        printf "MISSING COMPATIBILITY NOTE: %s in %s — joined %s (%d day(s) ago)\n", $2, $1, $3, age_days;
      }
    }
  ' "{{playgroup_roster_csv_path}}"
variables:
  playgroup_roster_csv_path:
    default: "./playgroup-roster.csv"
    description: "Path to a CSV with columns: group_name,dog_name,first_playgroup_date (YYYY-MM-DD),compatibility_note (blank until a staff member logs one)."
  observation_window_days:
    default: 7
    description: How many days after a dog's first playgroup session staff have to log a compatibility note before it's flagged missing.
compatible_agents: [generic, claude, codex]
notes: Distinct from daycare-staff-dog-ratio-check.yaml (staffing ratio, not behavior) and aggressive-behavior-flag-review-reminder.yaml (re-review of pets already flagged) — this ensures every newly introduced dog gets an actual observed compatibility note before being treated as a routine playgroup member.
