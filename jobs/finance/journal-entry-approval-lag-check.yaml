id: journal-entry-approval-lag-check
version: 1
name: Journal Entry Approval Lag Check
description: >
  Flags manual journal entries still pending approval past a
  configurable age. Use this if a journal entry has ever sat
  unapproved through a month-end close, leaving the books technically
  unreconciled — distinct from month-end-close-checklist-tracker.yaml,
  which tracks the close process's overall checklist, not the approval
  status of individual journal entries feeding into it.
category: finance
tags: [finance, journal-entry, approval, controls, accounting]
schedule: "0 9 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v max_age="{{max_pending_days}}" '
    NR==1 {next}
    $4 == "pending" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline entry_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      age_days = (now_epoch - entry_epoch) / 86400;
      if (age_days > max_age+0) {
        printf "OVERDUE APPROVAL: JE %s ($%s) posted %s, still pending (%d day(s))\n", $1, $3, $2, age_days;
        n++;
      }
    }
    END { printf "%d journal entry(ies) pending approval too long.\n", n+0; }
  ' "{{journal_entries_csv_path}}"
variables:
  journal_entries_csv_path:
    default: "./journal_entries.csv"
    description: "Path to a CSV with columns: je_id,posted_date (YYYY-MM-DD),amount,status (pending/approved/rejected)."
  max_pending_days:
    default: 5
    description: Days a journal entry can stay pending approval before it's flagged.
compatible_agents: [generic, claude, codex]
notes: Zero-token controls check — actual approval routing still happens in your accounting system.
