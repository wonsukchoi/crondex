id: well-water-quality-test-compliance-check
version: 1
name: Well Water Quality Test Compliance Check
description: >
  Checks your farm/ranch well and livestock water sources against your
  required testing schedule (bacteria, nitrates, minerals) and flags
  overdue or upcoming tests. Use this if you've ever gone a season
  without testing a well because there was no reminder tied to a
  calendar.
category: agriculture
tags: [agriculture, water-quality, well, compliance, testing]
schedule: "0 7 1 * *"
timezone: "America/Chicago"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_ts; close(cmd);
      interval_days = $3+0;
      next_due_ts = last_ts + (interval_days * 86400);
      days_until_due = (next_due_ts - today) / 86400;
      if (days_until_due <= 0) {
        printf "OVERDUE: %s — last tested %s, retest interval %d days\n", $1, $2, interval_days;
      } else if (days_until_due <= warn) {
        printf "DUE SOON: %s — last tested %s, retest due in %d days\n", $1, $2, days_until_due;
      }
    }
  ' "{{water_sources_csv_path}}"
variables:
  water_sources_csv_path:
    default: "./well-water-test-log.csv"
    description: "Path to a CSV with columns: source_name,last_test_date (YYYY-MM-DD),retest_interval_days."
  warn_days_before:
    default: 21
    description: Days before the next test is due to start warning.
compatible_agents: [generic, claude, codex]
notes: Test frequency and required parameters (coliform, nitrate, arsenic, etc.) vary by state and by whether the water serves livestock, irrigation, or a residence — confirm requirements with your local health department or extension office.
