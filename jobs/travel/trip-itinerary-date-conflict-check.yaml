id: trip-itinerary-date-conflict-check
version: 1
name: Trip Itinerary Date Conflict Check
description: >
  Scans a list of your trip bookings (flights, hotels, cars) for
  overlapping or impossible date ranges. Use this if you've ever booked
  a hotel for the wrong week and only noticed it overlapped a different
  trip after the fact.
category: travel
tags: [travel, itinerary, bookings, conflict]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' '
    NR==1 {next}
    {
      cmd1 = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f \"%Y-%m-%d\" \"" $2 "\" +%s 2>/dev/null";
      cmd1 | getline start_epoch[NR]; close(cmd1);
      cmd2 = "date -d \"" $3 "\" +%s 2>/dev/null || date -j -f \"%Y-%m-%d\" \"" $3 "\" +%s 2>/dev/null";
      cmd2 | getline end_epoch[NR]; close(cmd2);
      label[NR] = $1;
      n = NR;
    }
    END {
      found = 0;
      for (i = 2; i <= n; i++) {
        for (j = i+1; j <= n; j++) {
          if (start_epoch[i] < end_epoch[j] && start_epoch[j] < end_epoch[i]) {
            printf "CONFLICT: \"%s\" overlaps \"%s\"\n", label[i], label[j];
            found = 1;
          }
        }
      }
      if (!found) print "OK: no overlapping bookings found.";
    }
  ' "{{bookings_csv_path}}"
variables:
  bookings_csv_path:
    default: "./trip-bookings.csv"
    description: "Path to a CSV with columns: label,start_date,end_date (YYYY-MM-DD), one row per booking (flight, hotel, car, etc)."
compatible_agents: [generic, claude, codex]
notes: >
  Zero-token. You maintain the bookings CSV yourself — this doesn't pull from
  any booking platform. Best run weekly while you're actively planning
  multiple trips at once.
