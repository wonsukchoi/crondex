id: npi-provider-registry-staleness-check
version: 1
name: NPI Provider Registry Staleness Check
description: >
  Compares each provider's practice-management-system record (address,
  taxonomy code, phone) against a manually-noted last-verified-against-NPI
  date and flags anyone not re-checked within a configurable window. Use
  this if a mismatched NPI registry entry has ever caused a claim
  rejection because the payer's lookup didn't match what was billed —
  distinct from payer-recredentialing-deadline-check.yaml, which tracks
  panel status, not registry data accuracy.
category: dental
tags: [dental, npi, provider-data, billing, compliance]
schedule: "0 8 1 */3 *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v max_age="{{max_age_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline verified_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      age_days = (now_epoch - verified_epoch) / 86400;
      if (age_days > max_age+0) {
        printf "STALE: %s NPI record last verified %s (%d day(s) ago)\n", $1, $2, age_days;
        stale++;
      }
    }
    END { printf "%d provider NPI record(s) due for re-verification.\n", stale+0; }
  ' "{{npi_verification_log_csv_path}}"
variables:
  npi_verification_log_csv_path:
    default: "./npi_verification_log.csv"
    description: "Path to a CSV with columns: provider_name,last_verified_date (YYYY-MM-DD)."
  max_age_days:
    default: 180
    description: Days since last verification before a provider's NPI registry data is flagged as due for a re-check.
compatible_agents: [generic, claude, codex]
notes: Read-only reminder — actual lookup against the NPPES NPI registry still needs to happen manually or via that registry's own API.
