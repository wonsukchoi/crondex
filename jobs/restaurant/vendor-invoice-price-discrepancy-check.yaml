id: vendor-invoice-price-discrepancy-check
version: 1
name: Vendor Invoice Price Discrepancy Check
description: >
  Compares each line item's invoiced unit price against the price agreed
  in your vendor contract or last confirmed quote, and flags any line
  that's been billed above the contracted rate. Use this if a food or
  supply vendor has ever quietly crept prices up on the invoice without
  a heads-up, and it went unnoticed because no one checks line items
  against the contract sheet.
category: restaurant
tags: [restaurant, vendor, invoice, purchasing, reconciliation]
schedule: "0 9 * * 2"
timezone: "America/New_York"
runner: shell
command: >
  awk -F',' -v tolerance="{{variance_tolerance_pct}}" '
    NR==1 {next}
    {
      if ($3 > 0) {
        variance_pct = (($4 - $3) / $3) * 100;
        if (variance_pct > tolerance) printf "PRICE DISCREPANCY: %s (%s) — contracted $%.2f, invoiced $%.2f (%.1f%% over)\n", $2, $1, $3, $4, variance_pct;
      }
    }
  ' "{{vendor_invoice_csv}}"
variables:
  vendor_invoice_csv:
    default: "./vendor-invoice-lines.csv"
    description: "CSV with header row, columns: invoice_number,item_name,contracted_unit_price_usd,invoiced_unit_price_usd."
  variance_tolerance_pct:
    default: 3
    description: Percentage above the contracted price allowed before a line item is flagged.
compatible_agents: [generic, claude, codex]
notes: Distinct from `supplier-price-increase-watch` (which trends a vendor's overall pricing over time to catch creeping increases) and `delivery-platform-commission-reconciliation` (third-party delivery payouts, not physical goods vendors) — this checks each individual invoice line against what was actually contracted before you pay it.
