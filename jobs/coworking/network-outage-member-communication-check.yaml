id: network-outage-member-communication-check
version: 1
name: Network Outage Member Communication Check
description: >
  Checks logged wifi or network outages and flags any where no
  member-facing notification was sent within your response window, so an
  outage doesn't get fixed quietly while members are left guessing whether
  it's their laptop or the building's network. Use this if members have
  ever found out about a known outage only by complaining to the front
  desk instead of getting a heads-up first.
category: coworking
tags: [coworking, wifi, network, outage, communication]
schedule: "0 * * * *"
timezone: "UTC"
runner: shell
command: >
  psql "{{database_url}}" -t -c "select outage_id, affected_area, started_at, resolved_at from network_outages where member_notification_sent_at is null and started_at <= now() - interval '{{notify_sla_minutes}} minutes' order by started_at asc;"
variables:
  database_url:
    default: "postgres://user:pass@host:5432/db"
    description: Connection string for the database or monitoring system that logs network outages.
  notify_sla_minutes:
    default: "20"
    description: Minutes an outage can be open before a member notification should have gone out.
compatible_agents: [generic, claude, codex]
notes: >
  Assumes a `network_outages` table with `outage_id`, `affected_area`,
  `started_at`, `resolved_at` (nullable), and `member_notification_sent_at`
  (nullable) columns, populated by whatever monitoring tool or status-page
  integration detects the outage — adjust the query to your schema.
  Distinct from wifi-bandwidth-utilization-alert.yaml, which watches
  bandwidth trending toward saturation, not whether an already-known outage
  was communicated. Read-only; it does not send the notification itself, it
  only flags outages where staff still owe members an update.
