id: contract-signature-missing-check
version: 1
name: Contract Signature Missing Check
description: >
  Checks upcoming photography or videography bookings for a signed contract
  on file and flags any shoot happening soon with no signature yet. Use this
  if you've ever shown up to shoot a wedding or event only to realize
  afterward that the client never actually signed the contract.
category: photography
tags: [photography, contracts, bookings, compliance]
schedule: "0 8 * * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v window="{{lead_time_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline shoot_epoch; close(cmd);
      days_until = (shoot_epoch - today) / 86400;
      if (days_until >= 0 && days_until <= window && tolower($4) != "yes") {
        printf "NO SIGNED CONTRACT: %s — shoot %s (%s), client %s, in %.0f day(s)\n", $1, $2, $3, $5, days_until;
      }
    }
  ' "{{bookings_csv_path}}"
variables:
  bookings_csv_path:
    default: "./bookings.csv"
    description: "Path to a CSV with columns: booking_id,shoot_date (YYYY-MM-DD),shoot_type,contract_signed (yes/no),client_name."
  lead_time_days:
    default: 7
    description: How many days before a shoot to start flagging a missing signed contract as urgent.
compatible_agents: [claude, codex, hermes, openclaw, generic]
notes: Read-only job — it only flags missing signatures, it doesn't send or chase the contract itself. Route flagged bookings to whoever owns client paperwork so they can follow up before the shoot date.
