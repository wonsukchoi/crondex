id: amenity-reservation-noshow-check
version: 1
name: Amenity Reservation No-Show Check
description: >
  Looks at bookable amenity slots such as phone booths, podcast rooms, or
  event space, and finds members with a repeat pattern of marking
  reservations as no-shows over a recent window. Use this if you want to
  catch members who keep tying up limited bookable space without showing
  up, so staff can follow up on your no-show policy before it gets worse.
category: coworking
tags: [coworking, amenities, bookings, no-show]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  psql "{{database_url}}" -t -c "select member_id, member_name, amenity_type, count(*) as no_show_count from amenity_reservations where status = 'no_show' and reservation_start >= now() - interval '{{lookback_days}} days' group by member_id, member_name, amenity_type having count(*) >= {{no_show_threshold}} order by no_show_count desc;"
variables:
  database_url:
    default: "postgres://user:pass@host:5432/db"
    description: Connection string for the coworking space's amenity-booking database.
  lookback_days:
    default: "30"
    description: How many days back to look for no-show reservations.
  no_show_threshold:
    default: "3"
    description: Minimum number of no-shows in the lookback window before a member is flagged as a repeat offender.
compatible_agents: [generic, claude, codex]
notes: >
  Assumes an `amenity_reservations` table with `member_id`, `member_name`,
  `amenity_type`, `status`, and `reservation_start` columns, and that
  no-shows are already marked by staff or a check-in system — adjust the
  query to your booking schema. Read-only and informational: it flags a
  pattern for staff to review, it does not apply any penalty or block any
  future booking itself.
