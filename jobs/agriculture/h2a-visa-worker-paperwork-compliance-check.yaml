id: h2a-visa-worker-paperwork-compliance-check
version: 1
name: H-2A Visa Worker Paperwork Compliance Check
description: >
  Checks your H-2A seasonal worker roster for documents (work contract,
  I-9, housing inspection, transportation records) that are missing or
  approaching their expiration/deadline. Use this if you've ever had a
  Department of Labor audit turn up a gap in H-2A paperwork you didn't
  know existed.
category: agriculture
tags: [agriculture, labor, h2a, visa, compliance]
schedule: "0 6 * * 1"
timezone: "America/Chicago"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn="{{warn_days_before}}" '
    NR==1 {next}
    {
      if ($3 == "") {
        printf "MISSING: %s — %s has no recorded date/status\n", $1, $2;
        next;
      }
      cmd = "date -d \"" $3 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $3 "\" +%s 2>/dev/null";
      cmd | getline due_ts; close(cmd);
      days_left = (due_ts - today) / 86400;
      if (days_left <= 0) {
        printf "OVERDUE: %s — %s was due %s\n", $1, $2, $3;
      } else if (days_left <= warn) {
        printf "DUE SOON: %s — %s due %s (%d days left)\n", $1, $2, $3, days_left;
      }
    }
  ' "{{h2a_docs_csv_path}}"
variables:
  h2a_docs_csv_path:
    default: "./h2a-worker-documents.csv"
    description: "Path to a CSV with columns: worker_name_or_id,document_type,due_or_expiration_date (YYYY-MM-DD, blank if missing)."
  warn_days_before:
    default: 14
    description: Days before a document's due/expiration date to start warning.
compatible_agents: [generic, claude, codex]
notes: H-2A compliance requirements (contracts, I-9, housing, transportation) are set by DOL/USCIS and change periodically — verify current requirements with your agricultural labor attorney or state workforce agency.
