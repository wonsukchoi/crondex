id: probation-review-deadline-reminder
version: 1
name: Probation Review Deadline Reminder
description: >
  Reminds you before a new hire's probation or introductory period ends
  so the formal review gets scheduled in time. Use this if you've ever
  missed the window to confirm or extend someone's probation.
category: team
tags: [onboarding, review, team]
schedule: "0 9 * * *"
timezone: "America/Los_Angeles"
runner: shell
command: >
  today_epoch=$(date +%s);
  end_epoch=$(date -j -f %Y-%m-%d "{{probation_end_date}}" +%s 2>/dev/null || date -d "{{probation_end_date}}" +%s);
  days_left=$(( (end_epoch-today_epoch)/86400 ));
  if [ "$days_left" -lt 0 ]; then echo "note: probation_end_date has passed for {{new_hire_name}} — update it or confirm the review already happened.";
  elif [ "$days_left" -le {{warn_days_before}} ]; then
    echo "REMINDER: {{new_hire_name}}'s probation period ends in $days_left day(s) (on {{probation_end_date}}) — schedule the formal review.";
  else echo "OK: {{new_hire_name}}'s probation ends in $days_left day(s)."; fi
variables:
  new_hire_name:
    default: ""
    description: Name of the new hire whose probation period is being tracked.
  probation_end_date:
    default: "2026-08-15"
    description: Date (YYYY-MM-DD) the probation or introductory period ends.
  warn_days_before:
    default: 14
    description: Start reminding this many days before the probation end date.
compatible_agents: [generic, claude, codex]
notes: >
  Zero-token. You maintain probation_end_date yourself — this doesn't pull
  from any HR system.
