id: lost-pet-protocol-drill-tracking-check
version: 1
name: Lost-Pet Protocol Drill Tracking Check
description: >
  Scans your staff roster for who last ran through the facility's
  lost-pet-during-walk-or-play escape response drill and flags anyone
  overdue for a refresher. Use this if a gate has ever been left open or a
  leash has ever slipped and staff hesitated because the escape response
  protocol hadn't actually been drilled in months.
category: petcare
tags: [petcare, staffing, training, safety, protocol]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v interval="{{drill_interval_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_epoch; close(cmd);
      age_days = (today - last_epoch) / 86400;
      if (age_days > interval) printf "DRILL OVERDUE: %s — last lost-pet drill %s (%d days ago)\n", $1, $2, age_days;
    }
  ' "{{staff_drills_csv_path}}"
variables:
  staff_drills_csv_path:
    default: "./staff-lost-pet-drills.csv"
    description: "Path to a CSV with columns: staff_name,last_lost_pet_drill_date (YYYY-MM-DD)."
  drill_interval_days:
    default: 180
    description: Maximum number of days between lost-pet protocol drills before a staff member is flagged as overdue for a refresher.
compatible_agents: [generic, claude, codex]
notes: Distinct from staff-pet-first-aid-cert-expiry-check.yaml, which tracks a formal medical first-aid certification — this tracks recurring in-house refresher drills for the facility's own escape/lost-pet response protocol, not an external certification.
