id: elevator-inspection-compliance-check
version: 1
name: Elevator Inspection Compliance Check
description: >
  Checks each elevator/lift against its required periodic inspection and
  certificate renewal date and flags any coming due or overdue. Use this
  if an elevator has ever kept running on an expired inspection
  certificate because it was folded into the general preventive
  maintenance schedule instead of being tracked against its own
  jurisdiction-mandated inspection cycle.
category: hospitality
tags: [hospitality, elevator, life-safety, compliance]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline expiry_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      diff_days = (expiry_epoch - now_epoch) / 86400;
      if (diff_days <= days) {
        printf "ELEVATOR INSPECTION DUE: %s — certificate expires %s (%d days)\n", $1, $2, diff_days;
      }
    }
  ' "{{elevator_inspection_csv_path}}"
variables:
  elevator_inspection_csv_path:
    default: "./elevator-inspection-certificates.csv"
    description: "Path to a CSV with columns: elevator_id,certificate_expiry_date (YYYY-MM-DD)."
  warn_days_before:
    default: 30
    description: How many days before the inspection certificate expires to start warning.
compatible_agents: [generic, claude, codex]
notes: Inspection cycle and certifying authority vary by jurisdiction — confirm your local elevator code rather than assuming a fixed interval. Distinct from `room-maintenance-work-order-tracker` (general room-level PM/HVAC/fire safety, not elevator-specific jurisdictional certification).
