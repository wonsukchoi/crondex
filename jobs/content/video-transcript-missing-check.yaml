id: video-transcript-missing-check
version: 2
name: Video Transcript Missing Check
description: >
  Scans pages containing embedded video for a linked transcript or a
  captions/subtitles track, and flags videos where neither is found. Use
  this if you publish video content and want to catch accessibility gaps
  and missed opportunities for search engines to index the video's spoken
  content as text.
category: content
tags: [content, seo, accessibility, video, transcript]
schedule: "0 7 * * 6"
timezone: "UTC"
runner: agent-prompt
prompt: >
  Fetch the sitemap at {{sitemap_url}} and check each published page for an
  embedded video (elements matching {{video_css_selector}} or an
  equivalent embed you recognize). For each page with video, look for a
  linked transcript or a captions/subtitles track (matching
  {{transcript_css_selector}} or an equivalent you recognize). Flag pages
  with video but no transcript/captions found. Note that a
  third-party-hosted video may carry captions the fetch can't see, so call
  that caveat out in the report rather than treating flags as certain.
variables:
  sitemap_url:
    default: "https://example.com/sitemap.xml"
    description: Sitemap used to enumerate published pages to scan for embedded video.
  video_css_selector:
    default: "video, iframe[src*='youtube'], iframe[src*='vimeo']"
    description: CSS selector identifying embedded video players on a rendered page.
  transcript_css_selector:
    default: ".video-transcript, track[kind='captions']"
    description: CSS selector identifying a linked transcript block or a captions track associated with the video.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only: fetches publicly reachable pages, makes no edits. Needs an
  agent since detecting video embeds and their transcript/captions across
  differently templated pages and third-party players is a judgment call,
  not a fixed selector match every site will satisfy identically.
