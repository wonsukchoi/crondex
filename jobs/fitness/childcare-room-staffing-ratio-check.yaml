id: childcare-room-staffing-ratio-check
version: 1
name: Childcare Room Staffing Ratio Check
description: >
  Compares scheduled childcare-room staff against the number of children
  checked in per shift and flags any shift where the ratio exceeds the
  legal or policy maximum. Use this if the kids' room has ever run over
  its staff-to-child ratio during a busy weekend morning because
  check-ins weren't compared against staffing until after the fact.
category: fitness
tags: [fitness, childcare, staffing, safety, compliance]
schedule: "0 */2 * * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v max_ratio="{{max_children_per_staff}}" '
    NR==1 {next}
    {
      key = $1 "|" $2;
      children[key] += 1;
      staffcount[key] = $3;
    }
    END {
      for (k in children) {
        split(k, parts, "|");
        ratio = children[k] / staffcount[k];
        if (ratio > max_ratio) {
          printf "RATIO EXCEEDED: %s shift %s — %d children, %d staff (ratio %.1f, max %.1f)\n", parts[1], parts[2], children[k], staffcount[k], ratio, max_ratio;
        }
      }
    }
  ' "{{childcare_checkin_csv_path}}"
variables:
  childcare_checkin_csv_path:
    default: "./childcare-checkins.csv"
    description: "Path to a CSV with columns: shift_date (YYYY-MM-DD),shift_name,staff_on_duty — one row per child check-in, staff_on_duty repeated per row for that shift."
  max_children_per_staff:
    default: 6
    description: Maximum number of children allowed per staff member before the shift is out of ratio.
compatible_agents: [generic, claude, codex]
notes: Check your state's licensing requirements for the actual legal ratio — the default here is a placeholder, not a compliance guarantee.
