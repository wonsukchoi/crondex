id: secrets-rotation-overdue-check
version: 1
name: Secrets Rotation Overdue Check
description: >
  Checks a secrets inventory log against a configurable rotation
  interval and flags any credential (API key, database password,
  signing key) that hasn't been rotated recently enough. Use this if a
  long-lived secret has ever quietly stayed unrotated for years because
  nobody tracked rotation dates separately from the secret's own expiry
  — distinct from ssl-cert-expiry-check.yaml, which watches TLS
  certificate expiry, not credential rotation cadence.
category: devops
tags: [devops, secrets, rotation, security, credentials]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v max_age="{{max_age_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline rotated_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      age_days = (now_epoch - rotated_epoch) / 86400;
      if (age_days > max_age+0) {
        printf "OVERDUE: %s last rotated %s (%d day(s) ago, max %s)\n", $1, $2, age_days, max_age;
        overdue++;
      }
    }
    END { printf "%d secret(s) overdue for rotation.\n", overdue+0; }
  ' "{{secrets_inventory_csv_path}}"
variables:
  secrets_inventory_csv_path:
    default: "./secrets_inventory.csv"
    description: "Path to a CSV with columns: secret_name,last_rotated_date (YYYY-MM-DD)."
  max_age_days:
    default: 90
    description: Maximum days a secret can go without rotation before it's flagged.
compatible_agents: [generic, claude, codex]
notes: Read-only reminder — actual rotation still needs to happen through the relevant secrets manager or provider console.
