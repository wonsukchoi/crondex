id: client-allergy-contraindication-audit
version: 1
name: Client Allergy & Contraindication Flag Audit
description: >
  Cross-checks tomorrow's booked treatments against each client's
  recorded allergies and medical contraindications, flagging any
  mismatch before the appointment happens. Use this if a client has
  ever reacted to a product or a treatment has ever gone ahead despite
  a documented contraindication because the front desk didn't see the note.
category: spa
tags: [spa, safety, allergies, client-care, compliance]
schedule: "0 16 * * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' '
    BEGIN { while ((getline line < "{{contraindications_csv_path}}") > 0) {
      n++; split(line, f, ","); client[n]=f[1]; flag[n]=tolower(f[2]);
    } close("{{contraindications_csv_path}}") }
    NR==FNR { next }
    FNR==1 { next }
    {
      service_text = tolower($3);
      for (i=1; i<=n; i++) {
        if ($1 == client[i] && index(service_text, flag[i]) > 0) {
          printf "CONTRAINDICATION RISK: %s booked for %s at %s — flagged: %s\n", $1, $3, $2, flag[i];
        }
      }
    }
  ' "{{contraindications_csv_path}}" "{{tomorrow_bookings_csv_path}}"
variables:
  contraindications_csv_path:
    default: "./client-contraindications.csv"
    description: "Path to a CSV with columns: client_name,flagged_keyword (e.g. 'retinol', 'pregnancy', 'blood thinner')."
  tomorrow_bookings_csv_path:
    default: "./tomorrow-bookings.csv"
    description: "Path to a CSV with columns: client_name,appointment_time,service_name."
compatible_agents: [generic, claude, codex]
notes: The keyword match is intentionally simple and read-only — always have a licensed provider confirm before altering or cancelling a booked service, this only surfaces the possible conflict.
