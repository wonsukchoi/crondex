id: sds-chemical-safety-compliance-check
version: 1
name: SDS Chemical Safety Compliance Check
description: >
  Checks your Safety Data Sheet (SDS) log for chemicals currently in use and
  flags any that are missing or older than your refresh window. Use this if
  you've ever failed (or worried about failing) an OSHA-style walkthrough
  because a chemical on the truck didn't have a current SDS on file.
category: cleaning-services
tags: [cleaning-services, sds, chemical-safety, osha, compliance]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v max_age="{{sds_max_age_days}}" '
    NR==1 {next}
    {
      if ($3 == "") {
        printf "MISSING SDS: %s (in use: %s)\n", $1, $2;
        next;
      }
      cmd = "date -d \"" $3 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $3 "\" +%s 2>/dev/null";
      cmd | getline sds_epoch; close(cmd);
      age_days = (today - sds_epoch) / 86400;
      if (age_days > max_age) {
        printf "STALE SDS: %s — on file dated %s (%.0f days old, max %s)\n", $1, $3, age_days, max_age;
      }
    }
  ' "{{sds_log_csv_path}}"
variables:
  sds_log_csv_path:
    default: "./sds-log.csv"
    description: "Path to a CSV with columns: chemical_name,in_use (yes/no),sds_on_file_date (YYYY-MM-DD, blank if no SDS on file)."
  sds_max_age_days:
    default: 1095
    description: Maximum age in days before an on-file SDS is considered stale and due for a refreshed copy from the manufacturer (many firms target ~3 years; check your local OSHA/jurisdiction guidance).
compatible_agents: [claude, codex, hermes, openclaw, generic]
notes: Read-only job — it only flags missing/stale SDS records, it doesn't request updated sheets from manufacturers or remove chemicals from service.
