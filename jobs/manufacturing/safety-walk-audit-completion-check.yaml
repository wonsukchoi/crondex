id: safety-walk-audit-completion-check
version: 1
name: Plant Safety Walk Audit Completion Check
description: >
  Checks whether scheduled floor safety walks were logged as completed
  and flags any that were skipped or logged with open findings still
  unresolved. Use this if a scheduled safety walk has ever been skipped
  for weeks in a row without anyone flagging the gap.
category: manufacturing
tags: [manufacturing, safety, audit, compliance]
schedule: "0 16 * * 1-5"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%Y-%m-%d);
  awk -F',' -v today="$today" '
    FNR==NR { if (FNR>1 && $3 == "active") expected[$1]=1; next }
    FNR==1 { next }
    $2 == today {
      walked[$1] = 1;
      if ($3 == "skipped") printf "SKIPPED: safety walk for area \"%s\" was not performed today\n", $1;
      else if ($4+0 > 0) printf "OPEN FINDINGS: area \"%s\" walk logged with %d unresolved finding(s)\n", $1, $4;
    }
    END {
      for (area in expected) if (!(area in walked)) printf "NOT LOGGED: area \"%s\" is scheduled but has no walk entry today\n", area;
    }
  ' "{{area_schedule_csv}}" "{{safety_walk_log_csv}}"
variables:
  safety_walk_log_csv:
    default: "./safety-walk-log.csv"
    description: "CSV with header row, columns: area,walk_date(YYYY-MM-DD),status(completed/skipped),open_findings_count."
  area_schedule_csv:
    default: "./safety-walk-schedule.csv"
    description: "CSV of areas expected to be walked, columns: area,frequency(daily/weekly),status."
compatible_agents: [generic, claude, codex]
notes: Log each floor safety walk to safety-walk-log.csv the same day it happens; this checks completion and open findings, not the quality of the walk itself.
