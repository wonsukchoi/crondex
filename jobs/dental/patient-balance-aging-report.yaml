id: patient-balance-aging-report
version: 1
name: Patient Balance Aging Report
description: >
  Buckets outstanding patient balances by age (0-30, 31-60, 61-90, 90+ days)
  from a billing export and flags accounts past a configurable threshold.
  Use this if patient balances have ever quietly drifted past 90 days
  because nobody had a standing view of the aging buckets, not just the
  total owed.
category: dental
tags: [dental, billing, patient-balances, aging, revenue-cycle]
schedule: "0 8 1,15 * *"
timezone: "America/New_York"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v flag_days="{{flag_threshold_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline charge_epoch; close(cmd);
      age_days = (today - charge_epoch) / 86400;
      balance = $3 + 0;
      if (age_days <= 30) { b1 += balance; }
      else if (age_days <= 60) { b2 += balance; }
      else if (age_days <= 90) { b3 += balance; }
      else { b4 += balance; }
      if (age_days > flag_days) {
        printf "PAST %d DAYS: %s — $%.2f outstanding, charge dated %s (%d days old)\n", flag_days, $1, balance, $2, age_days;
      }
    }
    END {
      printf "AGING SUMMARY: 0-30d=$%.2f 31-60d=$%.2f 61-90d=$%.2f 90+d=$%.2f\n", b1, b2, b3, b4;
    }
  ' "{{billing_csv_path}}"
variables:
  billing_csv_path:
    default: "./patient-balances.csv"
    description: "Path to a CSV with columns: patient_name,oldest_unpaid_charge_date (YYYY-MM-DD),outstanding_balance."
  flag_threshold_days:
    default: 90
    description: Balance age in days beyond which an individual account gets an explicit flag line.
compatible_agents: [generic, claude, codex]
notes: >
  Assumes a billing system export. Read-only reporting — doesn't send statements or
  collections notices itself.
