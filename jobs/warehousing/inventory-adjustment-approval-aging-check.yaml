id: inventory-adjustment-approval-aging-check
version: 1
name: Inventory Adjustment Approval Aging Check
description: >
  Checks pending inventory adjustment requests (quantity corrections,
  write-ins, system overrides) against how long they have sat waiting
  for supervisor approval, and flags any stuck past the allowed window.
  Use this if inventory adjustments have ever piled up unapproved,
  leaving on-hand counts wrong for weeks while nobody signed off.
category: warehousing
tags: [warehousing, inventory, approval, controls, audit]
schedule: "0 8 * * *"
timezone: "UTC"
runner: shell
command: >
  now=$(date +%s);
  awk -F',' -v hrs="{{max_pending_hours}}" -v now="$now" '
    NR==1 {next}
    $4 == "pending" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%dT%H:%M \"" $2 "\" +%s 2>/dev/null";
      cmd | getline requested_epoch; close(cmd);
      age_hrs = (now - requested_epoch) / 3600;
      if (age_hrs >= hrs) {
        printf "PENDING TOO LONG: adjustment %s — sku %s requested %s, still unapproved (%d hrs)\n", $1, $3, $2, age_hrs;
      }
    }
  ' "{{inventory_adjustment_log_csv_path}}"
variables:
  inventory_adjustment_log_csv_path:
    default: "./inventory-adjustment-log.csv"
    description: "Path to a CSV with columns: adjustment_id,requested_timestamp (YYYY-MM-DDTHH:MM),sku,status (pending/approved/rejected)."
  max_pending_hours:
    default: 48
    description: Hours an adjustment can sit pending before it is flagged as stuck in the approval queue.
compatible_agents: [generic, claude, codex]
notes: This is about approval-queue aging (a controls gap), distinct from warehouse-damage-writeoff-review, which looks at the damage write-off reasons themselves.
