id: vendor-contractor-coi-expiry-check
version: 1
name: Vendor and Contractor Certificate of Insurance Expiry Check
description: >
  Flags maintenance vendors and contractors whose certificate of
  insurance (COI) on file has expired or is about to expire, so nobody
  gets dispatched to a job site without valid coverage. Use this if a
  contractor has ever kept working on your properties after their
  liability policy lapsed because nobody was tracking COI dates.
category: realestate
tags: [realestate, vendors, insurance, compliance]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn="{{warn_days}}" '
    NR==1 {next}
    {
      cmd="date -d \"" $3 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $3 "\" +%s";
      cmd | getline exp_ts; close(cmd);
      days_left = int((exp_ts - today) / 86400);
      if (days_left <= warn) print "COI EXPIRING: vendor " $1 " (" $2 ") coverage expires in " days_left " day(s) (" $3 ")";
    }
  ' "{{vendors_csv}}"
variables:
  vendors_csv:
    default: "./vendor-coi-status.csv"
    description: "CSV with header row, columns: vendor_name,trade,coi_expiration_date(YYYY-MM-DD)."
  warn_days:
    default: 21
    description: Days before COI expiration to start warning so a renewal certificate can be collected.
compatible_agents: [generic, claude, codex]
notes: Distinct from landlord-insurance-claim-status-check and insurance-policy-renewal-reminder, which cover the property owner's own policies — this tracks third-party vendor liability coverage required before dispatching work.
