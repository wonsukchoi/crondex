id: end-of-week-retro-reminder
version: 1
name: End of Week Retro Reminder
description: >
  Sends a Friday-afternoon reminder to do a short personal weekly
  retrospective covering what worked, what didn't, and what's next. Use
  this if weeks tend to blur together without you ever pausing to notice
  patterns worth repeating or avoiding.
category: productivity
tags: [retrospective, weekly-review, reflection]
schedule: "0 16 * * 5"
timezone: "UTC"
runner: agent-prompt
prompt: >
  It's Friday afternoon. Prompt me to reflect briefly on this week using
  three questions: what worked well, what didn't work, and what I want to
  do differently or carry forward next week. Ask me directly, then
  summarize my answers back concisely. Do not create any tasks or
  calendar events — this is just a reflection prompt.
variables: {}
compatible_agents: [generic, claude, codex]
notes: >
  Purely conversational — no external system reads or writes. Intended as
  a lightweight personal retro, distinct from the team-wide weekly-report
  job which summarizes work output rather than prompting reflection.
