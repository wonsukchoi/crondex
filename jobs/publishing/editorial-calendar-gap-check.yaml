id: editorial-calendar-gap-check
version: 1
name: Editorial Calendar Gap Check
description: >
  Looks at the scheduled publish dates on your editorial calendar and
  flags any stretch of days that's longer than expected with nothing
  scheduled. Use this if your publish cadence has ever quietly gone quiet
  because everyone assumed someone else had filled the calendar for that
  week.
category: publishing
tags: [publishing, editorial-calendar, scheduling, content]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" '
    NR>1 {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline ts; close(cmd);
      if (ts+0 >= today) dates[n++] = ts;
    }
    END {
      if (n == 0) { print "NO UPCOMING ITEMS: editorial calendar has nothing scheduled from today onward"; exit 0; }
      asort_needed = 1;
      for (i=0; i<n; i++) for (j=i+1; j<n; j++) if (dates[j] < dates[i]) { t=dates[i]; dates[i]=dates[j]; dates[j]=t }
      prev = today;
      gap_found = 0;
      for (i=0; i<n; i++) {
        gap_days = int((dates[i] - prev) / 86400);
        if (gap_days > {{max_gap_days}}) { print "SCHEDULING GAP: " gap_days "-day gap with nothing scheduled before the next item"; gap_found = 1; }
        prev = dates[i];
      }
      if (!gap_found) print "OK: no gap exceeds {{max_gap_days}} days across " n " upcoming scheduled items";
    }
  ' "{{editorial_calendar_csv}}"
variables:
  editorial_calendar_csv:
    default: "./editorial-calendar.csv"
    description: "CSV with header row, columns: title,publish_date(YYYY-MM-DD) — one row per scheduled or published piece."
  max_gap_days:
    default: 4
    description: Flag any stretch between consecutive upcoming scheduled items longer than this many days.
compatible_agents: [generic, claude, codex]
notes: >
  Only evaluates gaps between items scheduled today or later — past dates
  in the CSV are ignored. Set max_gap_days to match your normal cadence
  (e.g. higher for a weekly magazine than a daily blog).
