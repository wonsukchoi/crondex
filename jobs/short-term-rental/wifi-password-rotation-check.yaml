id: wifi-password-rotation-check
version: 1
name: Wi-Fi Password Rotation Check
description: >
  Flags a property whose guest Wi-Fi password hasn't been rotated since
  the last checkout. Use this if a departed guest has ever still been
  connected to the network — or worse, still reachable on it — during
  the next guest's stay because the password never changed.
category: short-term-rental
tags: [short-term-rental, security, wifi, check-in]
schedule: "0 * * * *"
timezone: "UTC"
runner: shell
command: >
  psql "{{database_url}}" -t -c "select property_id, last_checkout_at, wifi_password_rotated_at from wifi_credentials where wifi_password_rotated_at < last_checkout_at;"
variables:
  database_url:
    default: "postgres://user:pass@host:5432/db"
    description: Connection string for the property/network-credential database.
compatible_agents: [generic, claude, codex]
notes: Assumes a `wifi_credentials` table with `property_id`, `last_checkout_at`, and `wifi_password_rotated_at` columns — adjust to your network-management or router-integration schema.
