id: ad-read-script-approval-overdue-check
version: 1
name: Podcast Ad-Read Script Approval Overdue Check
description: >
  Flags sponsor ad-read scripts still awaiting sponsor sign-off close to
  the recording date. Use this if you've ever had to delay recording, or
  read an unapproved script, because a sponsor sat on an approval too long.
category: podcast
tags: [podcast, sponsorship, ad-read, approval]
schedule: "0 9 * * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F, -v today="$today" -v warn={{warn_days_before_recording}} '
    NR>1 && $3 == "pending" {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline rec_ts; close(cmd);
      days_left = int((rec_ts - today) / 86400);
      if (days_left <= warn) print "WARNING: " $1 " ad-read script still pending approval, recording in " days_left " day(s)";
    }
  ' {{ad_reads_csv}}
variables:
  ad_reads_csv:
    default: "ad-reads.csv"
    description: "CSV with header row, columns: sponsor_name,recording_date(YYYY-MM-DD),approval_status(pending/approved)."
  warn_days_before_recording:
    default: 3
    description: Days before the recording date to start warning if approval is still pending.
compatible_agents: [generic, claude, codex]
notes: Update approval_status to "approved" in ad-reads.csv as soon as the sponsor signs off, so the row stops flagging.
