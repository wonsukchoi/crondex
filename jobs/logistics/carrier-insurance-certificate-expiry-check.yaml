id: carrier-insurance-certificate-expiry-check
version: 1
name: Carrier Certificate of Insurance Expiry Check
description: >
  Checks each carrier's certificate of insurance on file against its
  expiry date and warns before it lapses. Use this if a load has ever
  moved on a carrier whose cargo or auto liability coverage had already
  quietly expired, leaving you uninsured if something went wrong.
category: logistics
tags: [logistics, carrier, insurance, compliance, risk]
schedule: "0 8 * * 1"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{warn_days_before}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline expiry_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      diff_days = (expiry_epoch - now_epoch) / 86400;
      if (diff_days <= days) {
        printf "COI EXPIRING: carrier %s — certificate of insurance expires %s (%d days)\n", $1, $2, diff_days;
      }
    }
  ' "{{carrier_coi_csv_path}}"
variables:
  carrier_coi_csv_path:
    default: "./carrier-certificates-of-insurance.csv"
    description: "Path to a CSV with columns: carrier_name,coi_expiry_date (YYYY-MM-DD) — tracked from carrier onboarding/compliance records."
  warn_days_before:
    default: 30
    description: How many days before a carrier's certificate of insurance expires to start warning, to leave time to request a renewal before tendering more loads to them.
compatible_agents: [generic, claude, codex]
notes: >
  Tracks carrier insurance coverage lapsing, a distinct risk from
  carrier-rate-contract-renewal-check (commercial rate agreement expiry)
  — a carrier can have a fully valid rate contract and still be running
  on an expired COI, which is the exposure this catches.
