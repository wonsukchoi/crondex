id: sds-review-currency-check
version: 1
name: Safety Data Sheet Review Currency Check
description: >
  Flags chemicals in your SDS library whose last review date is older
  than your required review interval. Use this if a Safety Data Sheet
  has ever sat unreviewed for years in a binder while the chemical it
  covers kept getting used on the floor, and an auditor or inspector
  was the first one to notice.
category: manufacturing
tags: [manufacturing, safety, sds, hazcom, compliance]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v interval_days={{review_interval_days}} '
    NR==1 {next}
    {
      cmd="date -d \"" $2 "\" +%s 2>/dev/null || date -jf \"%Y-%m-%d\" \"" $2 "\" +%s";
      cmd | getline review_ts; close(cmd);
      age_days = int((today - review_ts) / 86400);
      if (age_days > interval_days) printf "SDS REVIEW OVERDUE: \"%s\" (mfr %s) last reviewed %s, %d days ago (limit %d days)\n", $1, $3, $2, age_days, interval_days;
    }
  ' "{{sds_library_csv}}"
variables:
  sds_library_csv:
    default: "./sds-library.csv"
    description: "CSV with header row, columns: chemical_name,last_reviewed_date(YYYY-MM-DD),manufacturer — one row per chemical or hazardous material in active use."
  review_interval_days:
    default: 1095
    description: "Maximum days allowed since last SDS review before flagging as overdue (default ~3 years; set to your EHS policy or manufacturer revision cadence)."
compatible_agents: [generic, claude, codex]
notes: Distinct from hazardous-waste-manifest-deadline-check (disposal manifest timelines) and safety-certification-expiry-check (personnel training certs) — this tracks OSHA HazCom/GHS Safety Data Sheet currency for chemicals in active use, not waste disposal or operator credentials.
