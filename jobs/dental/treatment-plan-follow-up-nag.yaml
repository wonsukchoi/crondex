id: treatment-plan-follow-up-nag
version: 1
name: Treatment Plan Follow-Up Nag
description: >
  Flags treatment plan items that were diagnosed but never scheduled, once
  they've sat unscheduled longer than a configurable age. Use this if
  case-value from diagnosed work (fillings, crowns, ortho referrals) tends
  to go stale in the chart because nobody circled back to schedule it —
  distinct from a hygiene recall job, which only tracks routine cleanings.
category: dental
tags: [dental, treatment-plan, case-acceptance, follow-up, unscheduled]
schedule: "0 8 * * 3"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v max_age="{{unscheduled_age_days}}" -v min_value="{{min_case_value}}" '
    NR==1 {next}
    $4 == "unscheduled" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline diag_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      age_days = int((now_epoch - diag_epoch) / 86400);
      if (age_days >= max_age && $5+0 >= min_value+0) {
        printf "STALE PLAN: %s, %s diagnosed %s (%d day(s) ago), estimated value $%.2f\n", $1, $3, $2, age_days, $5+0;
        total_value += $5+0;
        count++;
      }
    }
    END {
      if (count == 0) print "No stale unscheduled treatment plan items above the value threshold.";
      else printf "%d stale unscheduled item(s), $%.2f in recoverable case value.\n", count, total_value;
    }
  ' "{{treatment_plans_csv_path}}"
variables:
  treatment_plans_csv_path:
    default: "./treatment_plans.csv"
    description: "Path to a CSV with columns: patient_name,diagnosed_date (YYYY-MM-DD),procedure,status (unscheduled/scheduled/completed),estimated_value."
  unscheduled_age_days:
    default: 30
    description: How many days a diagnosed item can sit unscheduled before it's flagged.
  min_case_value:
    default: 200
    description: Minimum estimated dollar value for an unscheduled item to be worth flagging.
compatible_agents: [generic, claude, codex]
notes: Read-only report — pair with a scheduling or outreach job if you want automatic follow-up calls or messages triggered.
