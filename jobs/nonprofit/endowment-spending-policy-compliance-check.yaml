id: endowment-spending-policy-compliance-check
version: 1
name: Endowment Spending Policy Compliance Check
description: >
  Compares the amount drawn from an endowment fund this year against your
  board-approved spending policy rate (a percentage of fund value) and
  flags a draw that's running over. Use this if an endowment has ever
  been drawn down faster than its own spending policy allows, eroding the
  principal the fund was meant to protect in perpetuity, before anyone
  compared the actual withdrawal to the approved rate.
category: nonprofit
tags: [nonprofit, finance, endowment, compliance]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v policy_rate={{spending_policy_rate_pct}} -v alert_over={{alert_over_pct}} '
    NR>1 {
      allowed = $2 * (policy_rate / 100);
      pct_drawn = (allowed > 0) ? ($3 / allowed) * 100 : 0;
      if (pct_drawn >= alert_over) {
        printf "OVER SPENDING POLICY: %s — drawn $%s of $%.2f allowed (%.0f%% of the %s%% policy rate)\n", $1, $3, allowed, pct_drawn, $1, policy_rate;
      }
    }
  ' "{{endowment_funds_csv}}"
variables:
  endowment_funds_csv:
    default: "endowment-funds.csv"
    description: "CSV with header row, columns: fund_name,average_fund_value,ytd_drawn — average_fund_value is typically a trailing 12- or 36-month rolling average per your investment policy."
  spending_policy_rate_pct:
    default: 4.5
    description: Board-approved annual spending policy rate, as a percent of the fund's average value.
  alert_over_pct:
    default: 100
    description: Percent of the policy-allowed draw at which a fund gets flagged (100 means "flag as soon as the full year's allowed amount is drawn").
compatible_agents: [generic, claude, codex]
notes: >
  Distinct from `grant-restricted-fund-spend-check` and
  `donor-restricted-fund-expiry-check`, which track spending time-bound
  or purpose-bound gifts — an endowment is meant to last in perpetuity,
  so the concern here is the opposite: drawing faster than the policy
  rate rather than too slowly. Update average_fund_value from your
  investment custodian's statement, not just cash on hand.
