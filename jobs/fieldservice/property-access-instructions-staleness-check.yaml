id: property-access-instructions-staleness-check
version: 1
name: Customer Property Access Instructions Staleness Check
description: >
  Flags customer property access notes (gate codes, lockbox codes, dog
  warnings, parking instructions) that haven't been confirmed or updated
  in longer than your target interval, since stale access notes are a
  common cause of tech delays and no-shows. Use this if a tech has ever
  arrived to a locked gate with an old code, or gotten surprised by a
  dog nobody flagged, because the access notes hadn't been checked in
  over a year.
category: fieldservice
tags: [fieldservice, property-access, dispatch, data-quality]
schedule: "0 8 1 * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v stale="{{staleness_days}}" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_epoch; close(cmd);
      days_since = (today - last_epoch) / 86400;
      if (days_since >= stale) {
        printf "ACCESS NOTES STALE: %s — last confirmed %s (%d days ago)\n", $1, $2, days_since;
      }
    }
  ' "{{property_access_csv_path}}"
variables:
  property_access_csv_path:
    default: "./property-access-notes.csv"
    description: "Path to a CSV with columns: customer_name,last_confirmed_date (YYYY-MM-DD),access_notes."
  staleness_days:
    default: 365
    description: Days since access notes were last confirmed before they're flagged for a re-check.
compatible_agents: [generic, claude, codex]
notes: Have dispatch confirm access details with the customer before the next scheduled visit — this job only flags staleness, it doesn't verify the notes are still correct.
