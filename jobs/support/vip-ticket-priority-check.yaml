id: vip-ticket-priority-check
version: 1
name: VIP Ticket Priority Check
description: >
  Checks that open tickets from your VIP or high-value customer segment are
  actually flagged priority and within their tighter response window. Use
  this if a top-tier account has ever waited in the same queue as everyone
  else because the VIP tag didn't make it into the ticket.
category: support
tags: [support, vip, tickets, priority]
schedule: "0 * * * *"
timezone: "UTC"
runner: shell
command: >
  command -v curl >/dev/null 2>&1 || { echo "ERROR: curl not installed"; exit 1; };
  count=$(curl -s -H "Authorization: Bearer {{api_token}}" "{{api_url}}" | grep -o '"vip":true' | wc -l | tr -d ' ');
  if [ -z "$count" ] || [ "$count" -eq 0 ]; then echo "OK: no VIP tickets past the {{vip_sla_minutes}}-minute window"; exit 0;
  else echo "WARNING: $count VIP ticket(s) open past the {{vip_sla_minutes}}-minute window at {{api_url}}"; exit 1; fi
variables:
  api_url:
    default: "https://api.example-helpdesk.com/tickets?status=open&vip=true&age_gt_minutes=15"
    description: Helpdesk API endpoint pre-filtered to open tickets tagged VIP older than the VIP SLA window.
  api_token:
    default: "your-api-token"
    description: Bearer token for the helpdesk API.
  vip_sla_minutes:
    default: 15
    description: Minutes a VIP ticket can go without response before it counts as a miss, for labeling output.
compatible_agents: [generic, claude, codex]
notes: Requires your helpdesk to have a VIP/account-tier field or tag on tickets — adjust the grep pattern and api_url filter to match how your tool marks high-value accounts.
