id: crane-lift-plan-approval-tracker
version: 1
name: Crane Lift Plan Approval Tracker
description: >
  Flags scheduled critical or heavy crane lifts that don't yet have a
  signed-off lift plan on file, so a lift never proceeds without the
  qualified rigger review it's supposed to have. Use this if a crane lift
  has ever been scheduled and the paperwork trail for who approved the
  rigging plan only got assembled after the fact.
category: construction
tags: [construction, crane, rigging, safety, lift-plan]
schedule: "0 6 * * *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn="{{warn_hours}}" '
    NR==1 {next}
    $5 != "approved" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d\\ %H:%M \"" $2 "\" +%s 2>/dev/null";
      cmd | getline lift_ts; close(cmd);
      hours_until = (lift_ts - today) / 3600;
      if (hours_until <= warn) printf "LIFT PLAN NOT APPROVED: %s — lift #%s at %s in %.1f hours (status: %s)\n", $1, $3, $2, hours_until, $5;
    }
  ' "{{lift_schedule_csv}}"
variables:
  lift_schedule_csv:
    default: "./crane-lift-schedule.csv"
    description: "Path to a CSV with columns: location,lift_datetime (YYYY-MM-DD HH:MM),lift_id,load_description,status (draft/submitted/approved)."
  warn_hours:
    default: 24
    description: Hours before a scheduled lift to flag it if the lift plan still isn't approved.
compatible_agents: [generic, claude, codex]
notes: Applies to critical lifts (over 75% of rated capacity, tandem lifts, near power lines, or over occupied areas) per your site's critical lift procedure; routine lifts under standard capacity may not require this level of sign-off.
