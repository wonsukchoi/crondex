id: blood-bank-specimen-expiry-check
version: 1
name: Blood Bank Type-and-Screen Specimen Expiry Check
description: >
  Checks pending crossmatch/type-and-screen specimens against the blood
  bank's validity window (commonly 72 hours for a transfused or pregnant-
  within-3-months patient) and flags any reserved units whose backing
  specimen is about to expire or already has. Use this if blood units have
  ever nearly been released — or had to be released — against a specimen
  that had quietly gone stale, forcing an urgent redraw right when units
  were needed.
category: healthcare
tags: [healthcare, blood-bank, transfusion, patient-safety, laboratory]
schedule: "0 */4 * * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v validity_hours="{{specimen_validity_hours}}" -v warn_hours="{{warn_hours_before}}" '
    NR==1 {next}
    $4 == "reserved" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f \"%Y-%m-%dT%H:%M\" \"" $2 "\" +%s 2>/dev/null";
      cmd | getline collected_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      age_hours = (now_epoch - collected_epoch) / 3600;
      hours_left = validity_hours+0 - age_hours;
      if (hours_left <= warn_hours+0) {
        if (hours_left < 0) printf "EXPIRED SPECIMEN: %s — %s collected %s, expired %.1f hour(s) ago, %s unit(s) still reserved\n", $1, $3, $2, -hours_left, $5;
        else printf "EXPIRING SOON: %s — %s collected %s, expires in %.1f hour(s), %s unit(s) reserved\n", $1, $3, $2, hours_left, $5;
        n++;
      }
    }
    END { printf "%d specimen(s) flagged for redraw before release.\n", n+0; }
  ' "{{specimen_log_csv_path}}"
variables:
  specimen_log_csv_path:
    default: "./blood_bank_specimens.csv"
    description: "Path to a CSV with columns: patient_id,collected_datetime (YYYY-MM-DDTHH:MM),specimen_type (type_and_screen/crossmatch),status (reserved/released/expired),units_reserved."
  specimen_validity_hours:
    default: 72
    description: Hours a type-and-screen/crossmatch specimen stays valid before a fresh redraw is required.
  warn_hours_before:
    default: 8
    description: Hours before (or past) expiry to start flagging a specimen so a redraw can be scheduled ahead of need.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only check over an already-exported blood bank worklist — it never
  releases, holds, or crossmatches units itself, only flags which reserved
  units are backed by a specimen close to or past its validity window so
  the blood bank can request a redraw before the units are actually needed.
