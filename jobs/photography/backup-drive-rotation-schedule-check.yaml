id: backup-drive-rotation-schedule-check
version: 1
name: Backup Drive Rotation Schedule Check
description: >
  Checks whether each offsite backup drive in your rotation was swapped
  on schedule and flags any drive that's overdue for its next rotation
  or overdue to be taken offsite. Use this if your "offsite" backup
  drive has ever sat on your desk for three months because the rotation
  swap kept getting pushed to "next week."
category: photography
tags: [photography, backup, storage, rotation, data-safety]
schedule: "0 7 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v today="$today" -v warn="{{warn_days_before}}" '
    NR==1 {next}
    {
      drive=$1; last_rotation_date=$2; rotation_interval_days=$3; offsite=$4;
      cmd = "date -d \"" last_rotation_date "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" last_rotation_date "\" +%s 2>/dev/null";
      cmd | getline last_epoch; close(cmd);
      next_due_epoch = last_epoch + (rotation_interval_days * 86400);
      days_to_due = int((next_due_epoch - today) / 86400);
      if (days_to_due <= warn) {
        if (days_to_due < 0) {
          printf "ROTATION OVERDUE: %s — rotation was due %d day(s) ago (last rotated %s)\n", drive, -days_to_due, last_rotation_date;
        } else {
          printf "ROTATION DUE SOON: %s — due in %d day(s) (last rotated %s)\n", drive, days_to_due, last_rotation_date;
        }
      }
      if (tolower(offsite) != "yes") {
        printf "NOT OFFSITE: %s is still onsite, last rotated %s\n", drive, last_rotation_date;
      }
    }
  ' "{{backup_drives_csv_path}}"
variables:
  backup_drives_csv_path:
    default: "./backup-drives.csv"
    description: "Path to a CSV with columns: drive_label,last_rotation_date (YYYY-MM-DD),rotation_interval_days,currently_offsite (yes/no)."
  warn_days_before:
    default: 3
    description: How many days before a drive's next scheduled rotation to start warning it's due soon.
compatible_agents: [claude, codex, hermes, openclaw, generic]
notes: Read-only check; it does not rotate or transport any drive itself. Update last_rotation_date and currently_offsite once a physical swap actually happens.
