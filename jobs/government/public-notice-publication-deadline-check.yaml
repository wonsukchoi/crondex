id: public-notice-publication-deadline-check
version: 1
name: Legal Notice Publication Deadline Check
description: >
  Checks upcoming hearings or actions that require a statutory legal
  notice to run in a newspaper of record (or other designated medium)
  and flags ones where the required publication lead time is about to
  run out. Use this if a hearing has ever had to be postponed because
  the legal ad didn't get submitted to the paper in time to meet the
  required number of days, or insertions, before the hearing date.
category: government
tags: [government, public-notice, legal-notice, publication, compliance]
schedule: "0 8 * * *"
timezone: "UTC"
runner: shell
command: >
  awk -F',' -v days="{{required_lead_days}}" '
    NR==1 {next}
    $4 == "no" {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline hearing_epoch; close(cmd);
      "date +%s" | getline now_epoch; close("date +%s");
      days_until_hearing = (hearing_epoch - now_epoch) / 86400;
      if (days_until_hearing <= days) {
        printf "SUBMIT NOTICE NOW: %s — hearing %s in %d days, notice not yet submitted (needs %d days lead)\n", $1, $2, days_until_hearing, days;
      }
    }
  ' "{{legal_notices_csv_path}}"
variables:
  legal_notices_csv_path:
    default: "./legal-notices-tracker.csv"
    description: "Path to a CSV with columns: matter_name,hearing_date (YYYY-MM-DD),notice_type,notice_submitted (yes/no)."
  required_lead_days:
    default: 15
    description: Minimum days before the hearing the legal notice must be submitted for publication, accounting for the paper's own deadline and required insertions.
compatible_agents: [generic, claude, codex]
notes: >
  Distinct from public-meeting-notice-compliance-check, which covers
  posting an open-meetings agenda notice generically for any public body
  meeting — this covers statutorily required newspaper/legal-ad
  publication tied to a specific action (zoning variance, tax hearing,
  bond ordinance), which usually has a longer lead time and a different
  medium. Confirm your jurisdiction's specific requirement per notice type.
