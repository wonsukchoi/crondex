id: badge-shared-credential-anomaly-check
version: 1
name: Badge Shared Credential Anomaly Check
description: >
  Scans key-fob or badge swipe logs for the same credential used to enter
  two different physical entrances or locations within a time gap too
  short for a person to have actually traveled between them. Use this if
  you suspect a member is letting a friend or coworker tailgate in on
  their badge, or a lost/cloned fob is being used by someone other than
  its owner, and want it caught before it becomes a bigger security or
  liability problem.
category: coworking
tags: [coworking, security, access-control, fraud-detection]
schedule: "0 8 * * *"
timezone: "UTC"
runner: shell
command: >
  psql "{{database_url}}" -t -c "select a.fob_id, a.member_id, a.entrance_id as first_entrance, a.swiped_at as first_swipe, b.entrance_id as second_entrance, b.swiped_at as second_swipe, extract(epoch from (b.swiped_at - a.swiped_at)) / 60.0 as minutes_apart from fob_swipes a join fob_swipes b on a.fob_id = b.fob_id and a.entrance_id <> b.entrance_id and b.swiped_at > a.swiped_at and b.swiped_at <= a.swiped_at + interval '{{max_travel_minutes}} minutes' where a.swiped_at >= now() - interval '{{lookback_days}} days' order by a.swiped_at desc;"
variables:
  database_url:
    default: "postgres://user:pass@host:5432/db"
    description: Connection string for the coworking space's access-control/badge system database.
  max_travel_minutes:
    default: "10"
    description: Maximum minutes between swipes at two different entrances that is still physically plausible for one person; pairs faster than this are flagged.
  lookback_days:
    default: "3"
    description: How many days back of swipe history to scan for impossible-travel pairs.
compatible_agents: [generic, claude, codex]
notes: >
  Assumes a `fob_swipes` table with `fob_id`, `member_id`, `entrance_id`, and
  `swiped_at` columns, and that entrances are far enough apart (different
  floors, buildings, or sites) that `max_travel_minutes` is a meaningful
  cutoff — tune it up for a sprawling campus or down for a single small
  floor. This overlaps with key-fob-access-deactivation-check only in that
  both look at fob activity; that job checks whether a departed member's
  fob is still active, this one checks whether an active member's own fob
  is being used by someone else. Read-only: it only flags suspicious pairs
  for staff to review against camera footage or a conversation with the
  member, it does not deactivate any fob itself.
