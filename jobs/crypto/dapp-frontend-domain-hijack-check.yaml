id: dapp-frontend-domain-hijack-check
version: 1
name: dApp Frontend Domain/SSL Hijack Check
description: >
  Checks a dApp's web frontend domain — DNS records, SSL certificate
  fingerprint, and hosting IP — against a known-good baseline and flags
  any unexpected change. Use this if a dApp frontend has ever been
  silently swapped via a DNS hijack or compromised hosting account to
  serve a malicious wallet-drainer contract while the actual smart
  contracts on-chain stayed untouched.
category: crypto
tags: [crypto, dapp, security, dns, phishing]
schedule: "*/15 * * * *"
timezone: "UTC"
runner: shell
command: >
  current_ip=$(dig +short "{{dapp_domain}}" | tail -1);
  current_cert_fingerprint=$(echo | openssl s_client -servername "{{dapp_domain}}" -connect "{{dapp_domain}}:443" 2>/dev/null | openssl x509 -noout -fingerprint -sha256 2>/dev/null | cut -d= -f2);
  if [ "$current_ip" != "{{expected_ip}}" ]; then
    printf "DNS MISMATCH: %s resolves to %s, expected %s\n" "{{dapp_domain}}" "$current_ip" "{{expected_ip}}";
  fi;
  if [ -n "$current_cert_fingerprint" ] && [ "$current_cert_fingerprint" != "{{expected_cert_fingerprint}}" ]; then
    printf "SSL CERT MISMATCH: %s fingerprint %s, expected %s\n" "{{dapp_domain}}" "$current_cert_fingerprint" "{{expected_cert_fingerprint}}";
  fi
variables:
  dapp_domain:
    default: "app.example.com"
    description: The dApp frontend's domain name to monitor.
  expected_ip:
    default: "0.0.0.0"
    description: The known-good hosting IP address this domain should resolve to.
  expected_cert_fingerprint:
    default: "00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00"
    description: The known-good SSL certificate's SHA-256 fingerprint, captured after a legitimate deploy/cert renewal.
compatible_agents: [generic, claude, codex]
notes: Update expected_ip and expected_cert_fingerprint after every legitimate deploy or certificate renewal, or this will false-positive on your own changes. Distinct from `ens-domain-expiration-watch` (the ENS blockchain name's expiry, not the web frontend's DNS/hosting integrity) and `smart-contract-upgrade-watch` (on-chain contract changes, not frontend/DNS-layer compromise).
