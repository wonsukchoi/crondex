id: espp-purchase-window-reminder
version: 1
name: ESPP Purchase Window Reminder
description: >
  Warns before your Employee Stock Purchase Plan's enrollment change
  deadline or purchase date so you don't miss the window. Use this if
  you've ever missed an ESPP enrollment change deadline and been stuck at
  the same contribution rate for another entire offering period.
category: investing
tags: [investing, espp, equity-compensation, deadlines]
schedule: "0 9 * * 1"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  deadline_ts=$(date -d "{{next_deadline_date}}" +%s 2>/dev/null || date -jf "%Y-%m-%d" "{{next_deadline_date}}" +%s);
  days_left=$(( (deadline_ts - today) / 86400 ));
  if [ "$days_left" -ge 0 ] && [ "$days_left" -le {{warn_days}} ]; then
    echo "REMINDER: ESPP {{deadline_type}} deadline is {{next_deadline_date}}, $days_left days away.";
  else
    echo "OK: next ESPP {{deadline_type}} deadline ({{next_deadline_date}}) is $days_left days away, outside the warning window.";
  fi
variables:
  next_deadline_date:
    default: "2026-08-15"
    description: "Next ESPP enrollment change or purchase date (YYYY-MM-DD) — update it each offering period."
  deadline_type:
    default: "enrollment change"
    description: "What kind of deadline this is (e.g. enrollment change, purchase date)."
  warn_days:
    default: 10
    description: Days before the deadline to start warning.
compatible_agents: [generic, claude, codex]
notes: Offering period dates vary by employer plan — update next_deadline_date from your plan document each period; this doesn't fetch dates automatically.
