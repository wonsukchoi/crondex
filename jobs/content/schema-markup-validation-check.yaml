id: schema-markup-validation-check
version: 2
name: Schema Markup Validation Check
description: >
  Checks published pages' structured-data markup (JSON-LD/schema.org) for
  syntax errors, missing required fields, and deprecated types, separate
  from meta tags like title and description. Use this if you rely on rich
  results (star ratings, FAQ snippets, breadcrumbs, product info) in search
  and want to know before Google silently stops showing them.
category: content
tags: [content, seo, structured-data, schema-markup]
schedule: "0 6 * * 2"
timezone: "UTC"
runner: agent-prompt
prompt: >
  Fetch the sitemap at {{sitemap_url}} and, for a representative sample of
  published pages, extract any embedded JSON-LD structured data. Check each
  page's schema.org @type(s) against this expected list:
  {{expected_schema_types}} (comma-separated) — flag pages missing an
  expected type entirely, pages whose JSON-LD has a syntax/parse error, and
  any use of a deprecated schema.org type. Report findings grouped by issue
  type (missing, invalid, deprecated), with the page URL for each.
variables:
  sitemap_url:
    default: "https://example.com/sitemap.xml"
    description: Sitemap used to enumerate published pages to scan for structured data.
  expected_schema_types:
    default: "Article,BreadcrumbList,FAQPage"
    description: Comma-separated schema.org @type values that pages are expected to carry, used to flag pages missing them.
compatible_agents: [generic, claude, codex]
notes: >
  Read-only: fetches publicly reachable pages and reads embedded JSON-LD,
  makes no edits. Needs an agent to parse and judge arbitrary JSON-LD
  structures against schema.org requirements; swap in Google's Rich Results
  Test API or the Schema.org validator as a data source if preferred.
  Distinct from seo-meta-check, which covers title/meta description tags
  rather than JSON-LD schema.
