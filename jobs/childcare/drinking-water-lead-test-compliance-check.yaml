id: drinking-water-lead-test-compliance-check
version: 1
name: Drinking Water Lead Test Compliance Check
description: >
  Checks your facility's required drinking-water lead testing schedule and
  flags any outlet overdue for retesting or any result above the
  actionable threshold. Use this if a required lead retest has ever
  lapsed past its due date, or a result above the limit sat unnoticed
  because nobody was cross-checking test dates and results against the
  schedule.
category: childcare
tags: [childcare, water-safety, facility, compliance]
schedule: "0 8 1 1,4,7,10 *"
timezone: "UTC"
runner: shell
command: >
  today=$(date +%s);
  awk -F',' -v days="{{retest_interval_days}}" -v today="$today" '
    NR==1 {next}
    {
      cmd = "date -d \"" $2 "\" +%s 2>/dev/null || date -j -f %Y-%m-%d \"" $2 "\" +%s 2>/dev/null";
      cmd | getline last_epoch; close(cmd);
      age_days = (today - last_epoch) / 86400;
      if (age_days >= days) {
        printf "RETEST DUE: %s — last tested %s (%d days ago)\n", $1, $2, age_days;
      }
      if ($3 + 0 > $4 + 0) {
        printf "ABOVE THRESHOLD: %s — result %s ppb exceeds limit %s ppb\n", $1, $3, $4;
      }
    }
  ' "{{water_test_csv_path}}"
variables:
  water_test_csv_path:
    default: "./drinking-water-lead-tests.csv"
    description: "Path to a CSV with columns: outlet_name (e.g. kitchen sink, classroom fountain),last_test_date (YYYY-MM-DD),result_ppb,threshold_ppb (your jurisdiction's actionable limit)."
  retest_interval_days:
    default: 365
    description: Days between required lead retests — varies by state/local rules for lead-in-water testing at childcare facilities.
compatible_agents: [generic, claude, codex]
notes: Confirm your state/local required retest interval and actionable threshold before relying on the defaults — these rules vary widely by jurisdiction. Distinct from facility-license-renewal-deadline-check, which tracks licenses/permits themselves rather than a specific environmental test result.
